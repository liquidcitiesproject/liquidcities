<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liquidcities — Building Identity</title>
<style>
  :root { --bg: #ffffff; --panel: #f4f4f5; --line: #e2e2e4; --ink: #111;
    --dim: #6b7076; --accent: #111; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 300; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .step.active { flex: 1 0 auto; }
  #appFooter { flex: none; width: 100%; padding: 20px 0; }
  body.board-viewer #appFooter, body.map-full #appFooter { display: none; }
  /* 모든 페이지: 좌우 26px 여백의 풀폭 — 헤더와 정확히 같은 정렬 */
  .step { display: none; width: 100%; max-width: none; padding: 34px 26px 80px; margin: 0; }
  /* 제작 플로우의 입력·버튼은 읽기 좋은 폭(640px)으로 좌측 정렬 —
     래퍼(#structForm 등) 안에 있어도 적용되도록 요소 단위로 제한 */
  .step h1, .step .sub, .step .hint, .step .status, .step .err { max-width: 640px; }
  .step input[type=text], .step input[type=number], .step input[type=email],
  .step input[type=password], .step textarea, .step input[type=range] { max-width: 640px; }
  .step .row { max-width: 640px; }
  .step.wide h1, .step.wide .row, .step.wide .status { max-width: none; }
  /* 반응형 — 넓은 화면에서는 여유 있게, 중앙 정렬 */
  @media (min-width: 900px) {
    .canvas-wrap { max-width: 420px; }
    #mapView { height: 640px !important; }
  }
  .step.active { display: block; }
  h1 { font-size: 21px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.01em; }
  p.sub { color: var(--dim); font-size: 13px; margin: 0 0 24px; line-height: 1.5; }
  input[type=text], input[type=number], input[type=email], input[type=password], textarea {
    width: 100%; background: #fff; border: 1px solid var(--line); color: var(--ink);
    padding: 12px 14px; border-radius: 3px; font-size: 16px; font-family: inherit; /* 16px 미만이면 iOS가 포커스 시 강제 줌 */
  }
  input:focus, textarea:focus { outline: none; border-color: var(--ink); }
  textarea { min-height: 110px; resize: vertical; }
  input::placeholder, textarea::placeholder { color: #9aa0a6; }
  button {
    background: #fff; color: var(--ink); border: 1px solid var(--ink); padding: 11px 20px;
    border-radius: 3px; font-size: 14px; font-weight: 300; cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: var(--ink); color: #fff; }
  button.secondary { background: #fff; color: var(--dim); border: 1px solid var(--line); }
  button.secondary:hover:not(:disabled) { background: var(--panel); color: var(--ink); }
  button:disabled { opacity: 0.35; cursor: default; }
  .row { display: flex; gap: 10px; margin-top: 14px; }
  .row > * { flex: 1; }
  .err { color: #c62828; font-size: 13px; margin-top: 12px; display: none; line-height: 1.5; }
  .hint { color: var(--dim); font-size: 12px; margin-top: 10px; line-height: 1.5; }
  .canvas-wrap { margin: 18px 0 0; width: 100%; max-width: 360px; position: relative; }
  /* 매스·배치 미리보기: 세로 1080×1920 캔버스의 중앙 정사각 밴드만 노출 */
  .canvas-wrap.square { aspect-ratio: 1 / 1; overflow: hidden; background: #fff;
    border: 1px solid var(--line); border-radius: 6px; max-width: 460px; }
  .canvas-wrap.square > canvas { width: 100%; height: auto; display: block;
    position: absolute; top: 50%; left: 0; transform: translateY(-50%); }
  .canvas-wrap canvas { width: 100%; display: block; border: 1px solid var(--line);
    border-radius: 6px; background: #fff; }
  #editorCanvas { cursor: grab; touch-action: none; }
  #massCanvas { touch-action: none; }
  #massCanvas, #editorCanvas { -webkit-user-select: none; user-select: none; }
  button, .mass-cat { -webkit-tap-highlight-color: transparent; }
  #editorCanvas.dragging { cursor: grabbing; }
  #editorCanvas.locked { cursor: default; }
  .status { font-size: 13px; color: var(--dim); margin-top: 12px; min-height: 18px; }
  .manual-box { display: none; margin-top: 18px; padding: 16px; border: 1px dashed var(--line);
    border-radius: 8px; background: var(--panel); }
  .manual-box.show { display: block; }
  .saved-item { display: flex; gap: 8px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--line); }
  .saved-item span { flex: 1; font-size: 13px; color: var(--ink); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .saved-item button { flex: none; padding: 8px 14px; font-size: 12px; }
  .saved-item img { width: 36px; height: 64px; object-fit: cover; flex: none;
    border-radius: 4px; border: 1px solid var(--line); background: #000; }
  #recOutputs img, #recOutputs video { width: 100%; max-width: 300px; display: block;
    border: 1px solid var(--line); border-radius: 6px; background: #000; margin-top: 16px; }
  .mass-cat { flex: none; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: #fff; border: 1px solid var(--line); border-radius: 3px; color: var(--ink);
    font-size: 12px; cursor: pointer; }
  .mass-cat img { width: 42px; height: 42px; object-fit: cover; object-position: center;
    border-radius: 4px; background: #000; }
  .mass-cat.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
  .ai-chip { background: #fff; color: var(--ink); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 3px; font-size: 13px; font-weight: 400; }
  .ai-chip:hover { border-color: #999; }
  .ai-chip.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
  /* ---- 감정 좌표 평면 (STEP5b · 오늘의 기분 정렬 공용) ---- */
  .emo-plane { position: relative; width: 100%; max-width: 360px; aspect-ratio: 1;
    margin: 18px auto; border: 1px solid var(--line); border-radius: 8px;
    background: linear-gradient(135deg, #f2f6f5 0%, #faf7f2 100%);
    touch-action: none; cursor: crosshair; user-select: none; }
  .emo-axis-x { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: var(--line); }
  .emo-axis-y { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--line); }
  .emo-lbl { position: absolute; font-size: 10px; color: var(--dim); pointer-events: none; }
  .emo-lbl-top { top: 6px; left: 50%; transform: translateX(-50%); }
  .emo-lbl-bottom { bottom: 6px; left: 50%; transform: translateX(-50%); }
  .emo-lbl-left { left: 6px; top: 50%; transform: translateY(-50%); }
  .emo-lbl-right { right: 6px; top: 50%; transform: translateY(-50%); }
  .emo-dot { position: absolute; width: 16px; height: 16px; border-radius: 50%;
    background: var(--ink); border: 2px solid #fff; box-shadow: 0 0 0 1px var(--ink);
    transform: translate(-50%, -50%); display: none; pointer-events: none; }
  /* ---- 감정 좌표 사분면 뷰 (#mapView 위 오버레이) ---- */
  #quadView { display: none; position: absolute; inset: 0; border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden;
    background: linear-gradient(135deg, #f2f6f5 0%, #faf7f2 100%); }
  #quadView.on { display: block; }
  .quad-axis-x { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: var(--line); }
  .quad-axis-y { position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--line); }
  .quad-lbl { position: absolute; font-size: 11px; color: var(--dim); pointer-events: none; z-index: 2; }
  .quad-lbl-top { top: 10px; left: 50%; transform: translateX(-50%); }
  .quad-lbl-bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .quad-lbl-left { left: 10px; top: 50%; transform: translateY(-50%); }
  .quad-lbl-right { right: 10px; top: 50%; transform: translateY(-50%); }
  .quad-node { position: absolute; transform: translate(-50%, -50%); cursor: pointer;
    width: 46px; height: 46px; z-index: 3; transition: transform .15s; }
  .quad-node:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 4; }
  .quad-node img { width: 100%; height: 100%; object-fit: cover; display: block;
    border: 1px solid rgba(0,0,0,0.15); background: #fff; }
  .quad-node .quad-cap { position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 2px; font-size: 9px; white-space: nowrap; color: var(--ink);
    text-shadow: 0 1px 4px rgba(255,255,255,0.9); pointer-events: none; }
  .quad-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--dim); text-align: center; padding: 0 24px; }
  /* ---- 오늘의 기분 정렬 패널 (기본 숨김, 열리면 지도 위 오버레이 시트) ---- */
  #moodSortPanel { display: none; }
  #moodSortPanel.open { display: block; }
  .mood-head { display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0 10px; border-bottom: 1px solid var(--line); margin-bottom: 12px; }
  .mood-title { font-size: 13px; font-weight: 500; }
  .mood-close { background: none; border: 1px solid var(--line); border-radius: 4px;
    width: 30px; height: 30px; font-size: 14px; line-height: 1; cursor: pointer; padding: 0; }
  .mood-close:hover { background: var(--panel); }
  .mood-body { display: flex; gap: 24px; align-items: flex-start; }
  .mood-plane-col { flex: 0 0 300px; max-width: 100%; }
  #moodList { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 6px; }
  /* 맵 풀스크린일 때 패널을 지도 위 카드로 띄운다 (데스크톱·모바일 공통) */
  body.map-full #moodSortPanel.open {
    position: fixed; z-index: 1300; background: rgba(255,255,255,0.98);
    border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    padding: 16px; top: calc(var(--hdrH, 96px) + 12px); right: 12px; width: 620px; max-width: calc(100vw - 24px);
    max-height: calc(100vh - var(--hdrH, 96px) - 24px); overflow-y: auto; }
  /* ---- 건물 직접 그리기 오버레이 ---- */
  #drawOverlay { display: none; position: fixed; inset: 0; z-index: 3000; background: var(--bg);
    flex-direction: column; }
  #drawOverlay.open { display: flex; }
  .draw-top { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 8px; }
  .draw-title { font-size: 13px; font-weight: 500; }
  .draw-x { background: none; border: 1px solid var(--line); border-radius: 4px;
    width: 32px; height: 32px; font-size: 15px; cursor: pointer; padding: 0; }
  .draw-hint { font-size: 12px; color: var(--dim); margin: 0 16px 8px; line-height: 1.5; }
  #drawMap { flex: 1; min-height: 0; width: 100%; }
  #drawMap { cursor: crosshair; }
  .draw-bottom { padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--line); background: var(--bg); }
  .draw-levels { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .draw-levels label { font-size: 13px; color: var(--dim); flex: 0 0 auto; }
  .draw-levels-unit { font-size: 13px; color: var(--dim); flex: 0 0 auto; }
  .draw-actions { display: flex; gap: 10px; }
  .draw-actions > * { flex: 1; min-height: 44px; }
  .draw-err { color: #c0392b; font-size: 12px; margin-top: 8px; min-height: 16px; }
  .float-word { position: absolute; color: rgba(17,17,17,0.85); font-size: 15px;
    text-shadow: 0 1px 6px rgba(255,255,255,0.9); animation: floatDrift 14s ease-in-out infinite alternate; }
  @keyframes floatDrift {
    0% { transform: translate(0, 0); opacity: 0.5; }
    50% { opacity: 1; }
    100% { transform: translate(26px, -34px); opacity: 0.6; }
  }
  .out-block { margin: 26px 0; }
  .out-block h2 { font-size: 15px; margin: 0 0 4px; }
  .out-block p { font-size: 12px; color: var(--dim); margin: 0 0 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border: 1px solid var(--line);
    border-radius: 2px; color: var(--dim); margin-left: 6px; vertical-align: middle; background: #fff; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--line);
    border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 노드 보드 (참조 이미지 스타일) */
  #boardSvg { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; }
  .board-card { position: absolute; width: 96px; background: #fff; border: 1px solid #d7d7da;
    border-radius: 2px; padding: 4px; cursor: pointer; }
  .board-card .bc-label { font-size: 9px; color: #555; padding: 1px 2px 3px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .board-card img { width: 100%; display: block; border-radius: 2px; background: #000; }
  /* 매스 실루엣 노드 — 배경 없이 투명 PNG 그대로 (매스만) */
  .board-mass { position: absolute; width: 120px; cursor: pointer; text-align: center; }
  .board-mass img { width: 100%; display: block; background: transparent; }
  .board-mass .bm-label { font-size: 10px; color: #444; margin-bottom: 2px; }
  .lc-node { background: none; border: none; cursor: pointer; text-align: center; }
  .lc-node .bm-label { font-size: 11px; color: #444; margin-bottom: 2px; white-space: nowrap; }
  .lc-edge-label { font-size: 10px; color: #a5a8ad; background: rgba(255,255,255,0.85);
    padding: 0 4px; border-radius: 2px; white-space: nowrap; }
  .leaflet-container { background: #fff; font-family: inherit; }
  .board-edge-label { font-size: 9px; fill: #8a8f95; }

  /* ---- 앱 맵 풀스크린: 헤더 아래 = [상단 컨트롤 바] + [지도/평면 영역] 세로 스택 ---- */
  body.map-full { overflow: hidden; }
  body.map-full #step97 {
    padding: 0; max-width: none;
    height: calc(100vh - var(--hdrH, 112px));
    display: flex; flex-direction: column; overflow: hidden;
  }
  body.map-full #step97 > h1, body.map-full #step97 > .sub { display: none; }
  /* 컨트롤 바 — 흐름 상단(fixed 아님), 콘텐츠 높이만 차지 → 겹침 원천 제거 */
  body.map-full #mapControlBar {
    flex: 0 0 auto; display: flex; flex-direction: column; gap: 6px;
    padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--line);
    max-height: 42vh; overflow-y: auto; z-index: 2;
  }
  body.map-full #massCats .mass-cat { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  body.map-full #emotionFilter:empty { display: none; }
  body.map-full #mapStatus:empty, body.map-full #shareStatus:empty { display: none; }
  body.map-full #mapStatus, body.map-full #shareStatus { font-size: 11px; }
  /* 지도/평면 영역 — 나머지 공간 전부. min-height:0 필수(flex 자식 축소 허용) */
  body.map-full #mapStage { flex: 1; min-height: 0; position: relative; }
  body.map-full #mapView, body.map-full #globeView {
    position: absolute !important; inset: 0;
    width: 100% !important; height: 100% !important;
    border: none !important; border-radius: 0 !important; z-index: 1;
  }
  body.map-full #globeView { background: #fff; }
  body.map-full #quadView { z-index: 3; } /* 지도(1) 위에 확실히 표시 */
  body.map-full #scaleGauge { display: none !important; }
  body.map-full #back97Row { display: none; }
  /* ---- 보드 공유 뷰어 (?board=) — 풀스크린 보드 + 떠 있는 카테고리 ---- */
  body.board-viewer #step97 { max-width: none; width: 100%; padding: 0; margin: 0; }
  body.board-viewer #step97 > h1,
  body.board-viewer #step97 > .sub,
  body.board-viewer #step97 .row,
  body.board-viewer #step97 .status { display: none !important; }
  /* iframe 임베드 시 세로 스크롤바가 생기면 100vw가 스크롤바까지 포함해 지도가
     오른쪽으로 넘쳐 줌 버튼/로고가 잘린다 → 100%(부모 폭, 스크롤바 제외)로. */
  body.board-viewer { overflow: hidden !important; }
  body.board-viewer #mapView {
    position: fixed !important; inset: 0; width: 100% !important; height: 100% !important;
    border: none !important; border-radius: 0 !important; z-index: 1;
  }
  /* 감정 좌표 뷰도 전체 화면 (mapView와 같은 영역) */
  body.board-viewer #quadView {
    position: fixed !important; inset: 0; border: none; border-radius: 0; z-index: 3;
  }
  body.board-viewer #massCats {
    position: fixed; top: 12px; left: 12px; right: 150px; z-index: 1200;
    margin: 0; padding-bottom: 0;
  }
  body.board-viewer #massCats .mass-cat { box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
  /* 방문자 뷰어 — 뷰 전환(보드/감정)만 우상단에. 나머지 컨트롤은 숨김 */
  body.board-viewer #mapCtrlRow {
    display: flex !important; position: fixed; top: 12px; right: 12px; z-index: 1200;
    margin: 0; width: auto;
  }
  body.board-viewer #viewSelect { box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
  body.board-viewer #moodSortBtn,
  body.board-viewer #shareToggleBtn,
  body.board-viewer #emotionFilter { display: none !important; }
  body.board-viewer #scaleGauge { position: fixed !important; z-index: 1200; }
  body.board-viewer #langBar, body.board-viewer #buildTag { display: none; }
  .info-line { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .rec-info .info-line:first-child { padding-top: 0; } /* 제목·날짜와 상단 라인 정렬 */
  .info-k { flex: none; width: 110px; color: var(--dim); }
  .info-v { flex: 1; color: var(--ink); line-height: 1.5; }
  /* ---- My liquid cities 리스트 (참조: 썸네일/제목/본문/날짜·날씨) ---- */
  .rec-row { display: flex; gap: 28px; padding: 26px 0; border-bottom: 1px solid var(--line);
    align-items: flex-start; cursor: pointer; }
  .rec-thumb { flex: 0 0 240px; }
  .rec-thumb img { width: 100%; display: block; }
  .rec-thumb .rec-noimg { width: 100%; height: 150px; background: var(--panel);
    display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 12px; }
  .rec-mid { flex: 0 0 180px; min-width: 0; }
  .rec-info { flex: 1 1 380px; min-width: 300px; margin-left: 56px; }
  .rec-title { font-size: 15px; font-weight: 500; text-decoration: underline;
    text-underline-offset: 3px; margin: 0 0 12px; letter-spacing: 0.02em; line-height: 1.2; }
  .rec-body { font-size: 13px; line-height: 1.7; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    margin: 0 0 12px; white-space: pre-wrap; }
  .rec-more { font-size: 13px; text-decoration: underline; color: var(--ink); }
  .rec-side { flex: 0 0 140px; text-align: left; font-size: 13px; color: var(--ink); }
  .rec-side .rec-weather { font-size: 22px; margin-top: 14px; }
  .rec-side .rec-del { margin-top: 18px; font-size: 11px; color: var(--dim);
    text-decoration: underline; cursor: pointer; }
  @media (max-width: 600px) {
    .rec-row { flex-wrap: wrap; gap: 12px; }
    .rec-thumb { flex: 0 0 100%; }
    .rec-side { flex: 1; }
    .rec-info { flex: 1 1 100%; min-width: 0; margin-left: 0; }
  }
  /* ---- 제작 플로우: 좌측 고정 디렉션 + 우측 입력 (참조: thinkjane.com/hi-cella) ---- */
  @media (min-width: 900px) {
    .step.flow.active { display: grid; grid-template-columns: minmax(240px, 360px) 1fr;
      column-gap: 56px; align-items: start; }
    .step.flow > * { grid-column: 2; }
    /* 제목과 보조 설명은 같은 셀에 겹쳐 배치해 항상 붙어 있게 —
       행 높이가 우측 콘텐츠를 따라 늘어나도 벌어지지 않는다 */
    .step.flow > h1 { grid-column: 1; grid-row: 1; align-self: start; }
    .step.flow > .direction { grid-column: 1; grid-row: 1; align-self: start;
      margin-top: 24px; }
  }
  /* ---- 공통 헤더 (스케치 확정: 1행 로고 / 2행 메뉴 4개) ---- */
  /* 헤더 — thinkjane.com 사양: 13px, 로고 500/링크 400, rgba(0,0,0,.75),
     좌우 26px 여백의 풀폭 룰. 페이지가 바뀌어도 고정값 불변 */
  #appHeader { width: 100%; background: var(--bg); position: sticky; top: 0; z-index: 900;
    padding-top: 26px; font-size: 13px; color: rgba(0,0,0,0.75); }
  #appHeader .hdr-row { width: 100%; margin: 0; padding: 9px 26px; }
  #appHeader .hdr-logo { font-weight: 500; font-size: 13px;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  #appHeader .hdr-menu { border-bottom: 1px solid var(--line); display: flex; gap: 8px; }
  #appHeader .hdr-link { flex: 1; font-weight: 400; font-size: 13px; cursor: pointer;
    color: rgba(0,0,0,0.75); text-decoration: underline; text-underline-offset: 3px; }
  #appHeader .hdr-link:hover { opacity: 0.6; }
  #appHeader #hdrLang { font-size: 13px; color: rgba(0,0,0,0.75); }
  body.board-viewer #appHeader { display: none; }
  /* 페이지 좌상단 뒤로가기 */
  .back-top { display: block; margin: 0 0 14px; }
  .back-top button { padding: 6px 14px; font-size: 14px; }
  .back-arrow { display: none !important; } /* 브라우저 뒤로가기로 대체 (사용자 확정) */
  .row:has(> .back-arrow:only-child) { display: none; } /* 화살표 단독 행만 — 확인 버튼이 함께 있으면 유지 */
  /* ---- 폰 최적화 ---- */
  @media (max-width: 600px) {
    body { padding: 0 0 40px; }
    h1 { font-size: 19px; }
    .row { flex-wrap: wrap; }
    .row button { flex: 1 1 45%; min-height: 44px; } /* 터치 타깃 44px */
    .canvas-wrap { max-width: 100% !important; }
    #mapView { height: min(560px, 62vh) !important; }
    .saved-item { flex-wrap: wrap; }
    .saved-item span { flex: 1 1 100%; }
    /* 맵 풀스크린 모바일 — 컨트롤 바가 flex column이라 자동으로 세로 스택.
       카테고리만 한 줄 가로 스크롤 유지. (fixed 오버레이는 데스크톱과 공통으로 제거됨) */
    body.map-full #massCats { flex-wrap: nowrap; }
    body.map-full #mapControlBar { max-height: 46vh; }
    /* 오늘의 기분 패널: 화면 하단에서 올라오는 바텀시트 (닫기 버튼 포함) */
    body.map-full #moodSortPanel.open {
      top: auto; right: 0; left: 0; width: 100%; max-width: 100%;
      bottom: 0; border-radius: 14px 14px 0 0; padding: 14px 14px 20px;
      max-height: 82vh; box-shadow: 0 -4px 24px rgba(0,0,0,0.22);
    }
    #moodSortPanel .mood-body { flex-direction: column; gap: 14px; }
    #moodSortPanel .mood-plane-col { flex: none; width: 100%; }
    #moodSortPanel #moodPlaneWrap { max-width: 260px; margin: 0 auto; }
  }

  /* ============================================================
     타이포 위계 시스템 (사용자 확정)
     최상위 = 헤더 로고 13px / 500. 그보다 크거나 굵은 UI 텍스트 금지.
       레벨 1  13px / 500  로고 · 페이지 제목(h1) · 리스트 제목 · 섹션 제목
       레벨 2  13px / 400  메뉴 · 버튼 · 입력 · 값
       레벨 3  13px / 300  본문 · 설명
       레벨 4  11px / 300~400  캡션 · 뱃지 · 상태
     (산출물 캔버스 내부 텍스트는 작품 스펙 — 이 시스템의 대상 아님)
     ============================================================ */
  h1 { font-size: 13px !important; font-weight: 500 !important; letter-spacing: 0 !important; margin: 0 0 8px; }
  .rec-title { font-size: 13px; font-weight: 500; }
  .out-block h2 { font-size: 13px; font-weight: 500; }
  .sec-title { font-size: 13px; font-weight: 500; margin: 30px 0 8px; max-width: 640px; }
  button { font-size: 13px; font-weight: 400; }
  input[type=text], input[type=number], input[type=email], input[type=password], textarea {
    font-size: 13px; font-weight: 400; }
  .sub, .hint, .status, .rec-body { font-size: 13px; font-weight: 300; }
  .float-word { font-size: 13px !important; }
  .info-line, .rec-side { font-size: 13px; }
  /* iOS는 입력 16px 미만이면 포커스 시 강제 줌 — 터치 기기에서만 16px */
  @media (pointer: coarse) {
    input[type=text], input[type=number], input[type=email], input[type=password], textarea { font-size: 16px; }
  }

  /* ============================================================
     로그인 게이트 — 로그인 전(body.lc-locked)에는 로그인 화면(step0)만
     보이고 헤더·푸터·다른 모든 step·설정 패널을 전부 숨긴다.
     초기 로드부터 잠겨 있어 async 세션 확인 중에도 앱이 노출되지 않는다.
     로그인 성공/기존 세션 확인 시 JS가 lc-locked를 제거한다.
     (공유 뷰어 ?board= 는 board-viewer 클래스로 별도 처리되며 잠금 해제됨)
     ============================================================ */
  body.lc-locked #appHeader,
  body.lc-locked #appFooter,
  body.lc-locked #cfgPanel { display: none !important; }
  body.lc-locked .step { display: none !important; }
  body.lc-locked #step0 { display: block !important; }
  body.lc-locked #step0.flow.active { display: block !important; } /* 그리드 대신 단순 블록으로 */
</style>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body class="lc-locked">

<!-- 언어 전환 (향후 언어 추가는 I18N 딕셔너리에 항목만 추가하면 됨) -->

<header id="appHeader">
  <div class="hdr-row hdr-logo" style="display:flex; justify-content:space-between; align-items:center">
    <span id="hdrLogo" style="cursor:pointer">→ Liquid Cities Project</span>
    <span id="hdrLang" style="cursor:pointer; font-weight:300">
      <span id="langEn2">EN</span> / <span id="langKo2">KO</span>
    </span>
  </div>
  <nav class="hdr-row hdr-menu">
    <span class="hdr-link" id="hdrMap">Map</span>
    <span class="hdr-link" id="hdrMy">My Cities</span>
    <span class="hdr-link" id="hdrMass">Mass</span>
    <span class="hdr-link" id="hdrPage">My page</span>
  </nav>
</header>
<div id="cfgPanel" style="display:none; position:fixed; bottom:70px; right:12px; z-index:20;
  background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; width:320px; box-shadow:0 4px 18px rgba(0,0,0,0.12)">
  <p class="hint" data-i18n="cfgKeyHint" style="margin:0 0 10px"></p>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
  <div class="row">
    <button id="apiKeySave" data-i18n="btnSave" style="padding:8px 14px; font-size:12px"></button>
    <button id="apiKeyClear" class="secondary" data-i18n="btnDelete" style="padding:8px 14px; font-size:12px"></button>
  </div>
  <div class="status" id="apiKeyStatus" style="margin-top:8px"></div>

  <hr style="border:none; border-top:1px solid var(--line); margin:14px 0">
  <p class="hint" data-i18n="cfgVworldHint" style="margin:0 0 10px"></p>
  <input type="password" id="vworldKeyInput" placeholder="VWorld key">
  <div class="row">
    <button id="vworldKeySave" data-i18n="btnSave" style="padding:8px 14px; font-size:12px"></button>
    <button id="vworldKeyClear" class="secondary" data-i18n="btnDelete" style="padding:8px 14px; font-size:12px"></button>
  </div>
  <div class="status" id="vworldKeyStatus" style="margin-top:8px"></div>

  <hr style="border:none; border-top:1px solid var(--line); margin:14px 0">
  <p class="hint" data-i18n="cfgSbHint" style="margin:0 0 10px"></p>
  <input type="text" id="sbUrlInput" placeholder="https://xxxx.supabase.co">
  <div class="row"><input type="password" id="sbKeyInput" placeholder="anon key (eyJ...)"></div>
  <div class="row">
    <button id="sbSave" data-i18n="btnSave" style="padding:8px 14px; font-size:12px"></button>
    <button id="sbClear" class="secondary" data-i18n="btnDelete" style="padding:8px 14px; font-size:12px"></button>
  </div>
  <div class="status" id="sbStatus" style="margin-top:8px"></div>
  <div id="sbLinkBox" style="display:none; margin-top:10px">
    <input type="text" inputmode="email" id="sbEmailInput" data-ph="phCEmail" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div class="row">
      <button id="sbLinkBtn" class="secondary" data-i18n="btnLinkEmail" style="padding:8px 14px; font-size:12px"></button>
      <button id="sbLoginBtn" class="secondary" data-i18n="btnMagicLogin" style="padding:8px 14px; font-size:12px"></button>
    </div>
  </div>
</div>

<!-- STEP 0: 로그인 (Supabase 설정 시에만 표시) -->
<section class="step flow" id="step0">
  <h1>Liquidcities</h1>
  <p class="sub direction" data-i18n="s0Sub"></p>
  <!-- Email·Password를 한 셀로 묶어 그리드가 둘 사이를 벌리지 않게 -->
  <div style="max-width:640px">
    <input type="text" inputmode="email" id="loginEmail" data-ph="phCEmail"
      autocomplete="email" autocapitalize="off" autocorrect="off" spellcheck="false">
    <input type="password" id="loginPw" data-ph="phPw" autocomplete="current-password" style="margin-top:8px">
  </div>
  <div class="row">
    <button id="pwLoginBtn" data-i18n="btnPwLogin"></button>
  </div>
  <p class="hint" data-i18n="s0PwHint"></p>
  <div class="status" id="loginStatus"></div>
</section>

<!-- STEP 1: 주소 검색 -->
<section class="step flow active" id="step1">
  <h1 data-i18n="s1Title"></h1>
  <p class="sub direction" data-i18n="s1Sub"></p>


  <!-- 통합 검색: 창 하나 + 입력 중 추천 목록에서 선택 (사용자 확정) -->
  <div id="uniForm" style="margin-top:14px; position:relative">
    <input type="text" id="uniInput" data-ph="phUni" autocomplete="off">
    <div id="uniSuggest" style="display:none; border:1px solid var(--line); border-top:none;
      max-width:640px; background:#fff; max-height:300px; overflow-y:auto"></div>
    <div class="row">
      <input type="text" id="unitInput2" data-ph="phUnit">
    </div>
    <div class="row">
      <button id="uniSearchBtn" data-i18n="btnFind"></button>
    </div>
    <!-- 저장된 매스 바로가기 — 누르면 그 매스로 시작 -->
    <div id="quickMasses" style="display:flex; gap:12px; margin-top:18px; overflow-x:auto; max-width:640px"></div>
  </div>

  <div class="row" style="margin-top:0; display:none">
    <button id="tabStruct" class="secondary" style="opacity:1" data-i18n="tabStruct"></button>
    <button id="tabSimple" class="secondary" style="opacity:0.5" data-i18n="tabSimple"></button>
  </div>

  <!-- 구조화 검색 (레거시 — 통합 검색으로 대체, 숨김) -->
  <div id="structForm" style="display:none; margin-top:14px">
    <input type="text" id="countryInput" list="countryList" data-ph="phCountry">
    <datalist id="countryList">
      <option value="South Korea">한국</option>
      <option value="United Kingdom">영국</option>
      <option value="Singapore">싱가포르</option>
      <option value="United States">미국</option>
      <option value="Japan">일본</option>
      <option value="France">프랑스</option>
      <option value="Germany">독일</option>
    </datalist>
    <div class="row">
      <input type="text" id="postcodeInput" data-ph="phPostcode">
    </div>
    <div class="row">
      <input type="text" id="streetInput" data-ph="phStreet">
    </div>
    <div class="row">
      <input type="text" id="unitInput" data-ph="phUnit">
    </div>
    <div class="row">
      <button id="structSearchBtn" data-i18n="btnFind"></button>
    </div>
  </div>

  <!-- 간편 검색 (자유형식 한 줄) -->
  <div id="simpleForm" style="display:none; margin-top:14px">
    <input type="text" id="addrInput" data-ph="phAddr">
    <div class="row">
      <button id="searchBtn" data-i18n="btnSearch"></button>
    </div>
  </div>

  <div class="err" id="searchErr"></div>
  <div class="manual-box" id="manualBox">
    <p class="sub" style="margin-bottom:12px" data-i18n="manualMsg"></p>
    <div class="row" style="margin-top:0">
      <input type="number" id="manualLat" step="any" data-ph="phLat">
      <input type="number" id="manualLon" step="any" data-ph="phLon">
    </div>
    <div class="row">
      <button id="manualBtn" class="secondary" data-i18n="btnUseLoc"></button>
    </div>
  </div>
  <div class="status" id="searchStatus"></div>
</section>

<!-- STEP 2: 건물 매스 확인 (드래그로 뷰 회전 → 확인으로 고정) -->
<section class="step flow" id="step2">
  <h1 data-i18n="s2Title"></h1>
  <p class="sub direction" id="buildingInfo"></p>
  <p class="hint" data-i18n="massHint"></p>
  <div class="canvas-wrap square"><canvas id="massCanvas" width="1080" height="1920" style="cursor:grab"></canvas></div>
  <div class="row">
    <button id="backToSearchBtn" class="secondary" data-i18n="btnAgain"></button>
    <button id="drawMassBtn" class="secondary" data-i18n="btnDrawMass"></button>
    <button id="confirmMassBtn" data-i18n="btnConfirm"></button>
  </div>
</section>

<!-- 건물 직접 그리기 오버레이 (위성 위에서 외곽선을 점으로 찍기) -->
<div id="drawOverlay">
  <div class="draw-top">
    <span class="draw-title" data-i18n="drawTitle"></span>
    <button id="drawCloseBtn" class="draw-x" aria-label="close">✕</button>
  </div>
  <p class="draw-hint" data-i18n="drawHint"></p>
  <div id="drawMap"></div>
  <div class="draw-bottom">
    <div class="draw-levels">
      <label data-i18n="drawLevelsLabel"></label>
      <input type="range" id="drawLevels" min="1" max="60" step="1" value="3" style="flex:1">
      <input type="number" id="drawLevelsNum" min="1" max="60" value="3" style="flex:0 0 70px; text-align:center">
      <span class="draw-levels-unit" data-i18n="drawLevelsUnit"></span>
    </div>
    <div class="draw-actions">
      <button id="drawUndoBtn" class="secondary" data-i18n="btnUndo"></button>
      <button id="drawDoneBtn" data-i18n="btnDrawDone"></button>
    </div>
    <div class="draw-err" id="drawErr"></div>
  </div>
</div>

<!-- STEP 3: 미디어 업로드 -->
<section class="step flow" id="step3">
  <h1 data-i18n="s3Title"></h1>
  <p class="sub direction" data-i18n="s3Sub"></p>
  <input type="file" id="mediaInput" accept="image/*,video/*">
  <div class="err" id="mediaErr"></div>
  <div class="row">
    <button id="back3Btn" class="secondary back-arrow">&lt;</button>
  </div>
</section>

<!-- STEP 4: 위치/크기 조절 -->
<section class="step flow" id="step4">
  <h1 data-i18n="s4Title"></h1>
  <p class="sub direction" data-i18n="s4Sub"></p>
  <div class="canvas-wrap square"><canvas id="editorCanvas" width="1080" height="1920"></canvas></div>
  <p class="hint" id="captureInfo" style="margin-top:10px"></p>
  <!-- 촬영일 직접 수정 (EXIF가 없거나 틀렸을 때) -->
  <div class="row" id="dateEditRow" style="align-items:center; margin-top:6px; gap:8px">
    <label class="hint" data-i18n="editDateLabel" style="flex:0 0 auto; margin:0"></label>
    <input type="date" id="mediaDateInput" style="flex:0 0 auto">
  </div>
  <div id="clipRow" style="display:none; margin-top:12px">
    <p class="hint" data-i18n="clipHint" style="margin:0 0 6px"></p>
    <input type="range" id="clipSlider" min="0" max="0" step="0.1" value="0" style="width:100%">
    <div class="status" id="clipLabel"></div>
  </div>
  <div class="status" id="soundHint"></div>
  <div class="row">
    <button id="back4Btn" class="secondary back-arrow">&lt;</button>
    <button id="soundBtn" class="secondary" style="display:none"></button>
    <button id="pauseBtn" class="secondary" style="display:none"></button>
    <button id="resetBtn" class="secondary" data-i18n="btnReset"></button>
    <button id="confirmPosBtn" data-i18n="btnConfirm"></button>
  </div>
</section>

<!-- STEP 5: 스케일 평가 + 순간에 대한 생각(데이터 전용) + 한 단어(이미지 노출) -->
<!-- STEP 45: 썸네일 장면 선택 (영상 전용) -->
<section class="step flow" id="step45">
  <h1 data-i18n="s45Title"></h1>
  <p class="sub direction" data-i18n="frameHint"></p>
  <div class="canvas-wrap square"><canvas id="thumbPreview" width="1080" height="1920"></canvas></div>
  <input type="range" id="frameSlider" min="0" max="1000" value="500" style="width:100%; margin-top:14px">
  <div class="row">
    <button id="next45Btn" data-i18n="btnNext"></button>
  </div>
</section>

<!-- STEP 5: 감정 태그 (최대 2개) -->
<section class="step flow" id="step5">
  <h1 data-i18n="s5Title"></h1>
  <p class="sub direction" data-i18n="emotionSub"></p>
  <!-- 감정 태그 칩 (JS가 7개 렌더, 최대 2개 선택) -->
  <div id="emotionChips" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; max-width:640px"></div>
  <div class="status" id="emotionErr" style="color:#c0392b"></div>
  <div class="row">
    <button id="next5Btn" data-i18n="btnNext"></button>
  </div>
</section>

<!-- STEP 5b: 감정 좌표 평면 (선택 태그 평균으로 점 자동 배치, 눌러서 조정) -->
<section class="step flow" id="step5b">
  <h1 data-i18n="planeTitle"></h1>
  <p class="sub direction" data-i18n="planeSub"></p>
  <div id="emoPlaneWrap" class="emo-plane">
    <div class="emo-axis-x"></div>
    <div class="emo-axis-y"></div>
    <span class="emo-lbl emo-lbl-top" data-i18n="emoAxisYPos"></span>
    <span class="emo-lbl emo-lbl-bottom" data-i18n="emoAxisYNeg"></span>
    <span class="emo-lbl emo-lbl-left" data-i18n="emoAxisXNeg"></span>
    <span class="emo-lbl emo-lbl-right" data-i18n="emoAxisXPos"></span>
    <div id="emoPlaneDot" class="emo-dot"></div>
  </div>
  <div class="row" style="justify-content:space-between; max-width:360px; margin-left:auto; margin-right:auto">
    <button id="back5bBtn" class="secondary" data-i18n="btnBack"></button>
    <button id="next5bBtn" data-i18n="btnNext"></button>
  </div>
</section>

<!-- STEP 51: 이 순간에 대한 생각 (필수) -->
<section class="step flow" id="step51">
  <h1 data-i18n="thoughtTitle"></h1>
  <p class="sub direction" data-i18n="thoughtSub"></p>
  <textarea id="momentThought" data-ph="phThought"></textarea>
  <div class="row">
    <button id="thoughtTranslateBtn" class="secondary" data-i18n="btnTranslate"></button>
  </div>
  <div id="thoughtTranslateResult" style="display:none; margin-top:12px; padding:14px; border:1px dashed var(--line); border-radius:8px">
    <p class="hint" id="thoughtTranslatedLines" style="margin:0 0 10px; color:var(--ink); line-height:1.7"></p>
    <div class="row" style="margin-top:0">
      <label style="flex:1; display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink); cursor:pointer">
        <input type="radio" name="thoughtLang" value="original" checked style="width:auto">

function syncHdrH() {

function goto(n, opts) {
  steps.forEach(s => s.classList.toggle('active', s.id === 'step' + n));
  // 맵은 헤더 아래 풀스크린 — 컨트롤은 맵 위 오버레이
  document.body.classList.toggle('map-full', n === 97 && !document.body.classList.contains('board-viewer'));
  syncHdrH();
  if (n === 97 && lcMap) setTimeout(() => lcMap.invalidateSize(), 120);
  if (n === 97) { try { refreshShareState(); } catch (e) {} } // 공유 토글 라벨 최신화
  if (n === 5) { try { renderEmotionChips(); } catch (e) {} } // 감정 태그 칩 최신 상태로
  if (n === '5b') { try { avgPosition(); renderPlaneDot(); } catch (e) {} } // 평면 진입 시 점 배치
  // 브라우저 뒤로가기(스와이프 포함)로 단계를 되돌릴 수 있게 히스토리에 기록
  if (!opts || opts.push !== false) {
    if (!history.state || history.state.step !== n) history.pushState({ step: n }, '');
  }
  window.scrollTo(0, 0);
}
window.addEventListener('popstate', e => {
  const n = e.state && e.state.step;
  if (n === undefined || n === null) return;
  if (n === 3) document.getElementById('mediaInput').value = ''; // 같은 파일 재선택 대비
  if (state.mediaType === 'video') { try { video.pause(); } catch (err) {} }
  goto(n, { push: false });
});

      const v = prompt(t('renameBuilding'), cur);
      if (v === null) return;
      const all = getSavedBuildings();
      const target = all.find(x => x.id === item.id);
      if (target) {
        if (v.trim()) target.customName = v.trim(); else delete target.customName;
        localStorage.setItem(LS_KEY, JSON.stringify(all));
        resyncBuilding(target); // 이름 변경도 서버 반영
        // 맵의 매스 카테고리에도 같은 이름이 뜨게 (사용자 확정)
        try {
          const names = JSON.parse(localStorage.getItem('lc_mass_names')) || {};
          const mk = massKeyOf(target);
          if (v.trim()) names[mk] = v.trim(); else delete names[mk];
          localStorage.setItem('lc_mass_names', JSON.stringify(names));

        renderSavedList();

    });
    row.append(label, editBtn, loadBtn, delBtn);
    wrap.appendChild(row);
  });

function saveCurrentBuilding(view) {
  if (!state.building) return;
  // 확정(픽스)된 매스 뷰를 작은 썸네일로 아카이브 (108×192 JPEG, 항목당 수 KB)
  let thumb = null;
  if (state.massPngCanvas) {
    const tc = document.createElement('canvas');
    tc.width = 108; tc.height = 192;
    tc.getContext('2d').drawImage(state.massPngCanvas, 0, 0, 108, 192);
    thumb = tc.toDataURL('image/jpeg', 0.7);
  }
  const entry = {
    id: state.building.osmId || Date.now(),
    lat: state.lat, lon: state.lon,
    address: state.address, countryCode: state.countryCode,
    building: state.building,
    view: { yaw: view.yaw, pitch: view.pitch },
    thumb,
    savedAt: Date.now(),
  };
  const prev = getSavedBuildings().find(x => x.id === entry.id);
  if (prev && prev.customName) entry.customName = prev.customName; // 지정한 이름은 재확정해도 유지 (사용자 확정)
  if (prev && prev.serverId) deleteBuildingFromServer(prev); // 같은 건물 갱신 — 서버 구본 제거
  const list = getSavedBuildings().filter(x => x.id !== entry.id);
  list.unshift(entry);
  localStorage.setItem(LS_KEY, JSON.stringify(list.slice(0, 100))); // 최근 100개까지 (기기 간 동기화)
  syncBuildingToServer(entry);
  renderSavedList();
}

// ---- what3words: 3단어 주소 ↔ 좌표 (키는 관리자 설정 lc_w3w_key 또는 내장) ----
const DEFAULT_W3W_KEY = ''; // ← 운영자 w3w 키 내장 슬롯
const w3wKey = () => localStorage.getItem('lc_w3w_key') || DEFAULT_W3W_KEY;
// VWorld(한국 국토부 건물통합정보) 키 — OSM에 건물 없는 한국 주소의 실제 형태 자동 조회용.
// vworld.kr 무료 발급(도메인 liquidcities.io 등록) 후 아래에 내장. 도메인 제한이라 노출 무해.
const DEFAULT_VWORLD_KEY = '6E822EE8-CF89-3C28-9B0D-7330F3988388'; // 도메인(liquidcities.io) 제한 키
const vworldKey = () => localStorage.getItem('lc_vworld_key') || DEFAULT_VWORLD_KEY;
const W3W_RE = /^\s*\/{0,3}([^\s.\/]+)\.([^\s.\/]+)\.([^\s.\/]+)\s*$/u;
async function w3wToCoords(words) {
  if (!w3wKey()) return null;
  const r = await fetch(`https://api.what3words.com/v3/convert-to-coordinates?words=${encodeURIComponent(words)}&key=${w3wKey()}`);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message || j.error.code);
  return j.coordinates ? { lat: j.coordinates.lat, lon: j.coordinates.lng, nearest: j.nearestPlace } : null;
}
async function coordsToW3w(lat, lon) {
  if (!w3wKey()) return null;
  try {
    const r = await fetch(`https://api.what3words.com/v3/convert-to-3wa?coordinates=${lat}%2C${lon}&language=en&key=${w3wKey()}`);
    const j = await r.json();
    return j.words || null;
  } catch (e) { return null; }
}
// Nominatim 1회 조회 (limit=3, 첫 결과 사용)
async function nominatim(q) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=3&q=' + encodeURIComponent(q);
  const res = await fetch(url, { headers: { 'Accept-Language': lang === 'ko' ? 'ko,en' : 'en' } });
  if (!res.ok) throw new Error('Nominatim ' + res.status);
  const list = await res.json();
  return list.length ? list[0] : null;
}
// Nominatim 구조화 검색 — country/postalcode/street 파라미터는 자유형식 q=보다
// 훨씬 안정적으로 매칭된다 (예: postalcode=SW11 3PL & country=United Kingdom)
async function nominatimStruct(params) {
  const usp = new URLSearchParams({ format: 'json', addressdetails: '1', limit: '3', ...params });
  const res = await fetch('https://nominatim.openstreetmap.org/search?' + usp.toString(),
    { headers: { 'Accept-Language': lang === 'ko' ? 'ko,en' : 'en' } });
  if (!res.ok) throw new Error('Nominatim ' + res.status);
  const list = await res.json();
  return list.length ? list[0] : null;
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// 좌표 → 영어 주소 (reverse geocoding). 실패 시 null.
async function reverseGeocodeEn(lat, lon) {
  if (!isFinite(lat) || !isFinite(lon)) return null;
  const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  if (!res.ok) throw new Error('Nominatim ' + res.status);
  const data = await res.json();
  return (data && data.display_name) || null;
}
// 기존 기록의 한글 주소를 조용히 영어로 재변환.
// Nominatim 이용약관: 초당 1회 → 큐로 1건씩 1초 간격. 한 번만 시도(_addrEn 플래그).
const HANGUL = /[가-힣]/;
let addrQueueRunning = false;
function queueAddressEnglishization() {
  if (lang === 'ko') return;           // 한글 UI에서는 굳이 영어화하지 않음
  if (addrQueueRunning) return;
  addrQueueRunning = true;
  (async () => {
    try {
      // 기록(records)
      const recs = getRecords();
      for (const rec of recs) {
        if (rec._addrEn) continue;
        if (!rec.address || !HANGUL.test(rec.address)) { rec._addrEn = true; continue; }
        if (!isFinite(rec.lat) || !isFinite(rec.lon)) { rec._addrEn = true; continue; }
        try {
          const en = await reverseGeocodeEn(rec.lat, rec.lon);
          if (en) {
            // 접두 표기(동·호수 · )는 유지
            const prefix = rec.address.includes(' · ') ? rec.address.split(' · ')[0] + ' · ' : '';
            rec.address = prefix + en;
          }
          rec._addrEn = true;
          const l = getRecords(); const r2 = l.find(x => x.savedAt === rec.savedAt);
          if (r2) { r2.address = rec.address; r2._addrEn = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
          if (en) { resyncRecord(r2 || rec); try { renderRecList(); } catch (e) {} try { renderMapMarkers(); } catch (e) {} }
        } catch (e) { /* rate limit 등 — 다음 기회에 재시도(플래그 안 세움) */ }
        await sleep(1100);
      }
      // 건물 매스(buildings)
      const blds = getSavedBuildings();
      for (const b of blds) {
        if (b._addrEn) continue;
        if (!b.address || !HANGUL.test(b.address)) { b._addrEn = true; continue; }
        if (!isFinite(b.lat) || !isFinite(b.lon)) { b._addrEn = true; continue; }
        try {
          const en = await reverseGeocodeEn(b.lat, b.lon);
          if (en) b.address = en;
          b._addrEn = true;
          const l = getSavedBuildings(); const b2 = l.find(x => x.id === b.id);
          if (b2) { b2.address = b.address; b2._addrEn = true; localStorage.setItem(LS_KEY, JSON.stringify(l)); }
          if (en) { resyncBuilding(b2 || b); try { renderSavedList(); } catch (e) {} }
        } catch (e) {}
        await sleep(1100);
      }
    } finally { addrQueueRunning = false; }
  })();
}

// 상세 주소(flat/동·호수 등)가 끼면 지오코더가 0건을 주므로,
// 실패 시 점점 단순한 형태로 자동 재시도한다.
function searchVariants(q) {
  const out = [q];
  // ① flat/apt/unit/suite + 번호, 한국식 동·호수 제거
  const cleaned = q
    .replace(/\b(flat|apt|apartment|unit|suite|room)\s*[\w-]*/gi, '')
    .replace(/\d+\s*동\s*\d*\s*호?/g, '')
    .replace(/\s{2,}/g, ' ').replace(/\s*,\s*,/g, ',').trim();
  if (cleaned && cleaned !== q) out.push(cleaned);
  // ② 쉼표 파트 재조합: 첫 파트 제거 / 마지막 두 파트
  const parts = q.split(',').map(x => x.trim()).filter(Boolean);
  if (parts.length >= 2) {
    out.push(parts.slice(1).join(', '));
    out.push(parts.slice(-2).join(', '));
  }
  // ③ 우편번호만 (영국식 또는 5~6자리 숫자)
  const pc = q.match(/\b[A-Za-z]{1,2}\d[A-Za-z\d]?\s*\d[A-Za-z]{2}\b/) || q.match(/\b\d{5,6}\b/);
  if (pc) out.push(pc[0]);
  return [...new Set(out.map(x => x.trim()).filter(x => x.length >= 3))];
}

// 입력 문자열에서 검색 후보들을 단계별로 생성:
// 1차 원문 → 2차 우편번호만 → 3차 호수/동호수 제거·토큰 축약
function buildQueryCandidates(q) {
  const cands = [{ q, label: '' }];

  // 우편번호 추출: 영국식(SW11 3PL) 또는 숫자형 5~6자리(한국/싱가포르)
  const ukPost = q.match(/\b[A-Za-z]{1,2}\d[A-Za-z\d]?\s*\d[A-Za-z]{2}\b/);
  const numPost = q.match(/\b\d{5,6}\b/);
  if (ukPost) cands.push({ q: ukPost[0].toUpperCase(), label: 'postcodeLoc' });
  else if (numPost) cands.push({ q: numPost[0], label: 'postcodeLoc' });

  // 호수/유닛 표기 제거: "Flat 19", "#04-22", "1201호", "107동 302호", "Apt 3B" 등
  let stripped = q
    .replace(/\b(flat|apt|apartment|unit|suite|ste|room)\s*[#]?\s*[\w-]+\b/gi, '')
    .replace(/#\s*[\d-]+/g, '')
    .replace(/\b\d+\s*동\s*\d+\s*호\b/g, '')
    .replace(/\b\d+\s*호\b/g, '')
    .replace(/\s{2,}/g, ' ').trim();
  if (stripped && stripped.toLowerCase() !== q.toLowerCase()) {
    cands.push({ q: stripped, label: 'approxLoc' });
  }

  // 토큰 축약: 앞쪽 상세 토큰을 덜어내고 뒤쪽(도시/국가) 위주로
  const tokens = stripped.split(/\s+/);
  if (tokens.length > 3) {
    cands.push({ q: tokens.slice(-3).join(' '), label: 'approxLoc' });
  }
  // 숫자 토큰(번지수 등) 제거 버전 — "모란로 65 삼부아파트" → "모란로 삼부아파트"
  const noNums = tokens.filter(t => !/^\d+$/.test(t));
  if (noNums.length && noNums.length !== tokens.length) {
    cands.push({ q: noNums.join(' '), label: 'approxLoc' });
  }
  // 마지막 수단: 가장 구체적인 이름 하나만 (한국식 "삼부아파트" 등, 마지막 토큰)
  if (tokens.length > 1) {
    const last = tokens[tokens.length - 1];
    if (!/^\d+$/.test(last)) cands.push({ q: last, label: 'approxLoc' });
  }
  // 중복 제거 + 최대 5개 (Nominatim 레이트리밋 고려)
  const seen = new Set();
  return cands.filter(c => {
    const k = c.q.toLowerCase();
    if (seen.has(k) || !c.q) return false;
    seen.add(k);
    return true;
  }).slice(0, 5);
}

async function proceedWithLocation(lat, lon) {
  state.lat = lat; state.lon = lon;
  searchStatus.textContent = t('stOverpass');
  try {
    let building = await fetchBuilding(lat, lon);          // 1순위: OSM (전세계)

      searchStatus.textContent = t('stVworld');
      building = await fetchBuildingVWorld(lat, lon);      // 2순위: VWorld (한국 건축물대장)
    }
    if (!building) {
      // OSM·VWorld 둘 다 없음(해외 등) — 위성 위에서 직접 그리도록 유도
      searchStatus.textContent = '';
      openDrawMass(lat, lon);
      return;
    }
    state.building = building;
    // 반경 데이터는 백그라운드로 조회 시작하되 promise를 보관 —
    // 산출물 화면 진입 시 (타임아웃 한도 내에서) 완료를 기다린다
    state.amenitiesPromise = fetchAmenities(lat, lon)
      .then(a => { state.amenities = a; return a; })
      .catch(() => null);

    searchStatus.textContent = t('stRender');
    startMassViewer(building);
    const srcLabel = building.source === 'vworld' ? t('vworldMass')
      : building.synthetic ? t('drawnMass')
      : (building.name || t('unnamedBuilding'));
    document.getElementById('buildingInfo').textContent =
      `${srcLabel} · ${t('infoLevels', building.levels)} · ${state.address}`;
    searchStatus.textContent = '';
    goto(2);
  } catch (e) {
    searchErr.textContent = t('errBuilding', e.message);
    searchErr.style.display = 'block';
    searchStatus.textContent = '';
  }
}

/* ============================================================
   Overpass — 건물 폴리곤 + 주변 어메니티
   ============================================================ */
// 공개 Overpass 서버는 종종 504를 반환하므로 미러 순차 폴백 + 1회 재시도
const OVERPASS_URLS = [
  'https://overpass-api.de/api/interpreter',       // 전 세계 데이터, ~2s
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter', // 전 세계, ~2s
  // 주의: 지역 한정 미러(overpass.osm.ch 등)는 해당 국가만 데이터가 있어
  // 다른 나라 건물이 0으로 나오므로 절대 넣지 않는다.
];
async function overpass(query) {
  let lastErr = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    for (const url of OVERPASS_URLS) {
      // 응답 없는 미러가 전체를 막지 않도록 요청별 12초 타임아웃 필수
      const ac = new AbortController();
      const timer = setTimeout(() => ac.abort(), 9000);
      try {
        const res = await fetch(url, {
          method: 'POST',
          body: 'data=' + encodeURIComponent(query),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          signal: ac.signal,
        });
        if (!res.ok) throw new Error('Overpass ' + res.status);
        return await res.json();
      } catch (e) { lastErr = e; }
      finally { clearTimeout(timer); }
    }
    await new Promise(r => setTimeout(r, 1500));
  }
  throw lastErr || new Error('Overpass unreachable');
}

async function fetchBuilding(lat, lon) {
  // 본체(building)와 부분(building:part)을 함께 조회. 지오코더 좌표가 큰 건물의
  // 중심에서 벗어날 수 있어 반경을 넓게(80→150→300m) 재시도한다.
  let allWays = [];
  for (const radius of [80, 150, 300]) {
    const q = `[out:json][timeout:25];
      (
        way["building"](around:${radius},${lat},${lon});
        way["building:part"](around:${radius},${lat},${lon});
      );
      out geom tags;`;
    const data = await overpass(q);
    allWays = data.elements.filter(e => e.type === 'way' && e.geometry && e.geometry.length >= 4);
    if (allWays.some(e => e.tags && e.tags.building)) break;
  }
  const partWays = allWays.filter(e => e.tags && e.tags['building:part']);
  const ways = allWays.filter(e => e.tags && e.tags.building);
  if (!ways.length) return null; // OSM에 건물 없음 → 호출부에서 '직접 그리기'로 유도

  // 포인트를 포함하는 폴리곤 우선, 없으면 중심점이 가장 가까운 것
  const inside = ways.find(w => pointInPolygon(lat, lon, w.geometry));
  const pick = inside || ways.reduce((best, w) => {
    const c = centroidLatLon(w.geometry);
    const d = haversine(lat, lon, c.lat, c.lon);
    return (!best || d < best.d) ? { w, d } : best;
  }, null).w;

  const tags = pick.tags || {};
  let levels = parseInt(tags['building:levels']) || null;
  let height = parseFloat(tags['height'] || tags['building:height']) || null;
  if (!levels && height) levels = Math.max(1, Math.round(height / 3.5));
  if (!levels) levels = 3;             // 태그가 전혀 없으면 3층 가정
  if (!height) height = levels * 3.5;

  // 로컬 미터 좌표 변환 (centroid 기준 equirectangular 근사) — 공유 헬퍼 사용
  const c = centroidLatLon(pick.geometry);
  const toLocal = g => llToLocal(c, g);
  const closeTrim = arr => {
    const [fx, fy] = arr[0], [lx2, ly2] = arr[arr.length - 1];
    if (Math.abs(fx - lx2) < 0.01 && Math.abs(fy - ly2) < 0.01) arr.pop();
    return arr;
  };
  const coords = closeTrim(pick.geometry.map(toLocal));

  // 본체 폴리곤 내부(중심점 기준)의 building:part들 — 굴뚝처럼 높이가 다른
  // 구조를 개별 압출하기 위해 파트별 {coords, height} 수집
  const parts = [];
  for (const pw of partWays) {
    const pc = centroidLatLon(pw.geometry);
    if (!pointInPolygon(pc.lat, pc.lon, pick.geometry)) continue;
    const pt = pw.tags || {};
    let ph = parseFloat(pt.height || pt['building:height']) || null;
    if (!ph) {
      const pl = parseInt(pt['building:levels']);
      ph = pl ? pl * 3.5 : height;
    }
    parts.push({ coords: closeTrim(pw.geometry.map(toLocal)), height: ph });
  }

  return { coords, levels, height, name: tags.name || null, osmId: pick.id,
           parts: parts.length >= 2 ? parts : null }; // 파트가 2개 이상일 때만 사용
}

// JSONP 요청 (CORS 우회) — VWorld처럼 fetch가 막힌 API용. script 태그 주입 + 콜백.
let _jsonpSeq = 0;
function jsonp(baseUrl, cbParamBuilder, timeoutMs = 8000) {
  return new Promise((resolve, reject) => {
    const cb = '__lcjsonp' + (++_jsonpSeq) + '_' + Math.floor(performance.now());
    const script = document.createElement('script');
    let done = false;
    const cleanup = () => {
      done = true;
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };
    const timer = setTimeout(() => { if (!done) { cleanup(); reject(new Error('jsonp timeout')); } }, timeoutMs);
    window[cb] = (data) => { if (done) return; cleanup(); resolve(data); };
    script.onerror = () => { if (!done) { cleanup(); reject(new Error('jsonp error')); } };
    script.src = baseUrl + (baseUrl.includes('?') ? '&' : '?') + cbParamBuilder(cb);
    document.head.appendChild(script);
  });
}

// VWorld WFS로 한국 건물 형태 자동 조회 (OSM에 건물 없을 때 폴백).
// 검색점 주변 BBOX의 lt_c_bldginfo 폴리곤 → 검색점 포함/최근접 하나를 매스로.
async function fetchBuildingVWorld(lat, lon) {
  const key = vworldKey();
  if (!key) return null; // 키 미설정이면 스킵 (다음 폴백=직접 그리기로)
  // 약 ±70m BBOX (위도 1도≈111km)
  const dLat = 70 / 111000;
  const dLon = 70 / (111000 * Math.cos(lat * Math.PI / 180));
  const bbox = [lat - dLat, lon - dLon, lat + dLat, lon + dLon].join(','); // EPSG:4326: ymin,xmin,ymax,xmax
  const url = 'https://api.vworld.kr/req/wfs';
  const build = (cb) => [
    'SERVICE=WFS', 'REQUEST=GetFeature', 'VERSION=1.1.0', 'TYPENAME=lt_c_bldginfo',
    'SRSNAME=EPSG:4326', 'output=text/javascript', 'FORMAT_OPTIONS=callback:' + cb,
    'MAXFEATURES=50', 'BBOX=' + bbox, 'key=' + encodeURIComponent(key),
    'domain=' + encodeURIComponent(location.hostname),
  ].join('&');
  let fc;
  try { fc = await jsonp(url, build); } catch (e) { return null; }
  const feats = (fc && fc.features) || [];
  if (!feats.length) return null;

  // GeoJSON 폴리곤 외곽 링([lon,lat]) → {lat,lon} 배열
  const ringOf = (f) => {
    const g = f.geometry; if (!g) return null;
    let ring = g.type === 'MultiPolygon' ? (g.coordinates[0] && g.coordinates[0][0])
             : g.type === 'Polygon' ? g.coordinates[0] : null;
    if (!ring || ring.length < 4) return null;
    return ring.map(c => ({ lon: c[0], lat: c[1] }));
  };
  const cand = feats.map(f => ({ f, ring: ringOf(f) })).filter(x => x.ring);
  if (!cand.length) return null;
  // 검색점 포함 폴리곤 우선, 없으면 중심 최근접
  let pick = cand.find(x => pointInPolygon(lat, lon, x.ring));
  if (!pick) pick = cand.reduce((best, x) => {
    const c = centroidLatLon(x.ring);
    const d = haversine(lat, lon, c.lat, c.lon);
    return (!best || d < best.d) ? { ...x, d } : best;
  }, null);
  const ring = pick.ring;
  const props = pick.f.properties || {};
  // 실제 VWorld lt_c_bldginfo 필드: grnd_flr(지상층수), height(높이 m), bld_nm(건물명)
  let levels = parseInt(props.grnd_flr) || null;
  let height = parseFloat(props.height) || null;
  if (!levels && height) levels = Math.max(1, Math.round(height / 3.5));
  if (!levels || levels < 1) levels = 3;
  if (!height || height < 1) height = levels * 3.5;
  const name = props.bld_nm || null;

  // 로컬 미터 좌표 변환 (공유 헬퍼)
  const c = centroidLatLon(ring);
  const closeTrim = arr => {
    const [fx, fy] = arr[0], [lx, ly] = arr[arr.length - 1];
    if (Math.abs(fx - lx) < 0.01 && Math.abs(fy - ly) < 0.01) arr.pop();
    return arr;
  };
  const coords = closeTrim(ring.map(g => llToLocal(c, g)));
  return {
    coords, levels, height, name,
    osmId: 'vworld:' + lat.toFixed(6) + ',' + lon.toFixed(6),
    parts: null, source: 'vworld', synthetic: true,
  };
}

async function fetchAmenities(lat, lon) {
  const q = `[out:json][timeout:25];
    ( node["highway"="bus_stop"](around:1000,${lat},${lon});
      node["railway"~"station|subway_entrance"](around:1000,${lat},${lon});
      node["amenity"~"^(restaurant|cafe)$"](around:1000,${lat},${lon}); );
    out body;
    ( way["leisure"="park"](around:5000,${lat},${lon});
      way["landuse"~"^(forest|grass|recreation_ground)$"](around:5000,${lat},${lon}); );
    out ids;`;
  const data = await overpass(q);
  let transitDistM = null, restaurants = 0, cafes = 0, parks = 0;
  for (const e of data.elements) {
    if (e.type === 'way') { parks++; continue; }
    const t = e.tags || {};
    if (t.amenity === 'restaurant') restaurants++;
    else if (t.amenity === 'cafe') cafes++;
    else {
      const d = haversine(lat, lon, e.lat, e.lon);
      if (transitDistM === null || d < transitDistM) transitDistM = d;
    }
  }
  return { transitDistM: transitDistM && Math.round(transitDistM), restaurants, cafes, parks };
}

function pointInPolygon(lat, lon, geom) {
  let inside = false;
  for (let i = 0, j = geom.length - 1; i < geom.length; j = i++) {
    const yi = geom[i].lat, xi = geom[i].lon, yj = geom[j].lat, xj = geom[j].lon;
    if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}
function centroidLatLon(geom) {
  let lat = 0, lon = 0;
  geom.forEach(g => { lat += g.lat; lon += g.lon; });
  return { lat: lat / geom.length, lon: lon / geom.length };
}
// 위경도 → 중심(center) 기준 로컬 미터 좌표 [x, y] (equirectangular 근사).
// building.coords와 startMassViewer가 쓰는 좌표계. fetchBuilding·그리기 공용.
function llToLocal(center, g) {
  const R = 6378137;
  return [
    (g.lon - center.lon) * Math.PI / 180 * R * Math.cos(center.lat * Math.PI / 180),
    (g.lat - center.lat) * Math.PI / 180 * R,
  ];
}
function haversine(la1, lo1, la2, lo2) {
  const R = 6371000, r = Math.PI / 180;
  const a = Math.sin((la2 - la1) * r / 2) ** 2 +
    Math.cos(la1 * r) * Math.cos(la2 * r) * Math.sin((lo2 - lo1) * r / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* ============================================================
   STEP 2 — Three.js 매스 뷰어 (인터랙티브)
   순수 매스만 (창문/문 없음), 검은 배경 + 흰 매스 + 1.5px 검은 외곽선(Line2)
   사용자가 드래그로 yaw/pitch를 돌려 원하는 각도를 고르고, 확인을 누르면
   그 시점의 뷰가 고정되어 마스크로 사용된다.
   건물은 어느 각도에서든 960×960 중앙 영역에 크롭 없이 자동 핏.
   ============================================================ */
const massCanvas = document.getElementById('massCanvas');
const massCanvasCtx = massCanvas.getContext('2d');
let massViewer = null;

function startMassViewer(building) {
  stopMassViewer();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff); // 미리보기 흰 배경 (외곽선은 검정 유지)
  // alpha:true — 확정 시 "외곽선만 있는 투명 레이어"(흰 배경 산출물용) 캡처에 필요
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true });
  renderer.setSize(CANVAS_W, CANVAS_H);
  renderer.setPixelRatio(1);

  // 압출 지오메트리 — building:part가 있으면(굴뚝 등 높이가 다른 구조)
  // 파트별로 개별 높이 압출, 없으면 본체 폴리곤 하나를 균일 압출
  const pieces = (building.parts && building.parts.length)
    ? building.parts
    : [{ coords: building.coords, height: building.height }];
  const meshes = [];
  const geometries = [];
  const group = new THREE.Group();
  const lineMat = new LineMaterial({ color: 0x000000, linewidth: 1.5, worldUnits: false });
  lineMat.resolution.set(CANVAS_W, CANVAS_H);
  // 매스를 전부 먼저 추가하고 선을 나중에 추가 — 렌더 순서가 곧 depth 기록
  // 순서라서, 섞어 추가하면 나중 매스가 앞선 선을 가리지 못해 내부 선이 비친다
  const lineObjs = [];
  for (const piece of pieces) {
    if (!piece.coords || piece.coords.length < 3) continue;
    const shape = new THREE.Shape();
    piece.coords.forEach(([x, y], i) => i === 0 ? shape.moveTo(x, y) : shape.lineTo(x, y));
    shape.closePath();
    const geometry = new THREE.ExtrudeGeometry(shape, { depth: piece.height, bevelEnabled: false });
    geometry.rotateX(-Math.PI / 2); // 높이를 Y축으로
    const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    group.add(mesh);
    meshes.push(mesh);
    geometries.push(geometry);
    // 1.5px 외곽선 — LineBasicMaterial의 linewidth는 브라우저에서 무시되므로 Line2 사용
    const edges = new THREE.EdgesGeometry(geometry, 12); // 12도 미만 꺾임(공면 삼각분할)은 제외
    const lineGeo = new LineSegmentsGeometry().fromEdgesGeometry(edges);
    const line = new LineSegments2(lineGeo, lineMat);
    line.renderOrder = 1; // 항상 매스들 다음에 렌더
    lineObjs.push(line);
  }
  lineObjs.forEach(l => group.add(l));
  scene.add(group);
  const mesh = meshes[0]; // 하위 호환 참조

  const bbox = new THREE.Box3().setFromObject(group);
  const center = bbox.getCenter(new THREE.Vector3());
  const dist = Math.max(1, bbox.getSize(new THREE.Vector3()).length() * 3);
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, dist * 4);

  // 초기 각도 = 검증된 등각 방향 (0.25, 0.62, -0.65)
  const d0 = new THREE.Vector3(0.25, 0.62, -0.65).normalize();
  const view = { yaw: Math.atan2(d0.x, d0.z), pitch: Math.asin(d0.y) };

  const vtmp = new THREE.Vector3();

  function renderFrame() {
    const cp = Math.cos(view.pitch), sp = Math.sin(view.pitch);
    const dir = new THREE.Vector3(Math.sin(view.yaw) * cp, sp, Math.cos(view.yaw) * cp);
    camera.position.copy(center).addScaledVector(dir, dist);
    camera.lookAt(center);
    camera.updateMatrixWorld(true);

    // 뷰 공간 정점 범위 측정 → 화면 중앙 정렬 + 960×960 핏 (모든 파트 포함)
    const inv = camera.matrixWorldInverse;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const g of geometries) {
      const pos = g.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        vtmp.fromBufferAttribute(pos, i).applyMatrix4(inv);
        if (vtmp.x < minX) minX = vtmp.x; if (vtmp.x > maxX) maxX = vtmp.x;
        if (vtmp.y < minY) minY = vtmp.y; if (vtmp.y > maxY) maxY = vtmp.y;
      }
    }
    // 카메라를 뷰 평면상에서 평행이동(회전 없음)해 건물을 화면 중앙에
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
    const up = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
    camera.position.addScaledVector(right, cx).addScaledVector(up, cy);
    camera.updateMatrixWorld(true);

    // NDC 한계: x ±(960/1080)=±0.888, y ±(960/1920)=±0.5 → HW ≥ 1.125·halfExtent
    const HW = 1.125 * Math.max((maxX - minX) / 2, (maxY - minY) / 2) * 1.02;
    camera.left = -HW; camera.right = HW;
    camera.top = HW * CANVAS_H / CANVAS_W; camera.bottom = -HW * CANVAS_H / CANVAS_W;
    camera.updateProjectionMatrix();

    renderer.render(scene, camera);
    massCanvasCtx.drawImage(renderer.domElement, 0, 0);
  }

  massViewer = { renderer, view, renderFrame, running: true, scene, mesh, meshes };
  (function loop() {
    if (!massViewer || !massViewer.running) return;
    renderFrame();
    requestAnimationFrame(loop);
  })();
}

function stopMassViewer() {
  if (massViewer) {
    massViewer.running = false;
    massViewer.renderer.dispose();
    massViewer = null;
  }
}

// 매스 뷰 드래그 회전 (yaw 자유, pitch는 지평선 위~거의 수직 사이로 제한)
let massDragging = false, massLastX = 0, massLastY = 0;
massCanvas.addEventListener('pointerdown', e => {
  if (!massViewer) return;
  massDragging = true;
  massCanvas.style.cursor = 'grabbing';
  massLastX = e.clientX; massLastY = e.clientY;
  try { massCanvas.setPointerCapture(e.pointerId) } catch (err) {};
});
massCanvas.addEventListener('pointermove', e => {
  if (!massDragging || !massViewer) return;
  massViewer.view.yaw -= (e.clientX - massLastX) * 0.006;
  massViewer.view.pitch = Math.min(1.35, Math.max(0.12,
    massViewer.view.pitch + (e.clientY - massLastY) * 0.004));
  massLastX = e.clientX; massLastY = e.clientY;
});
const endMassDrag = () => { massDragging = false; massCanvas.style.cursor = 'grab'; };
massCanvas.addEventListener('pointerup', endMassDrag);
massCanvas.addEventListener('pointercancel', endMassDrag);

// 검증된 로직: 흰색(매스)→불투명, 검은색(배경)→투명 알파 마스크
function buildAlphaMask(srcCanvas) {
  const c = document.createElement('canvas');
  c.width = srcCanvas.width; c.height = srcCanvas.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0);
  const img = ctx.getImageData(0, 0, c.width, c.height);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i + 3] = (d[i] + d[i + 1] + d[i + 2]) / 3;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

// ---- 건물 직접 그리기 (위성 위 폴리곤) ----
// OSM에 건물이 없는 지역, 또는 STEP2에서 직접 그리고 싶을 때. 위성 타일 위에서
// 외곽선을 점으로 찍어 폴리곤을 만들고, 로컬 미터 좌표로 변환해 startMassViewer로 압출.
let drawMap = null, drawSatLayer = null, drawPolygon = null;
let drawVerts = [];        // 찍은 정점 [{lat,lng}]
let drawVertMarkers = [];  // 정점 표시 마커
let drawCenter = null;     // {lat, lon} 검색 좌표 (합성 id·중심용)
function renderDrawPolygon() {
  const latlngs = drawVerts.map(v => [v.lat, v.lng]);
  if (drawPolygon) drawMap.removeLayer(drawPolygon);
  drawPolygon = null;
  if (latlngs.length >= 2) {
    drawPolygon = L.polygon(latlngs, { color: '#111', weight: 2, fillColor: '#111', fillOpacity: 0.12 }).addTo(drawMap);
  }
}
function openDrawMass(lat, lon) {
  drawCenter = { lat, lon };
  drawVerts = [];
  const ov = document.getElementById('drawOverlay');
  ov.classList.add('open');
  const err = document.getElementById('drawErr'); if (err) err.textContent = '';
  if (!drawMap) {
    drawMap = L.map('drawMap', { zoomControl: true });
    drawSatLayer = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 21, maxNativeZoom: 19, attribution: 'Esri, Maxar, Earthstar Geographics' }
    ).addTo(drawMap);
    drawMap.on('click', (e) => {
      drawVerts.push(e.latlng);
      L.circleMarker(e.latlng, { radius: 4, color: '#111', fillColor: '#fff', fillOpacity: 1, weight: 2 })
        .addTo(drawMap);
      drawVertMarkers.push(drawVertMarkers.length); // 개수만 추적(레이어는 clearLayers로 정리)
      renderDrawPolygon();
    });
  }
  // 이전 그림 정리 (마커·폴리곤 제거, 타일은 유지)
  drawMap.eachLayer(l => { if (l !== drawSatLayer) drawMap.removeLayer(l); });
  drawPolygon = null; drawVertMarkers = [];
  drawMap.setView([lat, lon], 19);
  setTimeout(() => drawMap.invalidateSize(), 100);
}
function closeDrawMass() {
  document.getElementById('drawOverlay').classList.remove('open');
}
document.getElementById('drawMassBtn').addEventListener('click', () => {
  if (isFinite(state.lat) && isFinite(state.lon)) openDrawMass(state.lat, state.lon);
});
document.getElementById('drawCloseBtn').addEventListener('click', closeDrawMass);
document.getElementById('drawUndoBtn').addEventListener('click', () => {
  drawVerts.pop();
  // 마커 전부 지우고 남은 정점만 다시 그림
  drawMap.eachLayer(l => { if (l !== drawSatLayer && l !== drawPolygon) drawMap.removeLayer(l); });
  drawVerts.forEach(v => L.circleMarker(v, { radius: 4, color: '#111', fillColor: '#fff', fillOpacity: 1, weight: 2 }).addTo(drawMap));
  renderDrawPolygon();
});
// 층수 슬라이더 ↔ 숫자 동기화
(function () {
  const s = document.getElementById('drawLevels'), n = document.getElementById('drawLevelsNum');
  s.addEventListener('input', () => { n.value = s.value; });
  n.addEventListener('input', () => {
    let v = Math.max(1, Math.min(60, parseInt(n.value, 10) || 1)); s.value = v;
  });
})();
document.getElementById('drawDoneBtn').addEventListener('click', () => {
  const err = document.getElementById('drawErr');
  if (drawVerts.length < 3) { err.textContent = t('errDrawMin'); return; }
  err.textContent = '';
  // 위경도 정점 → 중심 기준 로컬 미터 좌표
  const geom = drawVerts.map(v => ({ lat: v.lat, lon: v.lng }));
  const c = centroidLatLon(geom);
  const coords = geom.map(g => llToLocal(c, g));
  const levels = Math.max(1, Math.min(60, parseInt(document.getElementById('drawLevels').value, 10) || 3));
  state.building = {
    coords, levels, height: levels * 3.5, name: null,
    osmId: 'synth:' + drawCenter.lat.toFixed(6) + ',' + drawCenter.lon.toFixed(6),
    parts: null, synthetic: true,
  };
  closeDrawMass();
  startMassViewer(state.building);
  document.getElementById('buildingInfo').textContent =
    `${t('drawnMass')} · ${t('infoLevels', levels)} · ${state.address}`;
  goto(2);
});

document.getElementById('backToSearchBtn').addEventListener('click', () => {
  stopMassViewer();
  goto(1);
});
// 각 단계 뒤로가기
document.getElementById('back3Btn').addEventListener('click', () => {
  // 건물 확인으로 복귀 — 뷰어 재시작 + 확정했던 각도 복원
  if (state.building) {
    startMassViewer(state.building);
    if (state._lastView && massViewer) {

/* ============================================================
   STEP 3 — 미디어 업로드
   ============================================================ */
const video = document.getElementById('srcVideo');

/* ============================================================
   촬영 시각 추출 — 파일 수정시각(lastModified)은 복사/전송 때마다 바뀌므로
   사진은 EXIF DateTimeOriginal, 영상은 MP4/MOV mvhd의 creation time을 읽는다.
   실패 시에만 파일 시각 → 현재 시각 순 폴백. 사용한 소스는 레코드에 기록.
   ============================================================ */
async function readMp4CreationDate(file) {
  const buf = new Uint8Array(await file.slice(0, 4 * 1024 * 1024).arrayBuffer());
  for (let i = 4; i < buf.length - 20; i++) {
    if (buf[i] === 0x6d && buf[i + 1] === 0x76 && buf[i + 2] === 0x68 && buf[i + 3] === 0x64) { // 'mvhd'
      const ver = buf[i + 4];
      let secs = 0;
      if (ver === 1) { for (let k = 0; k < 8; k++) secs = secs * 256 + buf[i + 8 + k]; }
      else { secs = buf[i + 8] * 16777216 + buf[i + 9] * 65536 + buf[i + 10] * 256 + buf[i + 11]; }
      const d = new Date((secs - 2082844800) * 1000); // 1904 epoch → unix
      const y = d.getFullYear();
      return (y >= 1990 && y <= new Date().getFullYear() + 1) ? d : null;
    }
  }
  return null;
}
// 미디어의 촬영 GPS — 사진은 EXIF, 영상은 QuickTime ©xyz(ISO6709) 패턴 검색
async function readMediaGps(file) {
  try {
    if (file.type.startsWith('image/') && window.exifr) {
      const g = await exifr.gps(file);
      if (g && isFinite(g.latitude) && isFinite(g.longitude)) {
        return { lat: g.latitude, lon: g.longitude };
      }
    } else if (file.type.startsWith('video/')) {
      // 아이폰 MOV/MP4의 위치(©xyz, ISO6709)는 대개 moov atom(파일 끝)에
      // 있으므로 앞뿐 아니라 끝 4MB도 검색해야 한다
      const dec = new TextDecoder('latin1');
      const CHUNK = 4 * 1024 * 1024;
      const parts = [file.slice(0, CHUNK)];
      if (file.size > CHUNK) parts.push(file.slice(Math.max(0, file.size - CHUNK)));
      for (const part of parts) {
        const txt = dec.decode(new Uint8Array(await part.arrayBuffer()));
        const m = txt.match(/([+-]\d{1,2}\.\d+)([+-]\d{1,3}\.\d+)/);
        if (m) {
          const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
          if (Math.abs(lat) <= 90 && Math.abs(lon) <= 180) return { lat, lon };
        }
      }
    }
  } catch (e) {}
  return null;
}

async function readCaptureDate(file) {
  try {
    if (file.type.startsWith('image/') && window.exifr) {
      // HEIC·일부 기기는 DateTimeOriginal이 없고 다른 필드에 촬영일이 있어 넓게 시도
      const ex = await exifr.parse(file, {
        pick: ['DateTimeOriginal', 'CreateDate', 'DateTimeDigitized', 'ModifyDate', 'DateTime', 'GPSDateStamp'],
      });
      const d = ex && (ex.DateTimeOriginal || ex.CreateDate || ex.DateTimeDigitized || ex.ModifyDate || ex.DateTime);
      if (d instanceof Date && !isNaN(d)) return { date: d, source: 'exif' };
    } else if (file.type.startsWith('video/')) {
      const d = await readMp4CreationDate(file);
      if (d) return { date: d, source: 'video-meta' };
    }
  } catch (e) { /* 폴백으로 */ }
  if (file.lastModified) return { date: new Date(file.lastModified), source: 'file' };
  return { date: new Date(), source: 'now' };
}

document.getElementById('mediaInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const err = document.getElementById('mediaErr');
  err.style.display = 'none';
  // 파일 크기 제한 — 너무 큰 파일은 브라우저 크래시·업로드 실패 유발
  const isVid = file.type.startsWith('video/');
  const MAX = isVid ? 100 * 1024 * 1024 : 20 * 1024 * 1024; // 영상 100MB / 이미지 20MB
  if (file.size > MAX) {
    err.textContent = t('errFileTooBig', isVid ? 100 : 20);
    err.style.display = 'block';
    e.target.value = '';
    return;
  }
  // 새 미디어 = 새 기록 세션 — 이전 작품의 상태를 전부 초기화
  state._recordSaved = false;
  state._recordSavedAt = null;
  state.locked = false;                 // 이전 잠금 해제
  editorCanvas.classList.remove('locked');
  state.pan = { x: 0, y: 0 };           // 위치·크기 리셋 (baseScale은 로드 후 resetTransform)
  state.userScale = 1;
  state.clipStart = 0;
  state.thumbFrac = 0.5;
  state.momentScale = 0;
  state.emoTags = []; state.emoX = null; state.emoY = null; state._emoManual = false;
  state.momentEmotionLabel = '';
  state.momentThought = '';
  state._thoughtEn = null;
  state.momentWord = '';
  state.momentWordEn = null;
  state._finalEn = null;
  state.userReasons = [];
  state.segmentsRaw = []; state.segmentsFinal = []; state._segsEn = null;
  state.contact = null; state.userText = '';
  state.weatherCode = null; state.w3w = null;
  // 입력 필드도 비우기 (이전 값 잔존 방지)
  ['momentThought', 'momentWord', 'seg1', 'seg2', 'seg3', 'cName', 'cInsta', 'cEmail', 'cWeb'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  // 감정 UI 리셋 (태그 해제 + 평면 점 숨김)
  const eerr = document.getElementById('emotionErr'); if (eerr) eerr.textContent = '';
  try { renderEmotionChips(); renderPlaneDot(); } catch (e) {}
  const tr = document.getElementById('translateResult'); if (tr) tr.style.display = 'none';
  const ttr = document.getElementById('thoughtTranslateResult'); if (ttr) ttr.style.display = 'none';
  const cap = await readCaptureDate(file);
  state.mediaDate = cap.date;
  state.mediaDateSource = cap.source; // 'exif' | 'video-meta' | 'file' | 'now'
  state.mediaGps = await readMediaGps(file); // {lat, lon} 또는 null
  const url = URL.createObjectURL(file);

  if (file.type.startsWith('video/')) {
    state.mediaType = 'video';
    video.src = url;
    video.load(); // iOS Safari: 명시적으로 로드를 시작해야 메타데이터가 온다
    await new Promise((ok, no) => {
      // iOS는 재생 전에 loadeddata를 주지 않는 경우가 있어 metadata 기준으로 대기
      video.onloadedmetadata = ok;
      video.onloadeddata = ok;
      video.onerror = () => no(new Error(t('errPlay')));
      setTimeout(() => no(new Error(t('errPlay'))), 15000); // 안전 타임아웃
    }).catch(ex => { err.textContent = ex.message; err.style.display = 'block'; });
    if (!video.videoWidth) { err.textContent = t('errRes'); err.style.display = 'block'; return; }
    state.mediaEl = video;
    // 소리 있는 재생을 먼저 시도 — 파일 선택도 사용자 제스처라 대부분 허용됨.
    // (muted로 시작한 재생 세션은 Safari에서 나중에 소리를 풀기 어렵다)
    video.removeAttribute('muted');
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1;
    try {
      await video.play(); // 소리 포함 재생 성공
    } catch (err) {
      // 자동재생 정책에 막힘 → muted로 폴백, 사용자가 버튼으로 켬
      video.muted = true;
      video.play().catch(() => {});
    }
    document.getElementById('soundBtn').style.display = '';
    pauseBtn.style.display = '';
    pauseBtn.textContent = t('btnPause');
    setTimeout(() => {
      soundBtn.textContent = video.muted ? t('soundOn') : t('soundOff');
      const h = document.getElementById('soundHint');
      if (h && !video.muted) h.textContent = t('sndOnHint');
    }, 100);
    // 썸네일 장면 기본값 (선택은 step45에서)
    state.thumbFrac = 0.5;
    document.getElementById('frameSlider').value = 500;
    // 10초 초과 영상: 사용할 10초 구간의 시작 지점 선택 UI
    state.clipStart = 0;
    const over = video.duration > TARGET_DURATION + 0.05;
    document.getElementById('clipRow').style.display = over ? '' : 'none';
    if (over) {
      const sl = document.getElementById('clipSlider');
      sl.max = (video.duration - TARGET_DURATION).toFixed(1);
      sl.value = 0;
      updateClipLabel();
    }
  } else if (file.type.startsWith('image/')) {
    state.mediaType = 'image';
    const img = new Image();
    await new Promise((ok, no) => { img.onload = ok; img.onerror = no; img.src = url; })
      .catch(() => { err.textContent = t('errImg'); err.style.display = 'block'; });
    if (!img.naturalWidth) return;
    state.mediaEl = img;
    document.getElementById('soundBtn').style.display = 'none';
    pauseBtn.style.display = 'none';
    state.clipStart = 0;
    document.getElementById('clipRow').style.display = 'none';
  } else {
    err.textContent = t('errType');
    err.style.display = 'block';
    return;
  }

  // 촬영 시각·위치와 출처를 화면에 표시 — 시간/거리가 이상하면 원인을 바로 알 수 있게
  {
    const srcKey = { exif: 'capExif', 'video-meta': 'capVideoMeta', file: 'capFile', now: 'capNow' }[state.mediaDateSource] || 'capFile';
    const label = t(srcKey);
    let line = (srcKey === 'capExif' || srcKey === 'capVideoMeta')
      ? `${label}: ${fmtDate(state.mediaDate)}`
      : `${fmtDate(state.mediaDate)} · ${label}`;
    if (state.mediaGps && isFinite(state.lat) && isFinite(state.lon)) {
      const d = Math.round(haversine(state.lat, state.lon, state.mediaGps.lat, state.mediaGps.lon));
      const dTxt = d >= 1000 ? (d / 1000).toFixed(1) + 'km' : d + 'm';
      line += '\n' + t('gpsFound', state.mediaGps.lat.toFixed(4), state.mediaGps.lon.toFixed(4), dTxt);
    } else {
      line += '\n' + t('gpsNone');
    }
    const ci = document.getElementById('captureInfo');
    ci.style.whiteSpace = 'pre-line';
    ci.textContent = line;
    // 날짜 수정칸에 현재 촬영일 채우기 (로컬 날짜 기준)
    const di = document.getElementById('mediaDateInput');
    if (di && state.mediaDate) {
      const d = state.mediaDate;
      di.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
  }
  resetTransform();
  state.locked = false;
  document.getElementById('editorCanvas').classList.remove('locked');
  startEditorLoop();
  detectObjects();     // 백그라운드로 객체 인식 시작
  goto(4);
});

// 촬영일 직접 수정 — EXIF가 없거나 틀렸을 때 사용자가 정확한 날짜로 고침
document.getElementById('mediaDateInput').addEventListener('change', (e) => {
  const v = e.target.value; // YYYY-MM-DD
  if (!v) return;
  const [y, m, d] = v.split('-').map(Number);
  const picked = new Date(y, m - 1, d, 12, 0, 0); // 로컬 정오 (시간대 밀림 방지)
  if (isNaN(picked)) return;
  state.mediaDate = picked;
  state.mediaDateSource = 'manual';
  const ci = document.getElementById('captureInfo');
  if (ci) ci.textContent = `${fmtDate(picked)} · ${t('capManual')}`;
});

/* ============================================================
   STEP 4 — 합성 에디터 (검증된 destination-in 마스크 + 팬/줌)
   ============================================================ */
const editorCanvas = document.getElementById('editorCanvas');
const editorCtx = editorCanvas.getContext('2d');
const frameBuf = document.createElement('canvas');
frameBuf.width = CANVAS_W; frameBuf.height = CANVAS_H;
const frameCtx = frameBuf.getContext('2d');

const MIN_USER_SCALE = 0.5; // 영역보다 작게 축소 허용 (빈 부분은 검은 배경)
const MAX_USER_SCALE = 4;

function mediaSize() {
  const m = state.mediaEl;
  return state.mediaType === 'video'
    ? { w: m.videoWidth, h: m.videoHeight }
    : { w: m.naturalWidth, h: m.naturalHeight };
}

function resetTransform() {
  const { w, h } = mediaSize();
  // 기준을 캔버스 전체가 아니라 마스크 영역(960×960)으로 — 이렇게 해야
  // 미디어를 상하좌우로 실제로 움직일 여지가 생기고, 축소도 자연스럽다.
  // (마스크 밖은 어차피 destination-in으로 잘려나가므로 영역만 덮으면 됨)
  state.baseScale = Math.max(AREA / w, AREA / h);
  state.userScale = 1;
  state.pan = { x: 0, y: 0 };
}

// 합성 한 프레임을 대상 컨텍스트에 그림 (미디어 → 마스크 → 검은 배경 위)
function drawComposite(ctx, mediaSource, bg = '#000', edgeOverlay = null) {
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const { w, h } = mediaSize();
  const scale = state.baseScale * state.userScale;
  const dw = w * scale, dh = h * scale;
  // 팬은 자유 (클램프 없음) — 가로 미디어도 위아래로 자유롭게 이동 가능.
  // 미디어가 마스크를 다 덮지 않으면 그 부분은 검은 배경이 보인다 (사용자가
  // 미리보기를 보면서 스스로 조절)
  const dx = (CANVAS_W - dw) / 2 + state.pan.x;
  const dy = (CANVAS_H - dh) / 2 + state.pan.y;

  frameCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  frameCtx.drawImage(mediaSource, dx, dy, dw, dh);
  frameCtx.globalCompositeOperation = 'destination-in';
  frameCtx.drawImage(state.maskCanvas, 0, 0);
  frameCtx.globalCompositeOperation = 'source-over';

  ctx.drawImage(frameBuf, 0, 0);
  if (edgeOverlay) ctx.drawImage(edgeOverlay, 0, 0); // 흰 배경용 검은 외곽선
}

let editorRunning = false;
function startEditorLoop() {
  if (editorRunning) return;
  editorRunning = true;
  // 1080×1920 전체 합성은 프레임당 비용이 크므로 30fps로 제한
  let last = 0;
  (function loop(ts) {
    if (!editorRunning) return;
    if (ts - last >= 33) {
      last = ts;
      if (state.mediaEl) drawComposite(editorCtx, state.mediaEl, '#fff', state.edgeLayer);
    }
    requestAnimationFrame(loop);
  })(0);
}

// 팬(드래그) + 핀치 줌(터치 2손가락 — 폰에는 휠이 없다)
let dragging = false, lastPX = 0, lastPY = 0;
const edPointers = new Map(); // pointerId → {x, y}
let edPinchDist = 0;
const displayScale = () => editorCanvas.clientWidth / CANVAS_W;
editorCanvas.addEventListener('pointerdown', e => {
  if (state.locked) return;
  edPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (edPointers.size === 2) {
    const [a, b] = [...edPointers.values()];
    edPinchDist = Math.hypot(a.x - b.x, a.y - b.y);
    dragging = false; // 핀치 중에는 팬 정지
  } else {
    dragging = true;
    editorCanvas.classList.add('dragging');
    lastPX = e.clientX; lastPY = e.clientY;
  }
  try { editorCanvas.setPointerCapture(e.pointerId) } catch (err) {};
});
editorCanvas.addEventListener('pointermove', e => {
  if (state.locked) return;
  if (edPointers.has(e.pointerId)) edPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (edPointers.size === 2) {
    const [a, b] = [...edPointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (edPinchDist > 0) {
      state.userScale = Math.min(MAX_USER_SCALE, Math.max(MIN_USER_SCALE, state.userScale * (d / edPinchDist)));
    }
    edPinchDist = d;
    return;
  }
  if (!dragging) return;
  state.pan.x += (e.clientX - lastPX) / displayScale();
  state.pan.y += (e.clientY - lastPY) / displayScale();
  lastPX = e.clientX; lastPY = e.clientY;
});
const endDrag = e => {
  edPointers.delete(e.pointerId);
  edPinchDist = 0;
  if (edPointers.size === 0) { dragging = false; editorCanvas.classList.remove('dragging'); }
};
editorCanvas.addEventListener('pointerup', endDrag);
editorCanvas.addEventListener('pointercancel', endDrag);

// 줌(휠) — cover-fit 미만 축소 금지 (빈 공간 방지)
editorCanvas.addEventListener('wheel', e => {
  if (state.locked) return;
  e.preventDefault();
  state.userScale = Math.min(MAX_USER_SCALE, Math.max(MIN_USER_SCALE, state.userScale * (1 - e.deltaY * 0.0015)));
}, { passive: false });

document.getElementById('resetBtn').addEventListener('click', () => { if (!state.locked) resetTransform(); });

// 10초 초과 영상의 구간 선택: 시작점 이동 + 미리보기도 그 구간만 반복
const fmtClock = sec => `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, '0')}`;
function updateClipLabel() {
  const cs = state.clipStart || 0;
  document.getElementById('clipLabel').textContent =
    t('clipUse', fmtClock(cs), fmtClock(cs + TARGET_DURATION));
}
document.getElementById('clipSlider').addEventListener('input', e => {
  state.clipStart = parseFloat(e.target.value) || 0;
  video.currentTime = state.clipStart;
  if (video.paused) video.play().catch(() => {});
  updateClipLabel();
});
// 미리보기 재생이 선택 구간 [clipStart, clipStart+10] 안에서만 돌게 가드
// + 반복 경계 갭 최소화: ended를 기다리지 않고 끝 직전에 선제 되감기
video.addEventListener('timeupdate', () => {
  if (state.mediaType !== 'video' || state._thumbScrub) return;
  const cs = state.clipStart || 0;
  const clipEnd = Math.min(video.duration || 0, cs + TARGET_DURATION);
  if (video.duration > TARGET_DURATION + 0.05 &&
      (video.currentTime < cs - 0.3 || video.currentTime > clipEnd)) {
    video.currentTime = cs;
    return;
  }
  // 짧은 영상 반복: 끝 0.12초 전에 미리 되감아 멈칫거림을 줄인다
  if (video.duration && video.currentTime >= video.duration - 0.12) {
    video.currentTime = cs;
    if (video.paused) video.play().catch(() => {});
  }
});
// 수동 루프 — loop 속성은 Safari에서 되감김 후 오디오가 끊기는 사례가 있어

// 소리 켜기 (AudioContext resume — 검증된 함정 대응)
// 4단계와 6단계(산출물 미리보기) 양쪽에서 같은 토글을 공유
const soundBtn = document.getElementById('soundBtn');
const soundBtn6 = document.getElementById('soundBtn6');
function toggleSound() {
  // AudioContext 그래프를 만들지 않는다 — 그래프 라우팅은 소리가 그래프
  // 상태에 종속되는 원인이었고, 내보내기(WebCodecs)에는 그래프가 필요 없다.
  const turnOn = video.muted;
  if (turnOn) {
    // Safari/WebKit: muted "HTML 속성"으로 시작한 비디오는 property 해제만으론
    // 소리가 안 풀림 — 속성 제거 + 같은 제스처 안에서 pause→unmute→play
    video.pause();
    video.removeAttribute('muted');
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1;
    video.play().catch(() => {});
  } else {
    video.muted = true;
  }
  const label = video.muted ? t('soundOn') : t('soundOff');
  soundBtn.textContent = label;
  soundBtn6.textContent = label;
  const hint = document.getElementById('soundHint');
  if (hint) hint.textContent = video.muted ? '' : t('sndOnHint');
  // 켠 뒤 잠시 후 자체진단: 오디오 트랙 존재 / 브라우저 차단 여부를 화면에 표시
  if (!video.muted) {
    setTimeout(() => {
      if (video.muted || !hint) return;
      const tracks = video.audioTracks;
      if (video.muted) {
        hint.textContent = t('sndBlocked');       // 브라우저가 unmute를 조용히 되돌림
      } else if (tracks && typeof tracks.length === 'number' && tracks.length === 0) {
        hint.textContent = t('sndNoTrack');       // 원본 영상 자체가 무음 (Safari 경로)
      } else if (typeof video.webkitAudioDecodedByteCount === 'number' &&
                 video.webkitAudioDecodedByteCount === 0 && !video.paused) {
        hint.textContent = t('sndNoTrack');       // 재생 중인데 오디오 디코딩 0 = 무음 (Chrome 경로)
      } else if (video.paused) {
        hint.textContent = t('sndBlocked');       // 자동재생 정책이 강제 정지한 경우
      }
    }, 900);
  }
}
soundBtn.addEventListener('click', toggleSound);
soundBtn6.addEventListener('click', toggleSound);

   연락처(이메일/아이디)는 번역 대상이 아님. 레코드에는 원문·영문 모두 저장.
   ============================================================ */
async function translateToEn(text) {
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=' + encodeURIComponent(text);
    const j = await (await fetch(url)).json();
    return j[0].map(seg => seg[0]).join('').trim();
  } catch (e) {
    // 폴백: MyMemory (무료, 키 불필요)
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=autodetect|en';
    const j = await (await fetch(url)).json();
    if (!j.responseData || !j.responseData.translatedText) throw new Error('translate failed');
    return j.responseData.translatedText.trim();
  }
}

});

async function initSupabase() {
  const url = localStorage.getItem('lc_sb_url') || DEFAULT_SB_URL;
  const key = localStorage.getItem('lc_sb_key') || DEFAULT_SB_KEY;
  // 설정/라이브러리 없음 → 서버 없이 로그인 불가 → 잠금 유지(사용자 확정: 연결 실패해도 로그인 필수)
  if (!url || !key || !window.supabase) { sb = null; lockApp(); return; }
  try {
    sb = window.supabase.createClient(url, key);
    // 매직링크로 돌아온 경우 세션이 자동 수립됨 — 복원 후 화면 진입
    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_IN') {
        updateAccountBar();
        updateSbStatus();
        pullServerRecords().then(() => {
          syncPendingRecords(); // 로그인 전 로컬에만 있던 미전송분을 계정으로 올림
          unlockApp();
        });
      }
    });
    const { data } = await sb.auth.getSession();
    if (data && data.session) {
      // 기존 로그인 유지 — 잠금 해제 + 서버 기록 복원 + 미전송분 업로드
      unlockApp();
      await pullServerRecords();
      syncPendingRecords();
      updateAccountBar();
    } else {
      // 세션 없음 → 로그인 화면 (익명 계정은 만들지 않음, 잠금 유지)
      lockApp();
    }
  } catch (e) {
    console.warn('supabase init failed:', e.message);
    sb = null;
    lockApp(); // 연결 실패해도 로그인 없이는 진입 불가 (사용자 확정)
  }
  updateSbStatus();
}

// 게스트 → 이메일 계정 승격 (기록이 그대로 계정에 귀속됨)
// 서버에 저장된 내 기록을 이 기기의 로컬 목록에 병합 — 다른 기기에서
// 로그인해도 기록이 보이게 하는 복원 경로 (업로드만 있던 동기화의 반쪽)
async function pullServerRecords() {
  if (!sb) return;
  try {
    // 공용 PC 격리 — 이 기기 로컬 캐시의 소유자와 현재 로그인 계정이 다르면
    // 이전 사용자의 데이터가 섞이지 않게 로컬을 비운다 (진짜 데이터는 서버에 있음).
    try {
      const { data: u } = await sb.auth.getUser();
      const uid = u && u.user && u.user.id;
      if (uid) {
        const owner = localStorage.getItem('lc_owner_uid');
        if (owner && owner !== uid) {
          localStorage.removeItem(REC_KEY);
          localStorage.removeItem(LS_KEY);
          localStorage.removeItem('lc_mass_names');
          try { indexedDB.deleteDatabase('lc-media'); } catch (e) {}
        }
        localStorage.setItem('lc_owner_uid', uid);
      }
    } catch (e) {}
    const { data, error } = await sb.from('records').select('id, payload').order('created_at', { ascending: true });
    if (error) throw error;
    if (!data || !data.length) return;
    const list = getRecords();
    const bySavedAt = new Map(list.map(r => [r.savedAt, r]));
    const blds = getSavedBuildings();
    const bldById = new Map(blds.map(b => [b.id, b]));
    let added = 0, bAdded = 0;
    for (const row of data) {
      const rec = row.payload;
      if (!rec) continue;
      if (rec._kind === 'building') {
        // 건물 아카이브 — id 기준 병합
        if (!rec.id) continue;
        const localB = bldById.get(rec.id);
        if (localB) {
          if (!localB.serverId) localB.serverId = row.id;
        } else {
          delete rec._kind;
          rec.serverId = row.id;
          blds.push(rec);
          bldById.set(rec.id, rec);
          bAdded++;
        }
        continue;
      }
      if (!rec.savedAt) continue;
      const local = bySavedAt.get(rec.savedAt);
      if (local) {
        // 이미 있는 기록 — 서버 행 id만 보정 (로컬 편집이 최신일 수 있으니 내용은 유지)
        if (!local.serverId) { local.serverId = row.id; local.synced = true; }
      } else {
        rec.serverId = row.id;
        rec.synced = true;
        list.push(rec);
        bySavedAt.set(rec.savedAt, rec);
        added++;
      }
    }
    if (added > 0) {
      list.sort((a, b) => a.savedAt - b.savedAt);
      localStorage.setItem(REC_KEY, JSON.stringify(list));
    }
    if (bAdded > 0) {
      blds.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
      localStorage.setItem(LS_KEY, JSON.stringify(blds.slice(0, 100)));
    }
    if (added > 0 || bAdded > 0) renderSavedList();
  } catch (e) { console.warn('pull records failed:', e.message); }
}
// 건물 아카이브 동기화 — records 테이블 재사용, payload._kind='building'
async function syncBuildingToServer(item) {
  if (!sb) return false;
  try {
    const { data, error } = await sb.from('records')
      .insert({ payload: { ...item, _kind: 'building' } }).select('id').single();
    if (error) throw error;
    const all = getSavedBuildings();
    const target = all.find(x => x.id === item.id);
    if (target) { target.serverId = data.id; localStorage.setItem(LS_KEY, JSON.stringify(all)); }
    return true;
  } catch (e) { console.warn('building sync failed:', e.message); return false; }
}
async function resyncBuilding(item) {
  if (!sb) return;

    if (item.serverId) { await sb.from('records').delete().eq('id', item.serverId); item.serverId = null; }
    await syncBuildingToServer(item);
  } catch (e) {}
}
async function deleteBuildingFromServer(item) {

    else await sb.from('records').delete().eq('payload->>id', String(item.id)).eq('payload->>_kind', 'building');

async function syncRecordToServer(rec) {
  if (!sb) return false;
  try {
    const { data, error } = await sb.from('records').insert({ payload: rec }).select('id').single();
    if (error) return false;
    if (data && data.id) {
      const l = getRecords();
      const r2 = l.find(x => x.savedAt === rec.savedAt);
      if (r2) { r2.serverId = data.id; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    }
    return true;
  } catch (e) { return false; }
}

async function claudeDeepen(ans) {
  const key = localStorage.getItem('lc_api_key');

    : `Someone wrote "${ans}" as why a city moment felt good. Write one follow-up question in English that helps them discover the honest reason behind the surface answer (a concrete scene, feeling, or personal meaning). Rules: don't mechanically repeat their words; don't ask "why" — ask about scenes, senses, people, moments; sound like a curious friend, not an interviewer. Output only the question.`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key, 'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001', max_tokens: 150,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error('Claude ' + res.status);

}

// step5: 스케일 슬라이더 + 생각(데이터 전용) + 한 단어(이미지 노출)
// ---- STEP 5: 감정 선택 (칩 8개 + 직접 입력) + 크기 % ----
// ---- 감정 = 2축 좌표 (x: 낯섦-1↔편안+1, y: 고요-1↔격렬+1) ----
// 7개 고정 태그, 각 좌표. 태그를 고르면 평균 좌표로 평면에 점이 놓이고, 눌러서 미세조정.
const EMO_TAGS = [
  { id: 'calm',        x: 0.32,  y: -0.72 },
  { id: 'overwhelmed', x: 0.55,  y: 0.72  },
  { id: 'strangeness', x: -0.55, y: 0.18  },
  { id: 'relief',      x: 0.72,  y: -0.48 },
  { id: 'longing',     x: 0.08,  y: 0.12  },
  { id: 'unfamiliar',  x: -0.68, y: 0.42  },
  { id: 'comfort',     x: 0.8,   y: -0.7  },
];
const EMO_BY_ID = Object.fromEntries(EMO_TAGS.map(tg => [tg.id, tg]));
const MAX_DIST = Math.sqrt(8);            // [-1,1]×[-1,1] 대각선 = 감정 최대 거리
const GAP_BUCKETS = [0, 1, 2, 3, 5, 8];   // 피보나치형: 가까우면 촘촘, 멀면 급격히 벌어짐
const emoDist = (a, b) => Math.hypot(a.emoX - b.emoX, a.emoY - b.emoY);
function toGap(d) {
  const i = Math.round(d / MAX_DIST * (GAP_BUCKETS.length - 1));
  return GAP_BUCKETS[Math.max(0, Math.min(GAP_BUCKETS.length - 1, i))];
}
const hasCoord = r => typeof r.emoX === 'number' && typeof r.emoY === 'number';
// 감정 좌표(x,y)를 사람이 읽는 말로. x: 낯섦↔편안, y: 고요↔격렬. |v|로 정도 표현.
function emoCoordText(x, y) {
  const word = (v, negKey, posKey) => {
    const mag = Math.abs(v);
    if (mag < 0.12) return null;                    // 거의 중앙 → 생략
    const deg = mag < 0.4 ? t('degSlight') : mag < 0.72 ? t('degQuite') : t('degVery');
    return deg + ' ' + t(v >= 0 ? posKey : negKey);
  };
  const parts = [
    word(x, 'emoAxisXNeg', 'emoAxisXPos'),
    word(y, 'emoAxisYNeg', 'emoAxisYPos'),
  ].filter(Boolean);
  return parts.length ? parts.join(', ') : t('emoNeutral');
}
const clamp1 = v => Math.max(-1, Math.min(1, v));

// STEP5: 태그 칩 (최대 2개 OR 토글). 고르면 평균 좌표로 자동 배치.

      state._emoManual = false;   // 태그 바뀌면 평면 점을 다시 평균으로

// 선택 태그들의 평균 좌표를 state.emoX/emoY에 세팅 (사용자가 손대지 않았을 때만 자동)
function avgPosition() {
  if (state._emoManual) return;
  if (!state.emoTags.length) { state.emoX = null; state.emoY = null; return; }
  const pts = state.emoTags.map(id => EMO_BY_ID[id]).filter(Boolean);
  state.emoX = pts.reduce((s, p) => s + p.x, 0) / pts.length;
  state.emoY = pts.reduce((s, p) => s + p.y, 0) / pts.length;
}
// 평면에서 점 위치 계산 (픽셀 → [-1,1])
function placePoint(clientX, clientY, wrap, setter) {
  const rect = wrap.getBoundingClientRect();
  const px = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
  const py = Math.min(Math.max((clientY - rect.top) / rect.height, 0), 1);
  setter(clamp1(px * 2 - 1), clamp1(1 - py * 2));
}
// STEP5b 평면 점 렌더
function renderPlaneDot() {
  const dot = document.getElementById('emoPlaneDot');
  if (!dot) return;
  if (hasCoord(state)) {
    dot.style.left = ((state.emoX + 1) / 2 * 100) + '%';
    dot.style.top = ((1 - state.emoY) / 2 * 100) + '%';
    dot.style.display = 'block';
  } else {
    dot.style.display = 'none';
  }
}
// 평면 상호작용을 공통화 (STEP5b · 오늘의 기분 정렬 둘 다 사용).
// setPointerCapture가 던져도 좌표 설정은 먼저 실행되게, 탭/드래그 모두 반응.
function bindPlane(wrapId, onPlace) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  let dragging = false;
  const set = (cx, cy) => placePoint(cx, cy, wrap, onPlace);
  wrap.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    dragging = true;
    set(e.clientX, e.clientY);                 // 좌표 먼저 (capture 실패와 무관)
    try { wrap.setPointerCapture(e.pointerId); } catch (err) {}
  });
  wrap.addEventListener('pointermove', (e) => { if (dragging) { e.preventDefault(); set(e.clientX, e.clientY); } });
  const stop = () => { dragging = false; };
  wrap.addEventListener('pointerup', stop);
  wrap.addEventListener('pointercancel', stop);
  wrap.addEventListener('lostpointercapture', stop);
  // 포인터 이벤트 미지원 환경 폴백 (탭)
  wrap.addEventListener('click', (e) => set(e.clientX, e.clientY));
}

      state._segsEn.filter(Boolean).join(' · ');
    document.getElementById('segTranslateResult').style.display = '';
    st.textContent = '';
  } catch (e) {
    st.textContent = t('errTranslate');
  } finally {
    segTranslateBtn.disabled = false;
  }
});

/* ============================================================
   객체 인식 (COCO-SSD) — 신규 기능
   영상: 25% / 50% / 75% 지점 프레임 샘플링, 이미지: 그대로 1회
   ============================================================ */
let detectPromise = null;
// 대표 프레임 수집 (사진 1장 / 영상 25·50·75% 지점 3장)
async function collectSampleFrames() {
  const samples = [];
  if (state.mediaType === 'image') {
    samples.push(state.mediaEl);
  } else {
    const v2 = document.createElement('video');
    v2.muted = true; v2.playsInline = true; v2.src = video.src;
    await waitVideoReady(v2);
    for (const t of [0.25, 0.5, 0.75]) {
      v2.currentTime = v2.duration * t;
      await new Promise(ok => { v2.onseeked = ok; });
      const c = document.createElement('canvas');
      c.width = v2.videoWidth; c.height = v2.videoHeight;
      c.getContext('2d').drawImage(v2, 0, 0);
      samples.push(c);
    }
  }
  return samples;
}
// Claude 비전으로 사물 인식 (키 있을 때) — COCO보다 정확, 도시 풍경 인식 가능
async function claudeAutoTags(samples) {
  const key = localStorage.getItem('lc_api_key');
  if (!key) return null;
  const images = samples.slice(0, 2).map(src => {
    const w = src.videoWidth || src.naturalWidth || src.width;
    const h = src.videoHeight || src.naturalHeight || src.height;
    const k = Math.min(1, 768 / Math.max(w, h));
    const c = document.createElement('canvas');
    c.width = Math.round(w * k); c.height = Math.round(h * k);
    c.getContext('2d').drawImage(src, 0, 0, c.width, c.height);
    return c.toDataURL('image/jpeg', 0.8).split(',')[1];
  });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001', max_tokens: 200,
      messages: [{ role: 'user', content: [
        ...images.map(b64 => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } })),
        { type: 'text', text: 'List up to 6 clearly visible objects/elements in the scene as short lowercase English nouns. Output only a JSON array of strings. Only include things you are confident about.' },
      ] }],
    }),
  });
  if (!res.ok) throw new Error('Claude ' + res.status);
  const j = await res.json();
  const text = (j.content || []).map(b => b.text || '').join('');
  const m = text.match(/\[[\s\S]*\]/);
  const arr = JSON.parse(m ? m[0] : text);
  return Array.isArray(arr) ? arr.slice(0, 6).map(String) : null;
}
function detectObjects() {
  detectPromise = (async () => {
    const samples = await collectSampleFrames();
    // 1순위: Claude 비전 (키 있을 때)
    try {
      const tags = await claudeAutoTags(samples);
      if (tags && tags.length) {
        state.objects = tags;
        state.objectScores = null;
        state.autoTagSource = 'claude';
        return state.objects;
      }
    } catch (e) { /* COCO 폴백 */ }
    // 2순위: COCO-SSD — 고신뢰(0.5+)만, 채움말 없음. 없으면 빈 배열(가짜 데이터 금지)
    const model = await cocoSsd.load();
    const seen = new Map(); // class → max score
    for (const smp of samples) {
      const found = await model.detect(smp, 10, 0.5);
      for (const f of found) {
        if (!seen.has(f.class) || seen.get(f.class) < f.score) seen.set(f.class, f.score);
      }
    }
    const sorted = [...seen.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
    state.objects = sorted.map(e => e[0]);
    state.objectScores = sorted.map(e => Math.round(e[1] * 100) / 100);
    state.autoTagSource = 'coco';
    return state.objects;
  })().catch(e => {
    console.error('detection failed', e);
    state.objects = []; // 실패 시 빈 배열 — 가짜 태그를 만들지 않는다
    state.autoTagSource = 'failed';
    return state.objects;
  });
  return detectPromise;
}

/* ============================================================
   STEP 6 — 산출물 2종 미리보기 + 다운로드
   ============================================================ */
const out1Canvas = document.getElementById('out1Canvas');
const out2Canvas = document.getElementById('out2Canvas');

function fmtDate(d) {
  // UTC 기준 표시 (사용자 확정) — 도시가 달라도 단일 기준으로 비교 가능
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getUTCMonth() + 1)}/${p(d.getUTCDate())}/${d.getUTCFullYear()} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())} GMT`;
}

function bottomLines() {
  const lines = [fmtDate(state.mediaDate || new Date())];
  if (state.userText) lines.push(...state.userText.split('\n'));
  return lines;
}

function radiusLinesFor(a, countryCode) {
  const num = v => (v === null || v === undefined) ? '—' : v;
  const t = a && a.transitDistM != null ? `Nearest transit ${a.transitDistM}m` : 'Nearest transit —';
  const f = a ? `Restaurants ${num(a.restaurants)}, cafes ${num(a.cafes)}` : 'Restaurants —';
  const p = a ? `Parks & green space: ${num(a.parks)}` : 'Parks —';
  // City-wide 재생에너지: Ember API 미연동 상태의 국가별 샘플값 (문서에 명시된 한계)
  const renewMap = { kr: '9.2%', sg: '4.1%', gb: '46%', us: '23%' };
  const r = renewMap[countryCode] || '—';
  return [
    `Immediate (~200m) — ${t}`,
    `Walkable (~1km) — ${f}`,
    `Neighborhood (~3-5km) — ${p}`,
    `City-wide — Renewable energy: ${r}`,
  ];
}
function radiusLines() { return radiusLinesFor(state.amenities, state.countryCode); }

// 어절 단위 줄바꿈 — 단어(어절) 중간에서 절대 끊지 않는다
function wrapLine(ctx, text, maxW) {
  const words = String(text).split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const cand = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(cand).width > maxW) { lines.push(cur); cur = w; }
    else cur = cand;
  }
  if (cur) lines.push(cur);
  return lines;
}

// 상단(위로 확장) / 하단(아래로 확장) 텍스트.
// 좌우 마진은 이미지 영역과 동일한 60px/60px — 최대 텍스트 폭 960px.
function drawTexts(ctx, topLines, botLines, color = '#fff') {
  ctx.font = FONT;
  ctx.fillStyle = color;
  ctx.textBaseline = 'alphabetic';
  const MAX_W = AREA - 20; // 940 — 좌우 각 70px 여백 (사용자 확정: 기존보다 10px씩 추가)
  const top = topLines.flatMap(l => wrapLine(ctx, l, MAX_W));
  const bot = botLines.flatMap(l => wrapLine(ctx, l, MAX_W));
  // 상단: 마지막 줄 기준선이 이미지 상단 경계 바로 위, 위로 쌓임
  let y = AREA_Y - 16;
  for (let i = top.length - 1; i >= 0; i--) {
    ctx.fillText(top[i], TEXT_X, y);
    y -= LINE_H;
  }
  // 하단: 첫 줄 기준선이 이미지 하단 경계 아래, 아래로 쌓임
  y = AREA_Y + AREA + LINE_H;
  for (const line of bot) {
    ctx.fillText(line, TEXT_X, y);
    y += LINE_H;
  }
}

// 산출물 4: 직전 drawComposite가 frameBuf에 남긴 클리핑 결과의 중앙 960×960을
// 투명 배경 그대로 잘라내고 외곽선만 얹는다 (배경·텍스트 없음)
function drawOut4() {
  const c4 = document.getElementById('out4Canvas');

  ctx4.clearRect(0, 0, AREA, AREA);

  if (state.edgeLayer) {
    ctx4.drawImage(state.edgeLayer, AREA_X, AREA_Y, AREA, AREA, 0, 0, AREA, AREA);
  }
  // 보드/기록 표시용으로 항상 보관 (다운로드 여부와 무관)
  c4.toBlob(b => { state._autoOut4 = b; }, 'image/png');
  // 보드 노드용 축소 썸네일은 레코드에 직접 내장 (IndexedDB 의존 제거 —
  // Safari 등에서 blob 저장이 실패해도 확실히 표시되고 서버에도 동기화됨)
  const tc = document.createElement('canvas');
  tc.width = 240; tc.height = 240;
  tc.getContext('2d').drawImage(c4, 0, 0, 240, 240);

}

// seek 전용 비디오를 재사용해 임의 시점의 프레임을 추출
let seekVideo = null;
// iOS Safari는 재생 전에 loadeddata를 주지 않으므로 metadata 기준 + load() 킥
function waitVideoReady(v, timeoutMs = 15000) {
  return new Promise((ok, no) => {
    if (v.readyState >= 1) return ok();
    v.onloadedmetadata = ok;
    v.onloadeddata = ok;
    v.onerror = () => no(new Error('video load failed'));
    setTimeout(() => no(new Error('video load timeout')), timeoutMs);
    try { v.load(); } catch (e) {}
  });
}
async function ensureSeekVideo() {
  if (!seekVideo || seekVideo.dataset.src !== video.src) {
    seekVideo = document.createElement('video');
    seekVideo.muted = true;
    seekVideo.dataset.src = video.src;
    seekVideo.playsInline = true;
    seekVideo.src = video.src;
    await waitVideoReady(seekVideo);
  }
  return seekVideo;
}
async function seekTo(v, time) {
  v.currentTime = time;
  await new Promise(ok => { v.onseeked = ok; });
}
async function grabVideoFrameAt(fraction) {
  const v = await ensureSeekVideo();
  await seekTo(v, v.duration * Math.min(0.999, Math.max(0, fraction)));
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  return c;
}

let out1PreviewRunning = false;

async function enterResults() {
  goto(6);
  // 자동 인식(COCO-SSD)은 화면에 노출하지 않는다 — 검수용 레코드에만 저장됨
  document.getElementById('detectStatus').style.display = 'none';
  document.getElementById('out1Badge').textContent = state.mediaType === 'video' ? t('badgeVideo') : t('badgeImage');
  const sb6 = document.getElementById('soundBtn6');
  sb6.style.display = state.mediaType === 'video' ? '' : 'none';
  sb6.textContent = video.muted ? t('soundOn') : t('soundOff');

  // 반경 데이터만 대기 (최대 15초). 자동 인식은 백그라운드로 계속 진행.
  await Promise.race([
    state.amenitiesPromise || Promise.resolve(null),
    new Promise(r => setTimeout(r, 15000)),
  ]);

  // 상단 텍스트 = 한 단어만 (마침표 없음 — 사용자 확정. 생각/인상은 데이터 전용)
  const topLines1 = (state.userReasons || []).slice(0, 1);
  const bot = bottomLines();
  // 하단 형식(산출물 1·2 공통): 1줄 = "시간 거리"(공백 구분) → 다음 줄부터 사용자 정보
  state.gpsDistM = null;
  if (state.mediaGps && isFinite(state.lat) && isFinite(state.lon)) {
    const d = Math.round(haversine(state.lat, state.lon, state.mediaGps.lat, state.mediaGps.lon));
    state.gpsDistM = d;
    const dTxt = d >= 1000 ? (d / 1000).toFixed(1) + 'km' : d + 'm';
    bot[0] = (bot[0] || '') + ' ' + dTxt; // 거리 숫자만 (라벨 없음 — 사용자 확정)
  }
  // 텍스트 레이어(정적)를 먼저 만들어 릴스·썸네일이 함께 사용 — 흰 배경 + 검은 텍스트
  const textLayer = document.createElement('canvas');
  textLayer.width = CANVAS_W; textLayer.height = CANVAS_H;
  drawTexts(textLayer.getContext('2d'), topLines1, bot, '#000');
  state._out1TextLayer = textLayer;

  // 슬라이더로 프레임을 바꿀 때 재사용할 텍스트 라인 보관
  state._out2Top = [...radiusLines(), ...topLines1];
  state._botLines = bot;

  // 산출물 2 (항상 정지 이미지): 영상이면 기본값 중간 프레임, 슬라이더로 변경 가능
  const stillSource = state.mediaType === 'video'
    ? await grabVideoFrameAt(state.thumbFrac ?? 0.5)   // 4단계에서 고른 장면
    : state.mediaEl;
  const ctx2 = out2Canvas.getContext('2d');
  drawComposite(ctx2, stillSource);
  drawTexts(ctx2, state._out2Top, bot);
  dl2Btn.disabled = false;

  // 결과 페이지 도달 = 기록 자동 저장 (다운로드 없이도 — 사용자 확정).
  // 매스 썸네일(toBlob)이 준비될 시간을 살짝 준 뒤 저장하고,
  // 이후 다운로드하면 같은 기록이 갱신된다.
  setTimeout(() => { try { saveRecord(); } catch (e) {} }, 800);

  // 도시 정보(반경 데이터)를 결과 페이지에 텍스트로 표시 (구 산출물 2 대체)
  {
    const ci = document.getElementById('cityInfo');
    ci.innerHTML = '';
    radiusLines().forEach(line => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:6px 0; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink)';
      row.textContent = line;
      ci.appendChild(row);
    });
  }

  // 릴스 썸네일: 릴스와 같은 매핑·배치, 텍스트만 없음 (사용자 확정)
  const ctx3 = document.getElementById('out3Canvas').getContext('2d');
  drawComposite(ctx3, stillSource, '#fff', state.edgeLayer);
  document.getElementById('dl3Btn').disabled = false;

  // 산출물 4: 중앙 960×960만 잘라낸 투명 PNG (건물 매핑 + 외곽선만, 배경 없음)
  drawOut4();
  document.getElementById('dl4Btn').disabled = false;

  // 릴스: 사진이면 정지 렌더, 영상이면 라이브 미리보기 루프
  const ctx1 = out1Canvas.getContext('2d');
  if (state.mediaType === 'image') {
    drawComposite(ctx1, state.mediaEl, '#fff', state.edgeLayer);
    ctx1.drawImage(textLayer, 0, 0);
  } else if (!out1PreviewRunning) {
    out1PreviewRunning = true;
    const drawOut1 = () => {
      drawComposite(ctx1, video, '#fff', state.edgeLayer);
      ctx1.drawImage(state._out1TextLayer, 0, 0);
      // 녹화 중이면 이 순간(=원본 영상의 새 프레임)을 정확히 캡처
      if (state._recTrack && state._recTrack.readyState === 'live') state._recTrack.requestFrame();
    };
    state._drawOut1 = drawOut1;
    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
      // 영상 프레임이 표시되는 순간에만 그림 — rAF/캡처 샘플링 불일치로 인한
      // 프레임 중복·누락(끊김의 원인)이 사라지고 원본 프레임 타이밍이 유지된다
      const step = () => {
        if (!out1PreviewRunning) return;
        drawOut1();
        video.requestVideoFrameCallback(step);
      };
      video.requestVideoFrameCallback(step);
    } else {
      // 폴백: rvfc 미지원 브라우저는 기존 30fps rAF
      let last = 0;
      (function loop(ts) {
        if (!out1PreviewRunning) return;
        if (ts - last >= 33) { last = ts; drawOut1(); }
        requestAnimationFrame(loop);
      })(0);
    }
  }
  dl1Btn.disabled = false;
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

// 썸네일 장면 선택 (step45) — 슬라이더로 장면을 고르면 정방형 미리보기 갱신
const frameSlider = document.getElementById('frameSlider');

}
frameSlider.addEventListener('input', () => {

/* ============================================================
   검수용 레코드 — 객관 태그(자동 인식) × 주관 태그(사용자 이유) × 위치 × 시점.
   서버 연동 전까지 localStorage에 쌓고 JSON으로 내보내 검수한다.
   ============================================================ */
const REC_KEY = 'lc_records';
function getRecords() {
  try { return JSON.parse(localStorage.getItem(REC_KEY)) || []; } catch (e) { return []; }
}

// 기존 기록엔 massOsmId가 없다(뒤늦게 추가된 필드). 로컬 저장 건물의 좌표와 맞춰
// 같은 건물의 osmId를 record.massOsmId로 소급 채운다 → 옛 기록도 같은 건물끼리 합쳐짐.
// 1회성·저비용(로컬만). 매칭 실패한 옛 기록은 좌표 폴백 그대로.
function backfillMassOsmIds() {
  try {
    const recs = getRecords();
    if (!recs.length) return;
    const blds = getSavedBuildings().filter(b => b.building && b.building.osmId != null);
    if (!blds.length) return;
    let changed = false;
    for (const rec of recs) {
      if (rec.massOsmId != null && rec.massOsmId !== '') continue; // 이미 있음
      if (!isFinite(rec.lat) || !isFinite(rec.lon)) continue;
      // 같은 좌표(소수점 4자리 ≈ 11m)의 저장 건물을 찾아 그 osmId를 붙인다
      const hit = blds.find(b => isFinite(b.lat) && isFinite(b.lon)
        && b.lat.toFixed(4) === rec.lat.toFixed(4) && b.lon.toFixed(4) === rec.lon.toFixed(4));
      if (hit) { rec.massOsmId = String(hit.building.osmId); changed = true; }
    }
    if (changed) localStorage.setItem(REC_KEY, JSON.stringify(recs));
  } catch (e) { /* 소급 실패는 무시 — 좌표 폴백으로 동작 */ }
}

// 기존 기록의 out4 이미지가 이 기기 IndexedDB엔 있는데 서버에 안 올라간 경우
// (예전엔 다운로드해야만 올라갔음) 조용히 서버로 소급 업로드 → 다른 기기에서도 보이게.
// upsert라 중복 안전. _out4Uploaded 플래그로 1회만 시도.
let backfillRunning = false;
function queueBackfillOutputs() {
  if (!sb || backfillRunning) return;
  backfillRunning = true;
  (async () => {
    try {
      const { data: u } = await sb.auth.getUser();
      const uid = u && u.user && u.user.id;
      if (!uid) return;
      const recs = getRecords();
      for (const rec of recs) {
        if (rec._out4Uploaded) continue;
        const blob = await idbGet(rec.savedAt + ':out4').catch(() => null);
        if (!blob) { continue; } // 로컬에 이미지가 없으면 이 기기는 소급 대상 아님(플래그 안 세움)
        try {
          await sb.storage.from('outputs').upload(`${uid}/${rec.savedAt}-out4`, blob,
            { upsert: true, contentType: blob.type || 'image/png' });
          rec._out4Uploaded = true;
          const l = getRecords(); const r2 = l.find(x => x.savedAt === rec.savedAt);
          if (r2) { r2._out4Uploaded = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
        } catch (e) { /* 실패 — 다음 기회에 재시도(플래그 안 세움) */ }
        await sleep(400);
      }
    } catch (e) { /* getUser 실패 등 */ } finally { backfillRunning = false; }
  })();
}

/* ---- 산출물 파일 보관 (IndexedDB — localStorage 용량 한계 회피) ---- */
function idbOpen() {
  return new Promise((ok, no) => {
    const r = indexedDB.open('lc-media', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('outputs');
    r.onsuccess = () => ok(r.result);
    r.onerror = () => no(r.error);
  });
}
async function idbPut(key, blob) {
  const db = await idbOpen();
  return new Promise((ok, no) => {
    const tx = db.transaction('outputs', 'readwrite');
    tx.objectStore('outputs').put(blob, key);
    tx.oncomplete = ok;
    tx.onerror = () => no(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((ok) => {
    const rq = db.transaction('outputs').objectStore('outputs').get(key);
    rq.onsuccess = () => ok(rq.result || null);
    rq.onerror = () => ok(null);
  });
}
async function idbDelRecord(savedAt) {
  const db = await idbOpen();
  const tx = db.transaction('outputs', 'readwrite');
  ['out1', 'out2', 'out3', 'out4'].forEach(k => tx.objectStore('outputs').delete(savedAt + ':' + k));
}
// 다운로드 시점의 산출물을 현재 레코드에 연결해 보관
function saveOutputBlob(kind, blob) {
  if (!state._recordSavedAt || !blob) return;
  idbPut(state._recordSavedAt + ':' + kind, blob).catch(() => {});
  uploadOutputToStorage(state._recordSavedAt, kind, blob); // 기기 간 동기화 (버킷 있으면)
}
// 산출물 blob을 Supabase Storage('outputs' 버킷)에 사용자별 경로로 업로드.
// 버킷이 없거나 권한 문제면 조용히 로컬 전용으로 동작한다.
async function uploadOutputToStorage(savedAt, kind, blob) {
  if (!sb) return;
  try {
    const { data } = await sb.auth.getUser();
    const uid = data && data.user && data.user.id;
    if (!uid) return;
    await sb.storage.from('outputs').upload(`${uid}/${savedAt}-${kind}`, blob,
      { upsert: true, contentType: blob.type || 'application/octet-stream' });
  } catch (e) { /* 버킷 미설정 등 — 로컬 전용 */ }
}
// 산출물 로드: 로컬(IndexedDB) 우선, 없으면 Storage에서 내려받아 로컬에 캐시
async function fetchOutputBlob(savedAt, kind) {
  const local = await idbGet(savedAt + ':' + kind).catch(() => null);
  if (local) return local;
  if (!sb) return null;
  try {
    const { data: u } = await sb.auth.getUser();
    const uid = u && u.user && u.user.id;
    if (!uid) return null;
    const { data, error } = await sb.storage.from('outputs').download(`${uid}/${savedAt}-${kind}`);
    if (error || !data) return null;
    idbPut(savedAt + ':' + kind, data).catch(() => {});
    return data;
  } catch (e) { return null; }
}
function buildRecFields() {

    segmentsRaw: state.segmentsRaw || [],          // 입력 원문

    suggestSource: state._suggestSource || null,

  };
}
async function resyncRecord(rec) {
  // 갱신된 레코드 서버 재전송: 이전 행 삭제 후 재삽입
  if (!sb) return;
  try {
    if (rec.serverId) { await sb.from('records').delete().eq('id', rec.serverId); rec.serverId = null; }
    const ok = await syncRecordToServer(rec);
    if (ok) {
      const l = getRecords();
      const r2 = l.find(x => x.savedAt === rec.savedAt);
      if (r2) { r2.synced = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    }
  } catch (e) {}
}
function saveRecord() {
  // 같은 세션에서 재다운로드하면(값을 고친 뒤 포함) 기존 레코드를 최신 값으로 갱신
  if (state._recordSaved && state._recordSavedAt) {
    const list = getRecords();
    const r = list.find(x => x.savedAt === state._recordSavedAt);
    if (r) {
      Object.assign(r, buildRecFields(), { savedAt: r.savedAt, serverId: r.serverId });
      r.synced = false;
      localStorage.setItem(REC_KEY, JSON.stringify(list));
      if (state._autoOut4) {
        idbPut(r.savedAt + ':out4', state._autoOut4).catch(() => {});
        uploadOutputToStorage(r.savedAt, 'out4', state._autoOut4); // 기기 간 동기화용 자동 업로드
        r._out4Uploaded = true;
      }
      resyncRecord(r);
      renderSavedList();
      autoShareBoard(); // 공유 중이면 홈페이지 맵에 즉시 반영
    }
    return;
  }
  state._recordSaved = true;
  state._recordSavedAt = Date.now(); // 산출물(IndexedDB) 연결 키
  const rec = { savedAt: state._recordSavedAt, ...buildRecFields() };
  const list = getRecords();
  list.push(rec);
  localStorage.setItem(REC_KEY, JSON.stringify(list));
  if (state._autoOut4) {
    idbPut(rec.savedAt + ':out4', state._autoOut4).catch(() => {});
    uploadOutputToStorage(rec.savedAt, 'out4', state._autoOut4); // 기기 간 동기화용 자동 업로드
    rec._out4Uploaded = true;
  }
  // 서버 동기화 (Supabase 설정 시) — 실패하면 synced=false로 남아 다음 로드 때 재전송
  syncRecordToServer(rec).then(ok => {
    if (!ok) {
      // 서버가 있는데 실패 = 사용자에게 조용히 알림 (로컬엔 저장됨, 다음에 재전송)
      if (sb) { const s = document.getElementById('detectStatus'); if (s) s.textContent = t('saveFailSync'); }
      return;
    }
    const l = getRecords();
    const r2 = l.find(x => x.savedAt === rec.savedAt);
    if (r2) { r2.synced = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
  });
  autoShareBoard(); // 공유 중이면 새 기록을 홈페이지 맵에 즉시 반영
  // 자유 입력 세그먼트를 집계용 카테고리로 백그라운드 분류 (Claude 키 있을 때만, 실패 무시)
  const segs = rec.segments || [];
  const key = localStorage.getItem('lc_api_key');
  if (segs.length && key) {
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001', max_tokens: 100,
        messages: [{ role: 'user', content:
          `Classify each item into one of: light,sound,music,people,nature,smell,air,movement,architecture,color,other. Items: ${JSON.stringify(segs)}. Output only a JSON array of category strings, same order.` }],
      }),
    }).then(r => r.json()).then(j => {
      const text = (j.content || []).map(b => b.text || '').join('');
      const m = text.match(/\[[\s\S]*\]/);
      const cats = JSON.parse(m ? m[0] : text);
      if (Array.isArray(cats)) {
        const l = getRecords();
        const r2 = l.find(x => x.savedAt === rec.savedAt);
        if (r2) { r2.segmentsAuto = cats.slice(0, segs.length); localStorage.setItem(REC_KEY, JSON.stringify(l)); }
      }
    }).catch(() => {});
  }
  // 자동 인식이 늦게 끝나면 해당 레코드에 소급 기록
  if (!state.objects && detectPromise) {
    detectPromise.then(() => {
      const l = getRecords();
      const r = l.find(x => x.savedAt === rec.savedAt);
      if (r) { r.autoTags = state.objects; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    });
  }
  renderSavedList(); // 내보내기 버튼 표시 갱신
}
// ---- 날씨: 촬영 GPS+날짜로 그날의 날씨 이모지 (open-meteo, 무료·키 없음, 1회 조회 후 레코드에 저장) ----
const WEATHER_EMOJI = code => {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤️';
  if (code === 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌧️';
  if (code <= 86) return '🌨️';
  return '⛈️';
};
async function fetchWeatherFor(rec) {
  if (rec.weatherCode !== undefined && rec.weatherCode !== null) return rec.weatherCode;
  const g = rec.mediaGps || (isFinite(rec.lat) && isFinite(rec.lon) ? { lat: rec.lat, lon: rec.lon } : null);
  if (!g || !rec.mediaDate) return null;
  try {
    const d = new Date(rec.mediaDate).toISOString().slice(0, 10);
    const r = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${g.lat}&longitude=${g.lon}&start_date=${d}&end_date=${d}&daily=weather_code&timezone=auto`);
    const j = await r.json();
    const code = j.daily && j.daily.weather_code && j.daily.weather_code[0];
    if (code === undefined || code === null) return null;
    // 레코드에 저장해 재조회 방지
    const list = getRecords();
    const target = list.find(x => x.savedAt === rec.savedAt);
    if (target) { target.weatherCode = code; localStorage.setItem(REC_KEY, JSON.stringify(list)); }
    rec.weatherCode = code;
    return code;
  } catch (e) { return null; }
}
let recListSelKey = null; // My liquid cities 필터
function renderRecCats() {
  const box = document.getElementById('recCats');
  box.innerHTML = '';
  const groups = new Map();
  for (const rec of getRecords()) {
    const k = massKeyOf(rec);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(rec);
  }
  let customNames = {};
  try { customNames = JSON.parse(localStorage.getItem('lc_mass_names')) || {}; } catch (e) {}
  let savedB = [];
  try { savedB = JSON.parse(localStorage.getItem('lc_saved_buildings')) || []; } catch (e) {}
  const mkChip = (label, key) => {
    const chip = document.createElement('button');
    chip.className = 'mass-cat' + ((recListSelKey === key) ? ' sel' : '');
    const span = document.createElement('span');
    span.textContent = label;
    chip.appendChild(span);
    chip.addEventListener('click', () => {
      recListSelKey = (recListSelKey === key) ? null : key;
      renderRecList();
    });
    box.appendChild(chip);
  };
  mkChip(`All (${getRecords().length})`, null);
  for (const [key, recs] of groups) {
    const match = savedB.find(b => isFinite(b.lat) && isFinite(recs[0].lat)
      && Math.abs(b.lat - recs[0].lat) < 0.001 && Math.abs(b.lon - recs[0].lon) < 0.001);
    const name = customNames[key] || (match && match.customName) || key.split('|')[0];
    mkChip(`${name || '?'} (${recs.length})`, key);
  }
}

// 기록을 "매스(건물)" 단위로 그룹화 — 주소+좌표 반올림을 키로
function massKeyOf(rec) {
  // 같은 건물이면 같은 매스 — OSM 건물 ID가 있으면 그것으로 그룹핑(주소·좌표 오차 무관).
  // record는 massOsmId, 저장된 건물 객체는 building.osmId 필드를 쓰므로 둘 다 지원.
  const raw = (rec.massOsmId != null && rec.massOsmId !== '') ? rec.massOsmId
            : (rec.building && rec.building.osmId != null && rec.building.osmId !== '') ? rec.building.osmId
            : null;
  if (raw != null) return 'osm:' + raw;
  // 폴백(옛 기록): 좌표만으로. 주소 첫줄은 빼서(같은 건물을 다른 주소로 입력한 경우도 합쳐지게).
  const la = isFinite(rec.lat) ? rec.lat.toFixed(4) : '?';
  const lo = isFinite(rec.lon) ? rec.lon.toFixed(4) : '?';
  return `geo:${la},${lo}`;
}
function groupByMass() {
  const groups = new Map();
  for (const rec of boardRecords()) { // 공유 뷰어에서는 공유된 기록 기준
    const k = massKeyOf(rec);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(rec);
  }
  return groups;
}

/* ============================================================
   노드 보드 — 참조 이미지 스타일: 흰 캔버스에 미디어 카드 산포 +
   관계선(같은 매스 / 공유 단어·물체 / 비슷한 스케일) + 라벨
   ============================================================ */
let boardMode = 'board'; // 'board' | 'map'

function boardRelations(recs) {
  // 노드당 최대 3연결로 과밀 방지
  const edges = [];
  const degree = new Map();
  const deg = r => degree.get(r.savedAt) || 0;
  for (let i = 0; i < recs.length; i++) {
    for (let j = i + 1; j < recs.length; j++) {
      const a = recs[i], b = recs[j];
      if (deg(a) >= 3 || deg(b) >= 3) continue;
      let label = null;
      const sharedSeg = (a.segments || []).find(x => (b.segments || []).includes(x));
      const hasScales = typeof a.momentScale === 'number' && typeof b.momentScale === 'number';
      const gap = hasScales ? Math.abs(a.momentScale - b.momentScale) : null;
      // 관계 라벨: 스케일 갭을 우선 표기 (사용자 확정 — "같은 매스" 문구 대체)
      if (massKeyOf(a) === massKeyOf(b)) label = gap !== null ? 'gap ' + gap : t('edgeSameMass');
      else if (a.momentWord && a.momentWord === b.momentWord) label = rec => a.momentWordEn || a.momentWord;
      else if (sharedSeg) label = sharedSeg;
      else if (gap !== null && gap <= 2) label = 'gap ' + gap;
      if (typeof label === 'function') label = label();
      if (!label) continue;
      edges.push({ a: a.savedAt, b: b.savedAt, label });
      degree.set(a.savedAt, deg(a) + 1);
      degree.set(b.savedAt, deg(b) + 1);
    }
  }
  return edges;
}
// 감정 관계선 — 좌표(x,y)가 가까운 노드끼리 연결(정서적 거리 gap). 노드당 최대 3연결.
// 가까운 쌍부터 채택하고, gap이 큰(멀리 떨어진) 쌍은 잇지 않는다(toGap<=2).
function emotionEdges(recs) {
  const nodes = recs.filter(hasCoord);
  const pairs = [];
  for (let i = 0; i < nodes.length; i++)
    for (let j = i + 1; j < nodes.length; j++)
      pairs.push({ a: nodes[i], b: nodes[j], d: emoDist(nodes[i], nodes[j]) });
  pairs.sort((p, q) => p.d - q.d); // 가까운 감정 거리부터
  const edges = [];
  const degree = new Map();
  const deg = r => degree.get(r.savedAt) || 0;
  for (const p of pairs) {
    const g = toGap(p.d);
    if (g > 2) break;                       // 이후는 더 멀기만 하므로 중단
    if (deg(p.a) >= 3 || deg(p.b) >= 3) continue;
    edges.push({ a: p.a.savedAt, b: p.b.savedAt, label: 'gap ' + g });
    degree.set(p.a.savedAt, deg(p.a) + 1);
    degree.set(p.b.savedAt, deg(p.b) + 1);
  }
  return edges;
}

// 맵 뷰 3종: 'board'(타일 없는 흰 보드) / 'map'(실제 지도 타일) / 'globe'(3D 지구본).
// 노드·연결선은 세 뷰 공통 데이터(renderMapMarkers가 계산).
function setMapMode(mode) {
  boardMode = mode || 'board';

  else { stopGlobeLoop(); if (lcMap && !quadOn) setTimeout(() => lcMap.invalidateSize(), 60); }
  renderMapMarkers();
}

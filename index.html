<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liquidcities — Building Identity</title>
<style>
  :root { --bg: #ffffff; --panel: #f4f4f5; --line: #e2e2e4; --ink: #111;
    --dim: #6b7076; --accent: #111; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 300; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  /* 모든 페이지: 좌우 26px 여백의 풀폭 — 헤더와 정확히 같은 정렬 */
  .step { display: none; width: 100%; max-width: none; padding: 34px 26px 80px; margin: 0; }
  /* 제작 플로우의 입력·버튼은 읽기 좋은 폭(640px)으로 좌측 정렬 —
     래퍼(#structForm 등) 안에 있어도 적용되도록 요소 단위로 제한 */
  .step h1, .step .sub, .step .hint, .step .status, .step .err { max-width: 640px; }
  .step input[type=text], .step input[type=number], .step input[type=email],
  .step input[type=password], .step textarea, .step input[type=range] { max-width: 640px; }
  .step .row { max-width: 640px; }
  .step.wide h1, .step.wide .row, .step.wide .status { max-width: none; }
  /* 반응형 — 넓은 화면에서는 여유 있게, 중앙 정렬 */
  @media (min-width: 900px) {
    .canvas-wrap { max-width: 420px; }
    #mapView { height: 640px !important; }
  }
  .step.active { display: block; }
  h1 { font-size: 21px; font-weight: 500; margin: 0 0 6px; letter-spacing: -0.01em; }
  p.sub { color: var(--dim); font-size: 13px; margin: 0 0 24px; line-height: 1.5; }
  input[type=text], input[type=number], input[type=email], input[type=password], textarea {
    width: 100%; background: #fff; border: 1px solid var(--line); color: var(--ink);
    padding: 12px 14px; border-radius: 3px; font-size: 16px; font-family: inherit; /* 16px 미만이면 iOS가 포커스 시 강제 줌 */
  }
  input:focus, textarea:focus { outline: none; border-color: var(--ink); }
  textarea { min-height: 110px; resize: vertical; }
  input::placeholder, textarea::placeholder { color: #9aa0a6; }
  button {
    background: #fff; color: var(--ink); border: 1px solid var(--ink); padding: 11px 20px;
    border-radius: 3px; font-size: 14px; font-weight: 300; cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: var(--ink); color: #fff; }
  button.secondary { background: #fff; color: var(--dim); border: 1px solid var(--line); }
  button.secondary:hover:not(:disabled) { background: var(--panel); color: var(--ink); }
  button:disabled { opacity: 0.35; cursor: default; }
  .row { display: flex; gap: 10px; margin-top: 14px; }
  .row > * { flex: 1; }
  .err { color: #c62828; font-size: 13px; margin-top: 12px; display: none; line-height: 1.5; }
  .hint { color: var(--dim); font-size: 12px; margin-top: 10px; line-height: 1.5; }
  .canvas-wrap { margin: 18px 0 0; width: 100%; max-width: 360px; position: relative; }
  .canvas-wrap canvas { width: 100%; display: block; border: 1px solid var(--line);
    border-radius: 6px; background: #000; }
  #editorCanvas { cursor: grab; touch-action: none; }
  #massCanvas { touch-action: none; }
  #massCanvas, #editorCanvas { -webkit-user-select: none; user-select: none; }
  button, .mass-cat { -webkit-tap-highlight-color: transparent; }
  #editorCanvas.dragging { cursor: grabbing; }
  #editorCanvas.locked { cursor: default; }
  .status { font-size: 13px; color: var(--dim); margin-top: 12px; min-height: 18px; }
  .manual-box { display: none; margin-top: 18px; padding: 16px; border: 1px dashed var(--line);
    border-radius: 8px; background: var(--panel); }
  .manual-box.show { display: block; }
  .saved-item { display: flex; gap: 8px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--line); }
  .saved-item span { flex: 1; font-size: 13px; color: var(--ink); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .saved-item button { flex: none; padding: 8px 14px; font-size: 12px; }
  .saved-item img { width: 36px; height: 64px; object-fit: cover; flex: none;
    border-radius: 4px; border: 1px solid var(--line); background: #000; }
  #recOutputs img, #recOutputs video { width: 100%; max-width: 300px; display: block;
    border: 1px solid var(--line); border-radius: 6px; background: #000; margin-top: 16px; }
  .mass-cat { flex: none; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: #fff; border: 1px solid var(--line); border-radius: 3px; color: var(--ink);
    font-size: 12px; cursor: pointer; }
  .mass-cat img { width: 28px; height: 50px; object-fit: cover; border-radius: 4px; background: #000; }
  .mass-cat.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
  .ai-chip { background: #fff; color: var(--ink); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 3px; font-size: 13px; font-weight: 400; }
  .ai-chip:hover { border-color: #999; }
  .ai-chip.sel { background: var(--ink); color: #fff; border-color: var(--ink); }
  .float-word { position: absolute; color: rgba(17,17,17,0.85); font-size: 15px;
    text-shadow: 0 1px 6px rgba(255,255,255,0.9); animation: floatDrift 14s ease-in-out infinite alternate; }
  @keyframes floatDrift {
    0% { transform: translate(0, 0); opacity: 0.5; }
    50% { opacity: 1; }
    100% { transform: translate(26px, -34px); opacity: 0.6; }
  }
  .out-block { margin: 26px 0; }
  .out-block h2 { font-size: 15px; margin: 0 0 4px; }
  .out-block p { font-size: 12px; color: var(--dim); margin: 0 0 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border: 1px solid var(--line);
    border-radius: 2px; color: var(--dim); margin-left: 6px; vertical-align: middle; background: #fff; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--line);
    border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 노드 보드 (참조 이미지 스타일) */
  #boardSvg { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; }
  .board-card { position: absolute; width: 96px; background: #fff; border: 1px solid #d7d7da;
    border-radius: 2px; padding: 4px; cursor: pointer; }
  .board-card .bc-label { font-size: 9px; color: #555; padding: 1px 2px 3px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .board-card img { width: 100%; display: block; border-radius: 2px; background: #000; }
  /* 매스 실루엣 노드 — 프레임 없이 산출물 4(투명 PNG) 그대로 */
  .board-mass { position: absolute; width: 120px; cursor: pointer; text-align: center; }
  .board-mass img { width: 100%; display: block; background: transparent; }
  .board-mass .bm-label { font-size: 10px; color: #444; margin-bottom: 2px; }
  .lc-node { background: none; border: none; cursor: pointer; text-align: center; }
  .lc-node .bm-label { font-size: 11px; color: #444; margin-bottom: 2px; white-space: nowrap; }
  .lc-edge-label { font-size: 10px; color: #a5a8ad; background: rgba(255,255,255,0.85);
    padding: 0 4px; border-radius: 2px; white-space: nowrap; }
  .leaflet-container { background: #fff; font-family: inherit; }
  .board-edge-label { font-size: 9px; fill: #8a8f95; }

  /* ---- 앱 맵 풀스크린: 헤더 아래 전체 + 떠 있는 컨트롤 ---- */
  body.map-full { overflow: hidden; }
  body.map-full #step97 { padding: 0; max-width: none; }
  body.map-full #step97 > h1, body.map-full #step97 > .sub { display: none; }
  body.map-full #mapView {
    position: fixed !important; left: 0; right: 0; bottom: 0; top: var(--hdrH, 112px);
    width: 100vw !important; height: auto !important;
    border: none !important; border-radius: 0 !important; z-index: 1;
  }
  body.map-full #massCats {
    position: fixed; top: calc(var(--hdrH, 112px) + 12px); left: 12px; right: 190px;
    z-index: 1200; margin: 0; padding-bottom: 0;
  }
  body.map-full #massCats .mass-cat { box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
  body.map-full #mapCtrlRow {
    position: fixed; top: calc(var(--hdrH, 112px) + 12px); right: 12px; z-index: 1200;
    margin: 0; max-width: none; width: auto; display: flex; gap: 6px;
  }
  body.map-full #mapCtrlRow button { flex: 0 0 auto; padding: 8px 12px; font-size: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.10); background: #fff; }
  body.map-full #mapStatus { position: fixed; bottom: 12px; left: 12px; z-index: 1200; margin: 0; }
  body.map-full #shareStatus { position: fixed; bottom: 32px; left: 12px; right: 12px; z-index: 1200; margin: 0; }
  body.map-full #scaleGauge { position: fixed !important; z-index: 1200; }
  body.map-full #back97Row { display: none; }
  /* ---- 보드 공유 뷰어 (?board=) — 풀스크린 보드 + 떠 있는 카테고리 ---- */
  body.board-viewer #step97 { max-width: none; width: 100%; padding: 0; margin: 0; }
  body.board-viewer #step97 > h1,
  body.board-viewer #step97 > .sub,
  body.board-viewer #step97 .row,
  body.board-viewer #step97 .status { display: none !important; }
  body.board-viewer #mapView {
    position: fixed !important; inset: 0; width: 100vw !important; height: 100vh !important;
    border: none !important; border-radius: 0 !important; z-index: 1;
  }
  body.board-viewer #massCats {
    position: fixed; top: 12px; left: 12px; right: 12px; z-index: 1200;
    margin: 0; padding-bottom: 0;
  }
  body.board-viewer #massCats .mass-cat { box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
  body.board-viewer #scaleGauge { position: fixed !important; z-index: 1200; }
  body.board-viewer #langBar, body.board-viewer #buildTag { display: none; }
  .info-line { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .info-k { flex: none; width: 110px; color: var(--dim); }
  .info-v { flex: 1; color: var(--ink); line-height: 1.5; }
  /* ---- My liquid cities 리스트 (참조: 썸네일/제목/본문/날짜·날씨) ---- */
  .rec-row { display: flex; gap: 28px; padding: 26px 0; border-bottom: 1px solid var(--line);
    align-items: flex-start; cursor: pointer; }
  .rec-thumb { flex: 0 0 240px; }
  .rec-thumb img { width: 100%; display: block; }
  .rec-thumb .rec-noimg { width: 100%; height: 150px; background: var(--panel);
    display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 12px; }
  .rec-mid { flex: 0 0 180px; min-width: 0; }
  .rec-info { flex: 1 1 380px; min-width: 300px; margin-left: 56px; }
  .rec-title { font-size: 15px; font-weight: 500; text-decoration: underline;
    text-underline-offset: 3px; margin: 0 0 12px; letter-spacing: 0.02em; }
  .rec-body { font-size: 13px; line-height: 1.7; color: var(--ink);
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    margin: 0 0 12px; white-space: pre-wrap; }
  .rec-more { font-size: 13px; text-decoration: underline; color: var(--ink); }
  .rec-side { flex: 0 0 140px; text-align: left; font-size: 13px; color: var(--ink); }
  .rec-side .rec-weather { font-size: 22px; margin-top: 14px; }
  .rec-side .rec-del { margin-top: 18px; font-size: 11px; color: var(--dim);
    text-decoration: underline; cursor: pointer; }
  @media (max-width: 600px) {
    .rec-row { flex-wrap: wrap; gap: 12px; }
    .rec-thumb { flex: 0 0 100%; }
    .rec-side { flex: 1; }
    .rec-info { flex: 1 1 100%; min-width: 0; margin-left: 0; }
  }
  /* ---- 공통 헤더 (스케치 확정: 1행 로고 / 2행 메뉴 4개) ---- */
  /* 헤더 — thinkjane.com 사양: 13px, 로고 500/링크 400, rgba(0,0,0,.75),
     좌우 26px 여백의 풀폭 룰. 페이지가 바뀌어도 고정값 불변 */
  #appHeader { width: 100%; background: var(--bg); position: sticky; top: 0; z-index: 900;
    padding-top: 26px; font-size: 13px; color: rgba(0,0,0,0.75); }
  #appHeader .hdr-row { width: 100%; margin: 0; padding: 9px 26px; }
  #appHeader .hdr-logo { font-weight: 500; font-size: 13px;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  #appHeader .hdr-menu { border-bottom: 1px solid var(--line); display: flex; gap: 8px; }
  #appHeader .hdr-link { flex: 1; font-weight: 400; font-size: 13px; cursor: pointer;
    color: rgba(0,0,0,0.75); text-decoration: underline; text-underline-offset: 3px; }
  #appHeader .hdr-link:hover { opacity: 0.6; }
  #appHeader #hdrLang { font-size: 13px; color: rgba(0,0,0,0.75); }
  body.board-viewer #appHeader { display: none; }
  /* 페이지 좌상단 뒤로가기 */
  .back-top { display: block; margin: 0 0 14px; }
  .back-top button { padding: 6px 14px; font-size: 14px; }
  .back-arrow { flex: 0 0 auto !important; width: 44px; min-height: 36px; padding: 6px 0 !important;
    font-size: 13px; }
  .row:has(> .back-arrow) { justify-content: flex-start; }
  /* ---- 폰 최적화 ---- */
  @media (max-width: 600px) {
    body { padding: 0 0 40px; }
    h1 { font-size: 19px; }
    .row { flex-wrap: wrap; }
    .row button { flex: 1 1 45%; min-height: 44px; } /* 터치 타깃 44px */
    .canvas-wrap { max-width: 100% !important; }
    #mapView { height: min(560px, 62vh) !important; }
    .saved-item { flex-wrap: wrap; }
    .saved-item span { flex: 1 1 100%; }
  }

  /* ============================================================
     타이포 위계 시스템 (사용자 확정)
     최상위 = 헤더 로고 13px / 500. 그보다 크거나 굵은 UI 텍스트 금지.
       레벨 1  13px / 500  로고 · 페이지 제목(h1) · 리스트 제목 · 섹션 제목
       레벨 2  13px / 400  메뉴 · 버튼 · 입력 · 값
       레벨 3  13px / 300  본문 · 설명
       레벨 4  11px / 300~400  캡션 · 뱃지 · 상태
     (산출물 캔버스 내부 텍스트는 작품 스펙 — 이 시스템의 대상 아님)
     ============================================================ */
  h1 { font-size: 13px !important; font-weight: 500 !important; letter-spacing: 0 !important; margin: 0 0 8px; }
  .rec-title { font-size: 13px; font-weight: 500; }
  .out-block h2 { font-size: 13px; font-weight: 500; }
  button { font-size: 13px; font-weight: 400; }
  input[type=text], input[type=number], input[type=email], input[type=password], textarea {
    font-size: 13px; font-weight: 400; }
  .sub, .hint, .status, .rec-body { font-size: 13px; font-weight: 300; }
  .float-word { font-size: 13px !important; }
  .info-line, .rec-side { font-size: 13px; }
  /* iOS는 입력 16px 미만이면 포커스 시 강제 줌 — 터치 기기에서만 16px */
  @media (pointer: coarse) {
    input[type=text], input[type=number], input[type=email], input[type=password], textarea { font-size: 16px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- TensorFlow.js + COCO-SSD (객체 인식용, UMD 빌드) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- 언어 전환 (향후 언어 추가는 I18N 딕셔너리에 항목만 추가하면 됨) -->

<header id="appHeader">
  <div class="hdr-row hdr-logo" style="display:flex; justify-content:space-between; align-items:center">
    <span id="hdrLogo" style="cursor:pointer">→ Liquid Cities Project</span>
    <span id="hdrLang" style="cursor:pointer; font-weight:300">
      <span id="langEn2">EN</span> / <span id="langKo2">KO</span>
    </span>
  </div>
  <nav class="hdr-row hdr-menu">
    <span class="hdr-link" id="hdrMap">Map</span>
    <span class="hdr-link" id="hdrMy">My Cities</span>
    <span class="hdr-link" id="hdrMass">Mass</span>
    <span class="hdr-link" id="hdrPage">My page</span>
  </nav>
</header>
<div id="cfgPanel" style="display:none; position:fixed; bottom:70px; right:12px; z-index:20;
  background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; width:320px; box-shadow:0 4px 18px rgba(0,0,0,0.12)">
  <p class="hint" data-i18n="cfgKeyHint" style="margin:0 0 10px"></p>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
  <div class="row">
    <button id="apiKeySave" data-i18n="btnSave" style="padding:8px 14px; font-size:12px"></button>
    <button id="apiKeyClear" class="secondary" data-i18n="btnDelete" style="padding:8px 14px; font-size:12px"></button>
  </div>
  <div class="status" id="apiKeyStatus" style="margin-top:8px"></div>

  <hr style="border:none; border-top:1px solid var(--line); margin:14px 0">
  <p class="hint" data-i18n="cfgSbHint" style="margin:0 0 10px"></p>
  <input type="text" id="sbUrlInput" placeholder="https://xxxx.supabase.co">
  <div class="row"><input type="password" id="sbKeyInput" placeholder="anon key (eyJ...)"></div>
  <div class="row">
    <button id="sbSave" data-i18n="btnSave" style="padding:8px 14px; font-size:12px"></button>
    <button id="sbClear" class="secondary" data-i18n="btnDelete" style="padding:8px 14px; font-size:12px"></button>
  </div>
  <div class="status" id="sbStatus" style="margin-top:8px"></div>
  <div id="sbLinkBox" style="display:none; margin-top:10px">
    <input type="text" inputmode="email" id="sbEmailInput" data-ph="phCEmail" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div class="row">
      <button id="sbLinkBtn" class="secondary" data-i18n="btnLinkEmail" style="padding:8px 14px; font-size:12px"></button>
      <button id="sbLoginBtn" class="secondary" data-i18n="btnMagicLogin" style="padding:8px 14px; font-size:12px"></button>
    </div>
  </div>
</div>

<!-- STEP 0: 로그인 (Supabase 설정 시에만 표시) -->
<section class="step" id="step0">
  <h1 style="margin-top:40px">Liquidcities</h1>
  <p class="sub" data-i18n="s0Sub"></p>
  <input type="text" inputmode="email" id="loginEmail" data-ph="phCEmail"
    autocomplete="email" autocapitalize="off" autocorrect="off" spellcheck="false">
  <input type="password" id="loginPw" data-ph="phPw" autocomplete="current-password" style="margin-top:8px">
  <div class="row">
    <button id="pwLoginBtn" data-i18n="btnPwLogin"></button>
  </div>
  <p class="hint" data-i18n="s0PwHint"></p>
  <div class="status" id="loginStatus"></div>
  <hr style="border:none; border-top:1px solid var(--line); margin:22px 0">
  <div class="row" style="margin-top:0">
    <button id="guestBtn" class="secondary" data-i18n="btnGuest"></button>
  </div>
  <p class="hint" data-i18n="s0GuestHint"></p>
</section>

<!-- STEP 1: 주소 검색 -->
<section class="step active" id="step1">
  <h1 data-i18n="s1Title"></h1>
  <p class="sub" data-i18n="s1Sub"></p>


  <div class="row" style="margin-top:0">
    <button id="tabStruct" class="secondary" style="opacity:1" data-i18n="tabStruct"></button>
    <button id="tabSimple" class="secondary" style="opacity:0.5" data-i18n="tabSimple"></button>
  </div>

  <!-- 구조화 검색 (기본): 나라 / 우편번호 / 도로명·건물명(선택) / 동·호수(표시용) -->
  <div id="structForm" style="margin-top:14px">
    <input type="text" id="countryInput" list="countryList" data-ph="phCountry">
    <datalist id="countryList">
      <option value="South Korea">한국</option>
      <option value="United Kingdom">영국</option>

const LS_KEY = 'lc_saved_buildings';
function getSavedBuildings() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch (e) { return []; }
}
let historyOpen = false;
function renderSavedList() {
  const list = getSavedBuildings();
  const box = document.getElementById('savedBox');
  const wrap = document.getElementById('savedList');
  const histRow = document.getElementById('historyRow');
  const histBtn = document.getElementById('historyBtn');
  const expBtn = document.getElementById('exportBtn');
  let recCount = 0;
  try { recCount = (JSON.parse(localStorage.getItem('lc_records')) || []).length; } catch (e) {}
  histRow.style.display = (list.length || recCount) ? '' : 'none';
  histBtn.style.display = list.length ? '' : 'none';
  expBtn.style.display = recCount ? '' : 'none';
  expBtn.textContent = t('btnExport') + ` (${recCount})`;
  const mdBtn = document.getElementById('myDataBtn');
  mdBtn.style.display = recCount ? '' : 'none';
  document.getElementById('mapBtn').style.display = recCount ? '' : 'none';
  box.style.display = (list.length && historyOpen) ? '' : 'none';
  histBtn.textContent = historyOpen ? t('btnHistoryHide') : t('btnHistory');
  wrap.innerHTML = '';

    const row = document.createElement('div');
    row.className = 'saved-item';
    if (item.thumb) {                                  // 확정 시점의 매스 뷰 썸네일
      const img = document.createElement('img');
      img.src = item.thumb;
      row.appendChild(img);
    }
    const label = document.createElement('span');
    label.textContent = (item.customName || item.building.name || t('unnamedBuilding')) + ' · ' + (item.address || '');
    // ✏️ 건물 이름 수정 (아카이브 항목에 저장)
    const editBtn = document.createElement('button');
    editBtn.className = 'secondary';
    editBtn.textContent = '✏️';
    editBtn.addEventListener('click', () => {
      const cur = item.customName || item.building.name || '';
      const v = prompt(t('renameBuilding'), cur);
      if (v === null) return;
      const all = getSavedBuildings();
      const target = all.find(x => x.id === item.id);
      if (target) {
        if (v.trim()) target.customName = v.trim(); else delete target.customName;
        localStorage.setItem(LS_KEY, JSON.stringify(all));
        resyncBuilding(target); // 이름 변경도 서버 반영
        // 맵의 매스 카테고리에도 같은 이름이 뜨게 (사용자 확정)
        try {
          const names = JSON.parse(localStorage.getItem('lc_mass_names')) || {};
          const mk = massKeyOf(target);
          if (v.trim()) names[mk] = v.trim(); else delete names[mk];
          localStorage.setItem('lc_mass_names', JSON.stringify(names));
        } catch (e) {}
        renderSavedList();
      }
    });
    const loadBtn = document.createElement('button');
    loadBtn.textContent = t('btnLoad');
    loadBtn.addEventListener('click', () => loadSavedBuilding(item));
    const delBtn = document.createElement('button');
    delBtn.className = 'secondary';
    delBtn.textContent = t('btnDelete');
    delBtn.addEventListener('click', () => {
      deleteBuildingFromServer(getSavedBuildings().find(x => x.id === item.id));
      localStorage.setItem(LS_KEY, JSON.stringify(getSavedBuildings().filter(x => x.id !== item.id)));
      renderSavedList();
    });
    row.append(label, editBtn, loadBtn, delBtn);
    wrap.appendChild(row);
  });
}
function saveCurrentBuilding(view) {
  if (!state.building) return;
  // 확정(픽스)된 매스 뷰를 작은 썸네일로 아카이브 (108×192 JPEG, 항목당 수 KB)
  let thumb = null;
  if (state.massPngCanvas) {
    const tc = document.createElement('canvas');
    tc.width = 108; tc.height = 192;
    tc.getContext('2d').drawImage(state.massPngCanvas, 0, 0, 108, 192);
    thumb = tc.toDataURL('image/jpeg', 0.7);
  }
  const entry = {
    id: state.building.osmId || Date.now(),
    lat: state.lat, lon: state.lon,
    address: state.address, countryCode: state.countryCode,
    building: state.building,
    view: { yaw: view.yaw, pitch: view.pitch },
    thumb,
    savedAt: Date.now(),
  };
  const prev = getSavedBuildings().find(x => x.id === entry.id);
  if (prev && prev.customName) entry.customName = prev.customName; // 지정한 이름은 재확정해도 유지 (사용자 확정)
  if (prev && prev.serverId) deleteBuildingFromServer(prev); // 같은 건물 갱신 — 서버 구본 제거
  const list = getSavedBuildings().filter(x => x.id !== entry.id);
  list.unshift(entry);
  localStorage.setItem(LS_KEY, JSON.stringify(list.slice(0, 10))); // 최근 10개까지
  syncBuildingToServer(entry);
  renderSavedList();
}
function loadSavedBuilding(item) {
  state.lat = item.lat; state.lon = item.lon;
  state.address = item.address;
  state.countryCode = item.countryCode || null;
  state.building = item.building;
  state.amenitiesPromise = fetchAmenities(item.lat, item.lon)
    .then(a => { state.amenities = a; return a; }).catch(() => null);
  startMassViewer(item.building);
  if (item.view && massViewer) {
    massViewer.view.yaw = item.view.yaw;
    massViewer.view.pitch = item.view.pitch;
  }
  document.getElementById('buildingInfo').textContent =
    `${item.customName || item.building.name || t('unnamedBuilding')} · ${t('infoLevels', item.building.levels)} · ${item.address}`;
  goto(2);
}

/* ============================================================
   STEP 1 — 주소 검색 (Nominatim) + 실패 시 직접 입력 폴백
   ============================================================ */
const searchBtn = document.getElementById('searchBtn');
const searchErr = document.getElementById('searchErr');
const searchStatus = document.getElementById('searchStatus');
const manualBox = document.getElementById('manualBox');

// ---- what3words: 3단어 주소 ↔ 좌표 (키는 관리자 설정 lc_w3w_key 또는 내장) ----
const DEFAULT_W3W_KEY = ''; // ← 운영자 w3w 키 내장 슬롯
const w3wKey = () => localStorage.getItem('lc_w3w_key') || DEFAULT_W3W_KEY;
const W3W_RE = /^\s*\/{0,3}([^\s.\/]+)\.([^\s.\/]+)\.([^\s.\/]+)\s*$/u;
async function w3wToCoords(words) {
  if (!w3wKey()) return null;
  const r = await fetch(`https://api.what3words.com/v3/convert-to-coordinates?words=${encodeURIComponent(words)}&key=${w3wKey()}`);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message || j.error.code);
  return j.coordinates ? { lat: j.coordinates.lat, lon: j.coordinates.lng, nearest: j.nearestPlace } : null;
}
async function coordsToW3w(lat, lon) {
  if (!w3wKey()) return null;
  try {
    const r = await fetch(`https://api.what3words.com/v3/convert-to-3wa?coordinates=${lat}%2C${lon}&language=en&key=${w3wKey()}`);
    const j = await r.json();
    return j.words || null;
  } catch (e) { return null; }
}
// Nominatim 1회 조회 (limit=3, 첫 결과 사용)
async function nominatim(q) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=3&q=' + encodeURIComponent(q);
  const res = await fetch(url, { headers: { 'Accept-Language': 'ko,en' } });
  if (!res.ok) throw new Error('Nominatim ' + res.status);
  const list = await res.json();
  return list.length ? list[0] : null;
}
// Nominatim 구조화 검색 — country/postalcode/street 파라미터는 자유형식 q=보다
// 훨씬 안정적으로 매칭된다 (예: postalcode=SW11 3PL & country=United Kingdom)
async function nominatimStruct(params) {
  const usp = new URLSearchParams({ format: 'json', addressdetails: '1', limit: '3', ...params });
  const res = await fetch('https://nominatim.openstreetmap.org/search?' + usp.toString(),
    { headers: { 'Accept-Language': 'ko,en' } });
  if (!res.ok) throw new Error('Nominatim ' + res.status);
  const list = await res.json();
  return list.length ? list[0] : null;
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

// 검색 성공 공통 처리: 동·호수는 검색에 쓰지 않고 주소 표기에만 접두
async function finishSearch(hit, usedLabel) {
  const unit = (document.getElementById('unitInput').value || '').trim();
  state.address = (unit ? unit + ' · ' : '') + hit.display_name + (usedLabel ? ` (${t(usedLabel)})` : '');
  state.countryCode = (hit.address && hit.address.country_code) || null;
  await proceedWithLocation(parseFloat(hit.lat), parseFloat(hit.lon));
}

// 탭 전환 (주소로 검색 ↔ 간편 검색)
const tabStruct = document.getElementById('tabStruct');
const tabSimple = document.getElementById('tabSimple');
const structForm = document.getElementById('structForm');
const simpleForm = document.getElementById('simpleForm');
function setTab(struct) {
  structForm.style.display = struct ? '' : 'none';
  simpleForm.style.display = struct ? 'none' : '';
  tabStruct.style.opacity = struct ? '1' : '0.5';
  tabSimple.style.opacity = struct ? '0.5' : '1';
}
tabStruct.addEventListener('click', () => setTab(true));
tabSimple.addEventListener('click', () => setTab(false));

// 구조화 검색: ①나라+우편번호+도로명 → ②나라+우편번호 → ③자유형식 폴백 → ④수동 좌표
const structSearchBtn = document.getElementById('structSearchBtn');
structSearchBtn.addEventListener('click', async () => {
  const country = document.getElementById('countryInput').value.trim();
  const postcode = document.getElementById('postcodeInput').value.trim();
  const street = document.getElementById('streetInput').value.trim();
  if (!country && !postcode && !street) return;
  searchErr.style.display = 'none';
  manualBox.classList.remove('show');
  structSearchBtn.disabled = true;
  try {
    const attempts = [];
    if (street) {
      const p = { street };
      if (country) p.country = country;
      if (postcode) p.postalcode = postcode;
      attempts.push({ params: p, label: '' });
    }
    if (postcode) {
      const p = { postalcode: postcode };
      if (country) p.country = country;
      attempts.push({ params: p, label: 'postcodeLoc' });
    }
    let hit = null, usedLabel = '';
    for (let i = 0; i < attempts.length; i++) {
      searchStatus.textContent = t('stSearchN', i + 1, attempts.length);
      try { hit = await nominatimStruct(attempts[i].params); } catch (e) { hit = null; }
      if (hit) { usedLabel = attempts[i].label; break; }
      if (i < attempts.length - 1) await sleep(1100);
    }
    // 구조화 실패 → 입력을 이어붙여 자유형식 다단계 폴백 재사용
    if (!hit) {
      const joined = [street, postcode, country].filter(Boolean).join(' ');
      const cands = buildQueryCandidates(joined);
      for (let i = 0; i < cands.length; i++) {
        searchStatus.textContent = t('stRetry', cands[i].q);
        await sleep(1100);
        try { hit = await nominatim(cands[i].q); } catch (e) { hit = null; }
        if (hit) { usedLabel = cands[i].label; break; }
      }
    }
    if (!hit) {
      searchStatus.textContent = '';
      manualBox.classList.add('show');
      return;
    }
    await finishSearch(hit, usedLabel);
  } catch (e) {
    searchErr.textContent = t('errSearch', e.message);
    searchErr.style.display = 'block';
    manualBox.classList.add('show');
    searchStatus.textContent = '';
  } finally {
    structSearchBtn.disabled = false;
  }
});

// 입력 문자열에서 검색 후보들을 단계별로 생성:
// 1차 원문 → 2차 우편번호만 → 3차 호수/동호수 제거·토큰 축약
function buildQueryCandidates(q) {
  const cands = [{ q, label: '' }];

  // 우편번호 추출: 영국식(SW11 3PL) 또는 숫자형 5~6자리(한국/싱가포르)
  const ukPost = q.match(/\b[A-Za-z]{1,2}\d[A-Za-z\d]?\s*\d[A-Za-z]{2}\b/);
  const numPost = q.match(/\b\d{5,6}\b/);
  if (ukPost) cands.push({ q: ukPost[0].toUpperCase(), label: 'postcodeLoc' });
  else if (numPost) cands.push({ q: numPost[0], label: 'postcodeLoc' });

  // 호수/유닛 표기 제거: "Flat 19", "#04-22", "1201호", "107동 302호", "Apt 3B" 등
  let stripped = q
    .replace(/\b(flat|apt|apartment|unit|suite|ste|room)\s*[#]?\s*[\w-]+\b/gi, '')
    .replace(/#\s*[\d-]+/g, '')
    .replace(/\b\d+\s*동\s*\d+\s*호\b/g, '')
    .replace(/\b\d+\s*호\b/g, '')
    .replace(/\s{2,}/g, ' ').trim();
  if (stripped && stripped.toLowerCase() !== q.toLowerCase()) {
    cands.push({ q: stripped, label: 'approxLoc' });
  }

  // 토큰 축약: 앞쪽 상세 토큰을 덜어내고 뒤쪽(도시/국가) 위주로
  const tokens = stripped.split(/\s+/);
  if (tokens.length > 3) {
    cands.push({ q: tokens.slice(-3).join(' '), label: 'approxLoc' });
  }
  // 숫자 토큰(번지수 등) 제거 버전 — "모란로 65 삼부아파트" → "모란로 삼부아파트"
  const noNums = tokens.filter(t => !/^\d+$/.test(t));
  if (noNums.length && noNums.length !== tokens.length) {
    cands.push({ q: noNums.join(' '), label: 'approxLoc' });
  }
  // 마지막 수단: 가장 구체적인 이름 하나만 (한국식 "삼부아파트" 등, 마지막 토큰)
  if (tokens.length > 1) {
    const last = tokens[tokens.length - 1];
    if (!/^\d+$/.test(last)) cands.push({ q: last, label: 'approxLoc' });
  }
  // 중복 제거 + 최대 5개 (Nominatim 레이트리밋 고려)
  const seen = new Set();
  return cands.filter(c => {
    const k = c.q.toLowerCase();
    if (seen.has(k) || !c.q) return false;
    seen.add(k);
    return true;
  }).slice(0, 5);
}

searchBtn.addEventListener('click', async () => {
  // 3단어 주소(word.word.word 또는 ///word.word.word)면 what3words로 변환
  {
    const q0 = document.getElementById('addrInput').value || '';
    const mw = q0.match(W3W_RE);
    if (mw && w3wKey()) {
      searchErr.style.display = 'none';
      searchStatus.textContent = t('stSearching');
      try {
        const c = await w3wToCoords(`${mw[1]}.${mw[2]}.${mw[3]}`);
        if (c) {
          state.address = `///${mw[1]}.${mw[2]}.${mw[3]}` + (c.nearest ? ` (${c.nearest})` : '');
          state.countryCode = null;
          searchStatus.textContent = '';
          await proceedWithLocation(c.lat, c.lon);
          return;
        }
      } catch (e) {
        searchErr.textContent = 'what3words — ' + e.message;
        searchErr.style.display = 'block';
        searchStatus.textContent = '';
        return;
      }
    }
  }
  const q = document.getElementById('addrInput').value.trim();
  if (!q) return;
  searchErr.style.display = 'none';
  manualBox.classList.remove('show');
  searchBtn.disabled = true;
  try {
    const cands = buildQueryCandidates(q);
    let hit = null, usedLabel = '';
    for (let i = 0; i < cands.length; i++) {
      searchStatus.textContent = i === 0 ? t('stSearching') : t('stRetry', cands[i].q);
      try { hit = await nominatim(cands[i].q); } catch (e) { hit = null; }
      if (hit) { usedLabel = cands[i].label; break; }
      if (i < cands.length - 1) await sleep(1100); // Nominatim 레이트리밋 (1 req/s)
    }
    if (!hit) {
      // 모든 단계 실패 → 직접 입력 폴백 노출
      searchStatus.textContent = '';
      manualBox.classList.add('show');
      return;
    }
    await finishSearch(hit, usedLabel);
  } catch (e) {
    searchErr.textContent = t('errSearch', e.message);
    searchErr.style.display = 'block';
    manualBox.classList.add('show');
    searchStatus.textContent = '';
  } finally {
    searchBtn.disabled = false;
  }
});

document.getElementById('manualBtn').addEventListener('click', async () => {
  const lat = parseFloat(document.getElementById('manualLat').value);
  const lon = parseFloat(document.getElementById('manualLon').value);
  if (isNaN(lat) || isNaN(lon)) {
    searchErr.textContent = t('errLatLon');
    searchErr.style.display = 'block';
    return;
  }
  state.address = `${lat.toFixed(5)}, ${lon.toFixed(5)} (${t('manualLoc')})`;
  await proceedWithLocation(lat, lon);
});

async function proceedWithLocation(lat, lon) {
  state.lat = lat; state.lon = lon;
  searchStatus.textContent = t('stOverpass');
  try {
    const building = await fetchBuilding(lat, lon);
    if (!building) {
      searchErr.textContent = t('errNoBuilding');
      searchErr.style.display = 'block';
      manualBox.classList.add('show');
      searchStatus.textContent = '';
      return;
    }
    state.building = building;
    // 반경 데이터는 백그라운드로 조회 시작하되 promise를 보관 —
    // 산출물 화면 진입 시 (타임아웃 한도 내에서) 완료를 기다린다
    state.amenitiesPromise = fetchAmenities(lat, lon)
      .then(a => { state.amenities = a; return a; })
      .catch(() => null);

    searchStatus.textContent = t('stRender');
    startMassViewer(building);
    document.getElementById('buildingInfo').textContent =
      `${building.name || t('unnamedBuilding')} · ${t('infoLevels', building.levels)} · ${state.address}`;
    searchStatus.textContent = '';
    goto(2);
  } catch (e) {
    searchErr.textContent = t('errBuilding', e.message);
    searchErr.style.display = 'block';
    searchStatus.textContent = '';
  }
}

/* ============================================================
   Overpass — 건물 폴리곤 + 주변 어메니티
   ============================================================ */
// 공개 Overpass 서버는 종종 504를 반환하므로 미러 순차 폴백 + 1회 재시도
const OVERPASS_URLS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.private.coffee/api/interpreter',
];
async function overpass(query) {
  let lastErr = null;
  for (let attempt = 0; attempt < 2; attempt++) {
    for (const url of OVERPASS_URLS) {
      // 응답 없는 미러가 전체를 막지 않도록 요청별 12초 타임아웃 필수
      const ac = new AbortController();
      const timer = setTimeout(() => ac.abort(), 12000);
      try {
        const res = await fetch(url, {
          method: 'POST',
          body: 'data=' + encodeURIComponent(query),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          signal: ac.signal,
        });
        if (!res.ok) throw new Error('Overpass ' + res.status);
        return await res.json();
      } catch (e) { lastErr = e; }
      finally { clearTimeout(timer); }
    }
    await new Promise(r => setTimeout(r, 1500));
  }
  throw lastErr || new Error('Overpass unreachable');
}

async function fetchBuilding(lat, lon) {
  // 본체(building)와 부분(building:part — 굴뚝·타워 등 높이가 다른 구조)을 함께 조회
  const q = `[out:json][timeout:25];
    (
      way["building"](around:80,${lat},${lon});
      way["building:part"](around:80,${lat},${lon});
    );
    out geom tags;`;
  const data = await overpass(q);
  const allWays = data.elements.filter(e => e.type === 'way' && e.geometry && e.geometry.length >= 4);
  const partWays = allWays.filter(e => e.tags && e.tags['building:part']);
  const ways = allWays.filter(e => e.tags && e.tags.building);
  if (!ways.length) return null;

  // 포인트를 포함하는 폴리곤 우선, 없으면 중심점이 가장 가까운 것
  const inside = ways.find(w => pointInPolygon(lat, lon, w.geometry));
  const pick = inside || ways.reduce((best, w) => {
    const c = centroidLatLon(w.geometry);
    const d = haversine(lat, lon, c.lat, c.lon);
    return (!best || d < best.d) ? { w, d } : best;
  }, null).w;

  const tags = pick.tags || {};
  let levels = parseInt(tags['building:levels']) || null;
  let height = parseFloat(tags['height'] || tags['building:height']) || null;
  if (!levels && height) levels = Math.max(1, Math.round(height / 3.5));
  if (!levels) levels = 3;             // 태그가 전혀 없으면 3층 가정
  if (!height) height = levels * 3.5;

  // 로컬 미터 좌표 변환 (centroid 기준 equirectangular 근사)
  const c = centroidLatLon(pick.geometry);
  const R = 6378137;
  const toLocal = g => [
    (g.lon - c.lon) * Math.PI / 180 * R * Math.cos(c.lat * Math.PI / 180),
    (g.lat - c.lat) * Math.PI / 180 * R,
  ];
  const closeTrim = arr => {
    const [fx, fy] = arr[0], [lx2, ly2] = arr[arr.length - 1];
    if (Math.abs(fx - lx2) < 0.01 && Math.abs(fy - ly2) < 0.01) arr.pop();
    return arr;
  };
  const coords = closeTrim(pick.geometry.map(toLocal));

  // 본체 폴리곤 내부(중심점 기준)의 building:part들 — 굴뚝처럼 높이가 다른
  // 구조를 개별 압출하기 위해 파트별 {coords, height} 수집
  const parts = [];
  for (const pw of partWays) {
    const pc = centroidLatLon(pw.geometry);
    if (!pointInPolygon(pc.lat, pc.lon, pick.geometry)) continue;
    const pt = pw.tags || {};
    let ph = parseFloat(pt.height || pt['building:height']) || null;
    if (!ph) {
      const pl = parseInt(pt['building:levels']);
      ph = pl ? pl * 3.5 : height;
    }
    parts.push({ coords: closeTrim(pw.geometry.map(toLocal)), height: ph });
  }

  return { coords, levels, height, name: tags.name || null, osmId: pick.id,
           parts: parts.length >= 2 ? parts : null }; // 파트가 2개 이상일 때만 사용
}

async function fetchAmenities(lat, lon) {
  const q = `[out:json][timeout:25];
    ( node["highway"="bus_stop"](around:1000,${lat},${lon});
      node["railway"~"station|subway_entrance"](around:1000,${lat},${lon});
      node["amenity"~"^(restaurant|cafe)$"](around:1000,${lat},${lon}); );
    out body;
    ( way["leisure"="park"](around:5000,${lat},${lon});
      way["landuse"~"^(forest|grass|recreation_ground)$"](around:5000,${lat},${lon}); );
    out ids;`;
  const data = await overpass(q);
  let transitDistM = null, restaurants = 0, cafes = 0, parks = 0;
  for (const e of data.elements) {
    if (e.type === 'way') { parks++; continue; }
    const t = e.tags || {};
    if (t.amenity === 'restaurant') restaurants++;
    else if (t.amenity === 'cafe') cafes++;
    else {
      const d = haversine(lat, lon, e.lat, e.lon);
      if (transitDistM === null || d < transitDistM) transitDistM = d;
    }
  }
  return { transitDistM: transitDistM && Math.round(transitDistM), restaurants, cafes, parks };
}

function pointInPolygon(lat, lon, geom) {
  let inside = false;
  for (let i = 0, j = geom.length - 1; i < geom.length; j = i++) {
    const yi = geom[i].lat, xi = geom[i].lon, yj = geom[j].lat, xj = geom[j].lon;
    if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) inside = !inside;
  }
  return inside;
}
function centroidLatLon(geom) {
  let lat = 0, lon = 0;
  geom.forEach(g => { lat += g.lat; lon += g.lon; });
  return { lat: lat / geom.length, lon: lon / geom.length };
}
function haversine(la1, lo1, la2, lo2) {
  const R = 6371000, r = Math.PI / 180;
  const a = Math.sin((la2 - la1) * r / 2) ** 2 +
    Math.cos(la1 * r) * Math.cos(la2 * r) * Math.sin((lo2 - lo1) * r / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

/* ============================================================
   STEP 2 — Three.js 매스 뷰어 (인터랙티브)
   순수 매스만 (창문/문 없음), 검은 배경 + 흰 매스 + 1.5px 검은 외곽선(Line2)
   사용자가 드래그로 yaw/pitch를 돌려 원하는 각도를 고르고, 확인을 누르면
   그 시점의 뷰가 고정되어 마스크로 사용된다.
   건물은 어느 각도에서든 960×960 중앙 영역에 크롭 없이 자동 핏.
   ============================================================ */
const massCanvas = document.getElementById('massCanvas');
const massCanvasCtx = massCanvas.getContext('2d');
let massViewer = null;

function startMassViewer(building) {
  stopMassViewer();

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  // alpha:true — 확정 시 "외곽선만 있는 투명 레이어"(흰 배경 산출물용) 캡처에 필요
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true });
  renderer.setSize(CANVAS_W, CANVAS_H);
  renderer.setPixelRatio(1);

  // 압출 지오메트리 — building:part가 있으면(굴뚝 등 높이가 다른 구조)
  // 파트별로 개별 높이 압출, 없으면 본체 폴리곤 하나를 균일 압출
  const pieces = (building.parts && building.parts.length)
    ? building.parts
    : [{ coords: building.coords, height: building.height }];
  const meshes = [];
  const geometries = [];
  const group = new THREE.Group();
  const lineMat = new LineMaterial({ color: 0x000000, linewidth: 1.5, worldUnits: false });
  lineMat.resolution.set(CANVAS_W, CANVAS_H);
  // 매스를 전부 먼저 추가하고 선을 나중에 추가 — 렌더 순서가 곧 depth 기록
  // 순서라서, 섞어 추가하면 나중 매스가 앞선 선을 가리지 못해 내부 선이 비친다
  const lineObjs = [];
  for (const piece of pieces) {
    if (!piece.coords || piece.coords.length < 3) continue;
    const shape = new THREE.Shape();
    piece.coords.forEach(([x, y], i) => i === 0 ? shape.moveTo(x, y) : shape.lineTo(x, y));
    shape.closePath();
    const geometry = new THREE.ExtrudeGeometry(shape, { depth: piece.height, bevelEnabled: false });
    geometry.rotateX(-Math.PI / 2); // 높이를 Y축으로
    const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    group.add(mesh);
    meshes.push(mesh);
    geometries.push(geometry);
    // 1.5px 외곽선 — LineBasicMaterial의 linewidth는 브라우저에서 무시되므로 Line2 사용
    const edges = new THREE.EdgesGeometry(geometry, 12); // 12도 미만 꺾임(공면 삼각분할)은 제외
    const lineGeo = new LineSegmentsGeometry().fromEdgesGeometry(edges);
    const line = new LineSegments2(lineGeo, lineMat);
    line.renderOrder = 1; // 항상 매스들 다음에 렌더
    lineObjs.push(line);
  }
  lineObjs.forEach(l => group.add(l));
  scene.add(group);
  const mesh = meshes[0]; // 하위 호환 참조

  const bbox = new THREE.Box3().setFromObject(group);
  const center = bbox.getCenter(new THREE.Vector3());
  const dist = Math.max(1, bbox.getSize(new THREE.Vector3()).length() * 3);
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, dist * 4);

  // 초기 각도 = 검증된 등각 방향 (0.25, 0.62, -0.65)
  const d0 = new THREE.Vector3(0.25, 0.62, -0.65).normalize();
  const view = { yaw: Math.atan2(d0.x, d0.z), pitch: Math.asin(d0.y) };

  const vtmp = new THREE.Vector3();

  function renderFrame() {
    const cp = Math.cos(view.pitch), sp = Math.sin(view.pitch);
    const dir = new THREE.Vector3(Math.sin(view.yaw) * cp, sp, Math.cos(view.yaw) * cp);
    camera.position.copy(center).addScaledVector(dir, dist);
    camera.lookAt(center);
    camera.updateMatrixWorld(true);

    // 뷰 공간 정점 범위 측정 → 화면 중앙 정렬 + 960×960 핏 (모든 파트 포함)
    const inv = camera.matrixWorldInverse;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const g of geometries) {
      const pos = g.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        vtmp.fromBufferAttribute(pos, i).applyMatrix4(inv);
        if (vtmp.x < minX) minX = vtmp.x; if (vtmp.x > maxX) maxX = vtmp.x;
        if (vtmp.y < minY) minY = vtmp.y; if (vtmp.y > maxY) maxY = vtmp.y;
      }
    }
    // 카메라를 뷰 평면상에서 평행이동(회전 없음)해 건물을 화면 중앙에
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
    const up = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
    camera.position.addScaledVector(right, cx).addScaledVector(up, cy);
    camera.updateMatrixWorld(true);

    // NDC 한계: x ±(960/1080)=±0.888, y ±(960/1920)=±0.5 → HW ≥ 1.125·halfExtent
    const HW = 1.125 * Math.max((maxX - minX) / 2, (maxY - minY) / 2) * 1.02;
    camera.left = -HW; camera.right = HW;
    camera.top = HW * CANVAS_H / CANVAS_W; camera.bottom = -HW * CANVAS_H / CANVAS_W;
    camera.updateProjectionMatrix();

    renderer.render(scene, camera);
    massCanvasCtx.drawImage(renderer.domElement, 0, 0);
  }

  massViewer = { renderer, view, renderFrame, running: true, scene, mesh, meshes };
  (function loop() {
    if (!massViewer || !massViewer.running) return;
    renderFrame();
    requestAnimationFrame(loop);
  })();
}

function stopMassViewer() {
  if (massViewer) {
    massViewer.running = false;
    massViewer.renderer.dispose();
    massViewer = null;
  }
}

// 매스 뷰 드래그 회전 (yaw 자유, pitch는 지평선 위~거의 수직 사이로 제한)
let massDragging = false, massLastX = 0, massLastY = 0;
massCanvas.addEventListener('pointerdown', e => {
  if (!massViewer) return;
  massDragging = true;
  massCanvas.style.cursor = 'grabbing';
  massLastX = e.clientX; massLastY = e.clientY;
  try { massCanvas.setPointerCapture(e.pointerId) } catch (err) {};
});
massCanvas.addEventListener('pointermove', e => {
  if (!massDragging || !massViewer) return;
  massViewer.view.yaw -= (e.clientX - massLastX) * 0.006;
  massViewer.view.pitch = Math.min(1.35, Math.max(0.12,
    massViewer.view.pitch + (e.clientY - massLastY) * 0.004));
  massLastX = e.clientX; massLastY = e.clientY;
});
const endMassDrag = () => { massDragging = false; massCanvas.style.cursor = 'grab'; };
massCanvas.addEventListener('pointerup', endMassDrag);
massCanvas.addEventListener('pointercancel', endMassDrag);

// 검증된 로직: 흰색(매스)→불투명, 검은색(배경)→투명 알파 마스크
function buildAlphaMask(srcCanvas) {
  const c = document.createElement('canvas');
  c.width = srcCanvas.width; c.height = srcCanvas.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0);
  const img = ctx.getImageData(0, 0, c.width, c.height);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i + 3] = (d[i] + d[i + 1] + d[i + 2]) / 3;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

/* ============================================================
   STEP 3 — 미디어 업로드
   ============================================================ */
const video = document.getElementById('srcVideo');

/* ============================================================
   촬영 시각 추출 — 파일 수정시각(lastModified)은 복사/전송 때마다 바뀌므로
   사진은 EXIF DateTimeOriginal, 영상은 MP4/MOV mvhd의 creation time을 읽는다.
   실패 시에만 파일 시각 → 현재 시각 순 폴백. 사용한 소스는 레코드에 기록.
   ============================================================ */
async function readMp4CreationDate(file) {
  const buf = new Uint8Array(await file.slice(0, 4 * 1024 * 1024).arrayBuffer());
  for (let i = 4; i < buf.length - 20; i++) {
    if (buf[i] === 0x6d && buf[i + 1] === 0x76 && buf[i + 2] === 0x68 && buf[i + 3] === 0x64) { // 'mvhd'
      const ver = buf[i + 4];
      let secs = 0;
      if (ver === 1) { for (let k = 0; k < 8; k++) secs = secs * 256 + buf[i + 8 + k]; }
      else { secs = buf[i + 8] * 16777216 + buf[i + 9] * 65536 + buf[i + 10] * 256 + buf[i + 11]; }
      const d = new Date((secs - 2082844800) * 1000); // 1904 epoch → unix
      const y = d.getFullYear();
      return (y >= 1990 && y <= new Date().getFullYear() + 1) ? d : null;
    }
  }
  return null;
}
// 미디어의 촬영 GPS — 사진은 EXIF, 영상은 QuickTime ©xyz(ISO6709) 패턴 검색
async function readMediaGps(file) {
  try {
    if (file.type.startsWith('image/') && window.exifr) {
      const g = await exifr.gps(file);
      if (g && isFinite(g.latitude) && isFinite(g.longitude)) {
        return { lat: g.latitude, lon: g.longitude };
      }
    } else if (file.type.startsWith('video/')) {
      // 아이폰 MOV/MP4의 위치(©xyz, ISO6709)는 대개 moov atom(파일 끝)에
      // 있으므로 앞뿐 아니라 끝 4MB도 검색해야 한다
      const dec = new TextDecoder('latin1');
      const CHUNK = 4 * 1024 * 1024;
      const parts = [file.slice(0, CHUNK)];
      if (file.size > CHUNK) parts.push(file.slice(Math.max(0, file.size - CHUNK)));
      for (const part of parts) {
        const txt = dec.decode(new Uint8Array(await part.arrayBuffer()));
        const m = txt.match(/([+-]\d{1,2}\.\d+)([+-]\d{1,3}\.\d+)/);
        if (m) {
          const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
          if (Math.abs(lat) <= 90 && Math.abs(lon) <= 180) return { lat, lon };
        }
      }
    }
  } catch (e) {}
  return null;
}

async function readCaptureDate(file) {
  try {
    if (file.type.startsWith('image/') && window.exifr) {
      const ex = await exifr.parse(file, { pick: ['DateTimeOriginal', 'CreateDate'] });
      const d = ex && (ex.DateTimeOriginal || ex.CreateDate);
      if (d instanceof Date && !isNaN(d)) return { date: d, source: 'exif' };
    } else if (file.type.startsWith('video/')) {
      const d = await readMp4CreationDate(file);
      if (d) return { date: d, source: 'video-meta' };
    }
  } catch (e) { /* 폴백으로 */ }
  if (file.lastModified) return { date: new Date(file.lastModified), source: 'file' };
  return { date: new Date(), source: 'now' };
}

document.getElementById('mediaInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const err = document.getElementById('mediaErr');
  err.style.display = 'none';
  // 새 미디어 = 새 기록 세션 (이걸 리셋하지 않으면 두 번째 작품이 저장되지 않음)
  state._recordSaved = false;
  state._recordSavedAt = null;
  const cap = await readCaptureDate(file);
  state.mediaDate = cap.date;
  state.mediaDateSource = cap.source; // 'exif' | 'video-meta' | 'file' | 'now'
  state.mediaGps = await readMediaGps(file); // {lat, lon} 또는 null
  const url = URL.createObjectURL(file);

  if (file.type.startsWith('video/')) {
    state.mediaType = 'video';
    video.src = url;
    video.load(); // iOS Safari: 명시적으로 로드를 시작해야 메타데이터가 온다
    await new Promise((ok, no) => {
      // iOS는 재생 전에 loadeddata를 주지 않는 경우가 있어 metadata 기준으로 대기
      video.onloadedmetadata = ok;
      video.onloadeddata = ok;
      video.onerror = () => no(new Error(t('errPlay')));
      setTimeout(() => no(new Error(t('errPlay'))), 15000); // 안전 타임아웃
    }).catch(ex => { err.textContent = ex.message; err.style.display = 'block'; });
    if (!video.videoWidth) { err.textContent = t('errRes'); err.style.display = 'block'; return; }
    state.mediaEl = video;
    // 소리 있는 재생을 먼저 시도 — 파일 선택도 사용자 제스처라 대부분 허용됨.
    // (muted로 시작한 재생 세션은 Safari에서 나중에 소리를 풀기 어렵다)
    video.removeAttribute('muted');
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1;
    try {
      await video.play(); // 소리 포함 재생 성공
    } catch (err) {
      // 자동재생 정책에 막힘 → muted로 폴백, 사용자가 버튼으로 켬
      video.muted = true;
      video.play().catch(() => {});
    }
    document.getElementById('soundBtn').style.display = '';
    pauseBtn.style.display = '';
    pauseBtn.textContent = t('btnPause');
    setTimeout(() => {
      soundBtn.textContent = video.muted ? t('soundOn') : t('soundOff');
      const h = document.getElementById('soundHint');
      if (h && !video.muted) h.textContent = t('sndOnHint');
    }, 100);
    // 썸네일 장면 선택 (영상 전체 범위, 기본 중간)
    state.thumbFrac = 0.5;
    document.getElementById('frameSlider').value = 500;
    document.getElementById('frameRow').style.display = '';
    // 10초 초과 영상: 사용할 10초 구간의 시작 지점 선택 UI
    state.clipStart = 0;
    const over = video.duration > TARGET_DURATION + 0.05;
    document.getElementById('clipRow').style.display = over ? '' : 'none';
    if (over) {
      const sl = document.getElementById('clipSlider');
      sl.max = (video.duration - TARGET_DURATION).toFixed(1);
      sl.value = 0;
      updateClipLabel();
    }
  } else if (file.type.startsWith('image/')) {
    state.mediaType = 'image';
    const img = new Image();
    await new Promise((ok, no) => { img.onload = ok; img.onerror = no; img.src = url; })
      .catch(() => { err.textContent = t('errImg'); err.style.display = 'block'; });
    if (!img.naturalWidth) return;
    state.mediaEl = img;
    document.getElementById('soundBtn').style.display = 'none';
    pauseBtn.style.display = 'none';
    state.clipStart = 0;
    document.getElementById('clipRow').style.display = 'none';
    document.getElementById('frameRow').style.display = 'none';
  } else {
    err.textContent = t('errType');
    err.style.display = 'block';
    return;
  }

  // 촬영 시각·위치와 출처를 화면에 표시 — 시간/거리가 이상하면 원인을 바로 알 수 있게
  {
    const srcKey = { exif: 'capExif', 'video-meta': 'capVideoMeta', file: 'capFile', now: 'capNow' }[state.mediaDateSource] || 'capFile';
    const label = t(srcKey);
    let line = (srcKey === 'capExif' || srcKey === 'capVideoMeta')
      ? `${label}: ${fmtDate(state.mediaDate)}`
      : `${fmtDate(state.mediaDate)} · ${label}`;
    if (state.mediaGps && isFinite(state.lat) && isFinite(state.lon)) {
      const d = Math.round(haversine(state.lat, state.lon, state.mediaGps.lat, state.mediaGps.lon));
      const dTxt = d >= 1000 ? (d / 1000).toFixed(1) + 'km' : d + 'm';
      line += '\n' + t('gpsFound', state.mediaGps.lat.toFixed(4), state.mediaGps.lon.toFixed(4), dTxt);
    } else {
      line += '\n' + t('gpsNone');
    }
    const ci = document.getElementById('captureInfo');
    ci.style.whiteSpace = 'pre-line';
    ci.textContent = line;
  }
  resetTransform();
  state.locked = false;
  document.getElementById('editorCanvas').classList.remove('locked');
  startEditorLoop();
  detectObjects();     // 백그라운드로 객체 인식 시작
  goto(4);
});

/* ============================================================
   STEP 4 — 합성 에디터 (검증된 destination-in 마스크 + 팬/줌)
   ============================================================ */
const editorCanvas = document.getElementById('editorCanvas');
const editorCtx = editorCanvas.getContext('2d');
const frameBuf = document.createElement('canvas');
frameBuf.width = CANVAS_W; frameBuf.height = CANVAS_H;
const frameCtx = frameBuf.getContext('2d');

const MIN_USER_SCALE = 0.5; // 영역보다 작게 축소 허용 (빈 부분은 검은 배경)
const MAX_USER_SCALE = 4;

function mediaSize() {
  const m = state.mediaEl;
  return state.mediaType === 'video'
    ? { w: m.videoWidth, h: m.videoHeight }
    : { w: m.naturalWidth, h: m.naturalHeight };
}

function resetTransform() {
  const { w, h } = mediaSize();
  // 기준을 캔버스 전체가 아니라 마스크 영역(960×960)으로 — 이렇게 해야
  // 미디어를 상하좌우로 실제로 움직일 여지가 생기고, 축소도 자연스럽다.
  // (마스크 밖은 어차피 destination-in으로 잘려나가므로 영역만 덮으면 됨)
  state.baseScale = Math.max(AREA / w, AREA / h);
  state.userScale = 1;
  state.pan = { x: 0, y: 0 };
}

// 합성 한 프레임을 대상 컨텍스트에 그림 (미디어 → 마스크 → 검은 배경 위)
function drawComposite(ctx, mediaSource, bg = '#000', edgeOverlay = null) {
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const { w, h } = mediaSize();
  const scale = state.baseScale * state.userScale;
  const dw = w * scale, dh = h * scale;
  // 팬은 자유 (클램프 없음) — 가로 미디어도 위아래로 자유롭게 이동 가능.
  // 미디어가 마스크를 다 덮지 않으면 그 부분은 검은 배경이 보인다 (사용자가
  // 미리보기를 보면서 스스로 조절)
  const dx = (CANVAS_W - dw) / 2 + state.pan.x;
  const dy = (CANVAS_H - dh) / 2 + state.pan.y;

  frameCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  frameCtx.drawImage(mediaSource, dx, dy, dw, dh);
  frameCtx.globalCompositeOperation = 'destination-in';
  frameCtx.drawImage(state.maskCanvas, 0, 0);
  frameCtx.globalCompositeOperation = 'source-over';

  ctx.drawImage(frameBuf, 0, 0);
  if (edgeOverlay) ctx.drawImage(edgeOverlay, 0, 0); // 흰 배경용 검은 외곽선
}

let editorRunning = false;
function startEditorLoop() {
  if (editorRunning) return;
  editorRunning = true;
  // 1080×1920 전체 합성은 프레임당 비용이 크므로 30fps로 제한
  let last = 0;
  (function loop(ts) {
    if (!editorRunning) return;
    if (ts - last >= 33) {
      last = ts;
      if (state.mediaEl) drawComposite(editorCtx, state.mediaEl);
    }
    requestAnimationFrame(loop);
  })(0);
}

// 팬(드래그) + 핀치 줌(터치 2손가락 — 폰에는 휠이 없다)
let dragging = false, lastPX = 0, lastPY = 0;
const edPointers = new Map(); // pointerId → {x, y}
let edPinchDist = 0;
const displayScale = () => editorCanvas.clientWidth / CANVAS_W;
editorCanvas.addEventListener('pointerdown', e => {
  if (state.locked) return;
  edPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (edPointers.size === 2) {
    const [a, b] = [...edPointers.values()];
    edPinchDist = Math.hypot(a.x - b.x, a.y - b.y);
    dragging = false; // 핀치 중에는 팬 정지
  } else {
    dragging = true;
    editorCanvas.classList.add('dragging');
    lastPX = e.clientX; lastPY = e.clientY;
  }
  try { editorCanvas.setPointerCapture(e.pointerId) } catch (err) {};
});
editorCanvas.addEventListener('pointermove', e => {
  if (state.locked) return;
  if (edPointers.has(e.pointerId)) edPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (edPointers.size === 2) {
    const [a, b] = [...edPointers.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (edPinchDist > 0) {
      state.userScale = Math.min(MAX_USER_SCALE, Math.max(MIN_USER_SCALE, state.userScale * (d / edPinchDist)));
    }
    edPinchDist = d;
    return;
  }
  if (!dragging) return;
  state.pan.x += (e.clientX - lastPX) / displayScale();
  state.pan.y += (e.clientY - lastPY) / displayScale();
  lastPX = e.clientX; lastPY = e.clientY;
});
const endDrag = e => {
  edPointers.delete(e.pointerId);
  edPinchDist = 0;
  if (edPointers.size === 0) { dragging = false; editorCanvas.classList.remove('dragging'); }
};
editorCanvas.addEventListener('pointerup', endDrag);
editorCanvas.addEventListener('pointercancel', endDrag);

// 줌(휠) — cover-fit 미만 축소 금지 (빈 공간 방지)
editorCanvas.addEventListener('wheel', e => {
  if (state.locked) return;
  e.preventDefault();
  state.userScale = Math.min(MAX_USER_SCALE, Math.max(MIN_USER_SCALE, state.userScale * (1 - e.deltaY * 0.0015)));
}, { passive: false });

document.getElementById('resetBtn').addEventListener('click', () => { if (!state.locked) resetTransform(); });

// 10초 초과 영상의 구간 선택: 시작점 이동 + 미리보기도 그 구간만 반복
const fmtClock = sec => `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, '0')}`;
function updateClipLabel() {
  const cs = state.clipStart || 0;
  document.getElementById('clipLabel').textContent =
    t('clipUse', fmtClock(cs), fmtClock(cs + TARGET_DURATION));
}
document.getElementById('clipSlider').addEventListener('input', e => {
  state.clipStart = parseFloat(e.target.value) || 0;
  video.currentTime = state.clipStart;
  if (video.paused) video.play().catch(() => {});
  updateClipLabel();
});
// 미리보기 재생이 선택 구간 [clipStart, clipStart+10] 안에서만 돌게 가드
// + 반복 경계 갭 최소화: ended를 기다리지 않고 끝 직전에 선제 되감기
video.addEventListener('timeupdate', () => {
  if (state.mediaType !== 'video' || state._thumbScrub) return;
  const cs = state.clipStart || 0;
  const clipEnd = Math.min(video.duration || 0, cs + TARGET_DURATION);
  if (video.duration > TARGET_DURATION + 0.05 &&
      (video.currentTime < cs - 0.3 || video.currentTime > clipEnd)) {
    video.currentTime = cs;
    return;
  }
  // 짧은 영상 반복: 끝 0.12초 전에 미리 되감아 멈칫거림을 줄인다
  if (video.duration && video.currentTime >= video.duration - 0.12) {
    video.currentTime = cs;
    if (video.paused) video.play().catch(() => {});
  }
});
// 수동 루프 — loop 속성은 Safari에서 되감김 후 오디오가 끊기는 사례가 있어
// ended 이벤트로 직접 되감는다 (짧은 영상 반복 재생도 이 경로)
video.addEventListener('ended', () => {
  if (state.mediaType !== 'video') return;
  video.currentTime = state.clipStart || 0;
  video.play().catch(() => {});
});

// 영상 일시정지/재생 토글 — 멈춘 프레임을 보면서 위치를 잡을 수 있게
const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
  if (state.mediaType !== 'video') return;
  if (video.paused) {
    video.play().catch(() => {});
    pauseBtn.textContent = t('btnPause');
  } else {
    video.pause();
    pauseBtn.textContent = t('btnPlay');
  }
});

// 소리 켜기 (AudioContext resume — 검증된 함정 대응)
// 4단계와 6단계(산출물 미리보기) 양쪽에서 같은 토글을 공유
const soundBtn = document.getElementById('soundBtn');
const soundBtn6 = document.getElementById('soundBtn6');
function toggleSound() {
  // AudioContext 그래프를 만들지 않는다 — 그래프 라우팅은 소리가 그래프
  // 상태에 종속되는 원인이었고, 내보내기(WebCodecs)에는 그래프가 필요 없다.
  const turnOn = video.muted;
  if (turnOn) {
    // Safari/WebKit: muted "HTML 속성"으로 시작한 비디오는 property 해제만으론
    // 소리가 안 풀림 — 속성 제거 + 같은 제스처 안에서 pause→unmute→play
    video.pause();
    video.removeAttribute('muted');
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1;
    video.play().catch(() => {});
  } else {
    video.muted = true;
  }
  const label = video.muted ? t('soundOn') : t('soundOff');
  soundBtn.textContent = label;
  soundBtn6.textContent = label;
  const hint = document.getElementById('soundHint');
  if (hint) hint.textContent = video.muted ? '' : t('sndOnHint');
  // 켠 뒤 잠시 후 자체진단: 오디오 트랙 존재 / 브라우저 차단 여부를 화면에 표시
  if (!video.muted) {
    setTimeout(() => {
      if (video.muted || !hint) return;
      const tracks = video.audioTracks;
      if (video.muted) {
        hint.textContent = t('sndBlocked');       // 브라우저가 unmute를 조용히 되돌림
      } else if (tracks && typeof tracks.length === 'number' && tracks.length === 0) {
        hint.textContent = t('sndNoTrack');       // 원본 영상 자체가 무음 (Safari 경로)
      } else if (typeof video.webkitAudioDecodedByteCount === 'number' &&
                 video.webkitAudioDecodedByteCount === 0 && !video.paused) {
        hint.textContent = t('sndNoTrack');       // 재생 중인데 오디오 디코딩 0 = 무음 (Chrome 경로)
      } else if (video.paused) {
        hint.textContent = t('sndBlocked');       // 자동재생 정책이 강제 정지한 경우
      }
    }, 900);
  }
}
soundBtn.addEventListener('click', toggleSound);
soundBtn6.addEventListener('click', toggleSound);

document.getElementById('confirmPosBtn').addEventListener('click', () => {
  state.locked = true;
  editorCanvas.classList.add('locked');
  editorRunning = false; // 이후 화면에서 불필요한 이중 합성 방지 (끊김 원인)
  if (state.mediaType === 'video' && video.paused) video.play().catch(() => {});
  goto(5);
});

/* ============================================================
   STEP 5 — 텍스트 입력 (스킵 가능)
   ============================================================ */
/* ============================================================
   이유 3칸 영어 변환 — 어떤 언어로 적었든 무료 번역 API로 영문 버전 생성,
   사용자가 "입력한 그대로 / 영어로" 중 선택 (기본: 그대로).
   연락처(이메일/아이디)는 번역 대상이 아님. 레코드에는 원문·영문 모두 저장.
   ============================================================ */
async function translateToEn(text) {
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=' + encodeURIComponent(text);
    const j = await (await fetch(url)).json();
    return j[0].map(seg => seg[0]).join('').trim();
  } catch (e) {
    // 폴백: MyMemory (무료, 키 불필요)
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=autodetect|en';
    const j = await (await fetch(url)).json();
    if (!j.responseData || !j.responseData.translatedText) throw new Error('translate failed');
    return j.responseData.translatedText.trim();
  }
}
const translateBtn = document.getElementById('translateBtn');
translateBtn.addEventListener('click', async () => {
  // 이미지에 새겨질 한 단어를 번역
  const final = document.getElementById('momentWord').value.trim();
  if (!final) return;
  const tStatus = document.getElementById('translateStatus');
  translateBtn.disabled = true;
  tStatus.textContent = t('stTranslating');
  try {
    state._finalEn = await translateToEn(final);
    document.getElementById('translatedLines').textContent = state._finalEn;
    document.getElementById('translateResult').style.display = '';
    tStatus.textContent = '';
  } catch (e) {
    tStatus.textContent = t('errTranslate');
  } finally {
    translateBtn.disabled = false;
  }
});

/* ============================================================
   5b. 되물음 — 첫 답을 한 번 더 깊게. Claude 키 있으면 맞춤 질문,
   없으면 핵심 명사를 되짚는 로컬 템플릿 ("어떤 환호였나요?")
   ============================================================ */
// 입력 단어를 질문에 끼워넣지 않는다 — 고유명사("Proms")에서 어색해지는
// 원인이었음. 대신 입력의 성격(감정/사람/일반)을 감지해 그에 맞는 질문
// 은행에서 뽑는다. 목표는 표면적 답 뒤의 솔직한 이유를 끌어내는 것.
const DEEPEN_BANK = {
  emotion: {
    ko: ['그 기분이 가장 크게 차오른 순간은 언제였나요?',
         '그 감정을 몸 어디에서 느꼈나요? 그때 주변에는 무엇이 있었나요?',
         '비슷한 기분을 느꼈던 다른 기억이 함께 떠오르나요?'],
    en: ['When did that feeling rise the most?',
         'Where in your body did you feel it — and what was around you?',
         'Does it remind you of another time you felt this way?'],
  },
  people: {
    ko: ['그때 곁에 있던 사람들의 어떤 모습이 기억에 남나요?',
         '그 사람들과 무엇을 주고받았나요 — 말이든, 눈빛이든.'],
    en: ['What do you remember about the people who were there?',
         'What passed between you and them — words, or just a look?'],
  },
  general: {
    ko: ['그 순간을 사진처럼 떠올리면, 무엇이 가장 먼저 보이나요?',
         '무엇이 그렇게 만들었나요? 처음 떠오르는 장면을 적어주세요.',
         '그 순간이 특별했던 진짜 이유는 무엇이었을까요?',
         '그 자리에서 시간이 멈췄다면, 어떤 소리와 냄새가 남아 있을까요?'],
    en: ['If you recall that moment like a photograph, what do you see first?',
         'What made it feel that way? Write the first scene that comes to mind.',
         'What was the real reason that moment mattered?',
         'If time had stopped there, what sounds and smells would remain?'],
  },
};
function localDeepen(ans) {
  const emo = /(좋|행복|설레|평화|즐거|감동|환호|웃|편안|그리|벅차|뭉클|시원|따뜻|joy|happy|peace|excit|love|warm|calm)/i;
  const ppl = /(사람|친구|가족|엄마|아빠|아이|연인|우리|관객|people|friend|family|crowd|together)/i;
  const pool = emo.test(ans) ? DEEPEN_BANK.emotion[lang]
    : ppl.test(ans) ? DEEPEN_BANK.people[lang]
    : DEEPEN_BANK.general[lang];
  return pool[Math.floor(Math.random() * pool.length)];

// 서버에 저장된 내 기록을 이 기기의 로컬 목록에 병합 — 다른 기기에서
// 로그인해도 기록이 보이게 하는 복원 경로 (업로드만 있던 동기화의 반쪽)
async function pullServerRecords() {
  if (!sb) return;
  try {
    const { data, error } = await sb.from('records').select('id, payload').order('created_at', { ascending: true });
    if (error) throw error;
    if (!data || !data.length) return;
    const list = getRecords();
    const bySavedAt = new Map(list.map(r => [r.savedAt, r]));
    const blds = getSavedBuildings();
    const bldById = new Map(blds.map(b => [b.id, b]));
    let added = 0, bAdded = 0;
    for (const row of data) {
      const rec = row.payload;
      if (!rec) continue;
      if (rec._kind === 'building') {
        // 건물 아카이브 — id 기준 병합
        if (!rec.id) continue;
        const localB = bldById.get(rec.id);
        if (localB) {
          if (!localB.serverId) localB.serverId = row.id;
        } else {
          delete rec._kind;
          rec.serverId = row.id;
          blds.push(rec);
          bldById.set(rec.id, rec);
          bAdded++;
        }
        continue;
      }
      if (!rec.savedAt) continue;
      const local = bySavedAt.get(rec.savedAt);
      if (local) {
        // 이미 있는 기록 — 서버 행 id만 보정 (로컬 편집이 최신일 수 있으니 내용은 유지)
        if (!local.serverId) { local.serverId = row.id; local.synced = true; }
      } else {
        rec.serverId = row.id;
        rec.synced = true;
        list.push(rec);
        bySavedAt.set(rec.savedAt, rec);
        added++;
      }
    }
    if (added > 0) {
      list.sort((a, b) => a.savedAt - b.savedAt);
      localStorage.setItem(REC_KEY, JSON.stringify(list));
    }
    if (bAdded > 0) {
      blds.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
      localStorage.setItem(LS_KEY, JSON.stringify(blds.slice(0, 10)));
    }
    if (added > 0 || bAdded > 0) renderSavedList();
  } catch (e) { console.warn('pull records failed:', e.message); }
}

async function syncBuildingToServer(item) {
  if (!sb) return false;
  try {
    const { data, error } = await sb.from('records')
      .insert({ payload: { ...item, _kind: 'building' } }).select('id').single();
    if (error) throw error;
    const all = getSavedBuildings();
    const target = all.find(x => x.id === item.id);
    if (target) { target.serverId = data.id; localStorage.setItem(LS_KEY, JSON.stringify(all)); }
    return true;
  } catch (e) { console.warn('building sync failed:', e.message); return false; }
}
async function resyncBuilding(item) {

}
async function deleteBuildingFromServer(item) {

async function syncRecordToServer(rec) {
  if (!sb) return false;
  try {
    const { data, error } = await sb.from('records').insert({ payload: rec }).select('id').single();
    if (error) return false;
    if (data && data.id) {
      const l = getRecords();
      const r2 = l.find(x => x.savedAt === rec.savedAt);
      if (r2) { r2.serverId = data.id; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    }
    return true;
  } catch (e) { return false; }
}

async function syncPendingRecords() {
  syncPendingBuildings();
  if (!sb) return;
  const list = getRecords();
  let changed = false;
  for (const rec of list) {
    if (rec.synced) continue;
    if (await syncRecordToServer(rec)) { rec.synced = true; changed = true; }
  }
  if (changed) localStorage.setItem(REC_KEY, JSON.stringify(list));
}

async function claudeDeepen(ans) {
  const key = localStorage.getItem('lc_api_key');
  if (!key) return null;
  const prompt = lang === 'ko'
    ? `사용자가 도시의 한 순간이 좋았던 이유를 "${ans}"라고 적었다. 표면적인 답 뒤에 있는 솔직한 이유(구체적 장면, 감정, 개인적 의미)를 스스로 발견하게 돕는 되물음 한 문장을 한국어로 만들어라. 규칙: 입력에 나온 단어를 기계적으로 반복하지 말 것. "왜"라고 묻지 말고 장면·감각·사람·순간을 구체적으로 물을 것. 심문투가 아니라 친구의 호기심처럼. 질문 문장만 출력.`
    : `Someone wrote "${ans}" as why a city moment felt good. Write one follow-up question in English that helps them discover the honest reason behind the surface answer (a concrete scene, feeling, or personal meaning). Rules: don't mechanically repeat their words; don't ask "why" — ask about scenes, senses, people, moments; sound like a curious friend, not an interviewer. Output only the question.`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key, 'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001', max_tokens: 150,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error('Claude ' + res.status);
  const j = await res.json();
  const q = (j.content || []).map(b => b.text || '').join('').trim();
  return q || null;
}

/* ============================================================
   객체 인식 (COCO-SSD) — 신규 기능
   영상: 25% / 50% / 75% 지점 프레임 샘플링, 이미지: 그대로 1회
   ============================================================ */
let detectPromise = null;
// 대표 프레임 수집 (사진 1장 / 영상 25·50·75% 지점 3장)
async function collectSampleFrames() {
  const samples = [];
  if (state.mediaType === 'image') {
    samples.push(state.mediaEl);
  } else {
    const v2 = document.createElement('video');
    v2.muted = true; v2.playsInline = true; v2.src = video.src;
    await waitVideoReady(v2);
    for (const t of [0.25, 0.5, 0.75]) {
      v2.currentTime = v2.duration * t;
      await new Promise(ok => { v2.onseeked = ok; });
      const c = document.createElement('canvas');
      c.width = v2.videoWidth; c.height = v2.videoHeight;
      c.getContext('2d').drawImage(v2, 0, 0);
      samples.push(c);
    }
  }
  return samples;
}
// Claude 비전으로 사물 인식 (키 있을 때) — COCO보다 정확, 도시 풍경 인식 가능
async function claudeAutoTags(samples) {
  const key = localStorage.getItem('lc_api_key');
  if (!key) return null;
  const images = samples.slice(0, 2).map(src => {
    const w = src.videoWidth || src.naturalWidth || src.width;
    const h = src.videoHeight || src.naturalHeight || src.height;
    const k = Math.min(1, 768 / Math.max(w, h));
    const c = document.createElement('canvas');
    c.width = Math.round(w * k); c.height = Math.round(h * k);
    c.getContext('2d').drawImage(src, 0, 0, c.width, c.height);
    return c.toDataURL('image/jpeg', 0.8).split(',')[1];
  });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001', max_tokens: 200,
      messages: [{ role: 'user', content: [
        ...images.map(b64 => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } })),
        { type: 'text', text: 'List up to 6 clearly visible objects/elements in the scene as short lowercase English nouns. Output only a JSON array of strings. Only include things you are confident about.' },
      ] }],
    }),
  });
  if (!res.ok) throw new Error('Claude ' + res.status);
  const j = await res.json();
  const text = (j.content || []).map(b => b.text || '').join('');
  const m = text.match(/\[[\s\S]*\]/);
  const arr = JSON.parse(m ? m[0] : text);
  return Array.isArray(arr) ? arr.slice(0, 6).map(String) : null;
}
function detectObjects() {
  detectPromise = (async () => {
    const samples = await collectSampleFrames();
    // 1순위: Claude 비전 (키 있을 때)
    try {
      const tags = await claudeAutoTags(samples);
      if (tags && tags.length) {
        state.objects = tags;
        state.objectScores = null;
        state.autoTagSource = 'claude';
        return state.objects;
      }
    } catch (e) { /* COCO 폴백 */ }
    // 2순위: COCO-SSD — 고신뢰(0.5+)만, 채움말 없음. 없으면 빈 배열(가짜 데이터 금지)
    const model = await cocoSsd.load();
    const seen = new Map(); // class → max score
    for (const smp of samples) {
      const found = await model.detect(smp, 10, 0.5);
      for (const f of found) {
        if (!seen.has(f.class) || seen.get(f.class) < f.score) seen.set(f.class, f.score);
      }
    }
    const sorted = [...seen.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
    state.objects = sorted.map(e => e[0]);
    state.objectScores = sorted.map(e => Math.round(e[1] * 100) / 100);
    state.autoTagSource = 'coco';
    return state.objects;
  })().catch(e => {
    console.error('detection failed', e);
    state.objects = []; // 실패 시 빈 배열 — 가짜 태그를 만들지 않는다
    state.autoTagSource = 'failed';
    return state.objects;
  });
  return detectPromise;
}

function fmtDate(d) {
  // UTC 기준 표시 (사용자 확정) — 도시가 달라도 단일 기준으로 비교 가능
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getUTCMonth() + 1)}/${p(d.getUTCDate())}/${d.getUTCFullYear()} ${p(d.getUTCHours())}:${p(d.getUTCMinutes())} GMT`;
}

function bottomLines() {

function radiusLinesFor(a, countryCode) {
  const num = v => (v === null || v === undefined) ? '—' : v;
  const t = a && a.transitDistM != null ? `Nearest transit ${a.transitDistM}m` : 'Nearest transit —';
  const f = a ? `Restaurants ${num(a.restaurants)}, cafes ${num(a.cafes)}` : 'Restaurants —';
  const p = a ? `Parks & green space: ${num(a.parks)}` : 'Parks —';
  // City-wide 재생에너지: Ember API 미연동 상태의 국가별 샘플값 (문서에 명시된 한계)
  const renewMap = { kr: '9.2%', sg: '4.1%', gb: '46%', us: '23%' };
  const r = renewMap[countryCode] || '—';
  return [
    `Immediate (~200m) — ${t}`,
    `Walkable (~1km) — ${f}`,
    `Neighborhood (~3-5km) — ${p}`,
    `City-wide — Renewable energy: ${r}`,
  ];
}

// 어절 단위 줄바꿈 — 단어(어절) 중간에서 절대 끊지 않는다
function wrapLine(ctx, text, maxW) {
  const words = String(text).split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const cand = cur ? cur + ' ' + w : w;
    if (cur && ctx.measureText(cand).width > maxW) { lines.push(cur); cur = w; }
    else cur = cand;
  }
  if (cur) lines.push(cur);
  return lines;
}

// 상단(위로 확장) / 하단(아래로 확장) 텍스트.
// 좌우 마진은 이미지 영역과 동일한 60px/60px — 최대 텍스트 폭 960px.
function drawTexts(ctx, topLines, botLines, color = '#fff') {
  ctx.font = FONT;
  ctx.fillStyle = color;
  ctx.textBaseline = 'alphabetic';
  const MAX_W = AREA - 20; // 940 — 좌우 각 70px 여백 (사용자 확정: 기존보다 10px씩 추가)
  const top = topLines.flatMap(l => wrapLine(ctx, l, MAX_W));
  const bot = botLines.flatMap(l => wrapLine(ctx, l, MAX_W));
  // 상단: 마지막 줄 기준선이 이미지 상단 경계 바로 위, 위로 쌓임
  let y = AREA_Y - 16;
  for (let i = top.length - 1; i >= 0; i--) {
    ctx.fillText(top[i], TEXT_X, y);
    y -= LINE_H;
  }
  // 하단: 첫 줄 기준선이 이미지 하단 경계 아래, 아래로 쌓임
  y = AREA_Y + AREA + LINE_H;
  for (const line of bot) {
    ctx.fillText(line, TEXT_X, y);
    y += LINE_H;
  }
}

// 산출물 4: 직전 drawComposite가 frameBuf에 남긴 클리핑 결과의 중앙 960×960을

// seek 전용 비디오를 재사용해 임의 시점의 프레임을 추출
let seekVideo = null;
// iOS Safari는 재생 전에 loadeddata를 주지 않으므로 metadata 기준 + load() 킥
function waitVideoReady(v, timeoutMs = 15000) {
  return new Promise((ok, no) => {
    if (v.readyState >= 1) return ok();
    v.onloadedmetadata = ok;
    v.onloadeddata = ok;
    v.onerror = () => no(new Error('video load failed'));
    setTimeout(() => no(new Error('video load timeout')), timeoutMs);
    try { v.load(); } catch (e) {}
  });
}
async function ensureSeekVideo() {
  if (!seekVideo || seekVideo.dataset.src !== video.src) {
    seekVideo = document.createElement('video');
    seekVideo.muted = true;
    seekVideo.dataset.src = video.src;
    seekVideo.playsInline = true;
    seekVideo.src = video.src;
    await waitVideoReady(seekVideo);
  }
  return seekVideo;
}
async function seekTo(v, time) {
  v.currentTime = time;
  await new Promise(ok => { v.onseeked = ok; });
}
async function grabVideoFrameAt(fraction) {
  const v = await ensureSeekVideo();
  await seekTo(v, v.duration * Math.min(0.999, Math.max(0, fraction)));
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  return c;
}

let out1PreviewRunning = false;

async function enterResults() {
  goto(6);
  // 자동 인식(COCO-SSD)은 화면에 노출하지 않는다 — 검수용 레코드에만 저장됨
  document.getElementById('detectStatus').style.display = 'none';

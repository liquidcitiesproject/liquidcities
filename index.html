  sb6.textContent = video.muted ? t('soundOn') : t('soundOff');

  // 반경 데이터만 대기 (최대 15초). 자동 인식은 백그라운드로 계속 진행.
  await Promise.race([
    state.amenitiesPromise || Promise.resolve(null),
    new Promise(r => setTimeout(r, 15000)),
  ]);

  // 상단 텍스트 = 한 단어만 (마침표 없음 — 사용자 확정. 생각/인상은 데이터 전용)
  const topLines1 = (state.userReasons || []).slice(0, 1);
  const bot = bottomLines();
  // 하단 형식(산출물 1·2 공통): 1줄 = "시간 거리"(공백 구분) → 다음 줄부터 사용자 정보
  state.gpsDistM = null;
  if (state.mediaGps && isFinite(state.lat) && isFinite(state.lon)) {
    const d = Math.round(haversine(state.lat, state.lon, state.mediaGps.lat, state.mediaGps.lon));
    state.gpsDistM = d;
    const dTxt = d >= 1000 ? (d / 1000).toFixed(1) + 'km' : d + 'm';
    bot[0] = (bot[0] || '') + ' ' + dTxt; // 거리 숫자만 (라벨 없음 — 사용자 확정)
  }
  // 텍스트 레이어(정적)를 먼저 만들어 릴스·썸네일이 함께 사용 — 흰 배경 + 검은 텍스트
  const textLayer = document.createElement('canvas');
  textLayer.width = CANVAS_W; textLayer.height = CANVAS_H;
  drawTexts(textLayer.getContext('2d'), topLines1, bot, '#000');
  state._out1TextLayer = textLayer;

  // 슬라이더로 프레임을 바꿀 때 재사용할 텍스트 라인 보관
  state._out2Top = [...radiusLines(), ...topLines1];
  state._botLines = bot;

  // 산출물 2 (항상 정지 이미지): 영상이면 기본값 중간 프레임, 슬라이더로 변경 가능
  const stillSource = state.mediaType === 'video'
    ? await grabVideoFrameAt(state.thumbFrac ?? 0.5)   // 4단계에서 고른 장면
    : state.mediaEl;
  const ctx2 = out2Canvas.getContext('2d');
  drawComposite(ctx2, stillSource);
  drawTexts(ctx2, state._out2Top, bot);
  dl2Btn.disabled = false;

  // 도시 정보(반경 데이터)를 결과 페이지에 텍스트로 표시 (구 산출물 2 대체)
  {
    const ci = document.getElementById('cityInfo');
    ci.innerHTML = '';
    radiusLines().forEach(line => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:6px 0; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink)';
      row.textContent = line;
      ci.appendChild(row);
    });
  }

  // 릴스 썸네일: 릴스와 같은 매핑·배치, 텍스트만 없음 (사용자 확정)
  const ctx3 = document.getElementById('out3Canvas').getContext('2d');
  drawComposite(ctx3, stillSource, '#fff', state.edgeLayer);
  document.getElementById('dl3Btn').disabled = false;

  // 산출물 4: 중앙 960×960만 잘라낸 투명 PNG (건물 매핑 + 외곽선만, 배경 없음)
  drawOut4();
  document.getElementById('dl4Btn').disabled = false;

  // 릴스: 사진이면 정지 렌더, 영상이면 라이브 미리보기 루프
  const ctx1 = out1Canvas.getContext('2d');
  if (state.mediaType === 'image') {
    drawComposite(ctx1, state.mediaEl, '#fff', state.edgeLayer);
    ctx1.drawImage(textLayer, 0, 0);
  } else if (!out1PreviewRunning) {
    out1PreviewRunning = true;
    const drawOut1 = () => {
      drawComposite(ctx1, video, '#fff', state.edgeLayer);
      ctx1.drawImage(state._out1TextLayer, 0, 0);
      // 녹화 중이면 이 순간(=원본 영상의 새 프레임)을 정확히 캡처
      if (state._recTrack && state._recTrack.readyState === 'live') state._recTrack.requestFrame();
    };
    state._drawOut1 = drawOut1;
    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
      // 영상 프레임이 표시되는 순간에만 그림 — rAF/캡처 샘플링 불일치로 인한
      // 프레임 중복·누락(끊김의 원인)이 사라지고 원본 프레임 타이밍이 유지된다
      const step = () => {
        if (!out1PreviewRunning) return;
        drawOut1();
        video.requestVideoFrameCallback(step);
      };
      video.requestVideoFrameCallback(step);
    } else {
      // 폴백: rvfc 미지원 브라우저는 기존 30fps rAF
      let last = 0;
      (function loop(ts) {
        if (!out1PreviewRunning) return;
        if (ts - last >= 33) { last = ts; drawOut1(); }
        requestAnimationFrame(loop);
      })(0);
    }
  }
  dl1Btn.disabled = false;
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

// 썸네일 장면 선택 (4단계) — 슬라이더를 움직이면 비디오가 그 장면으로

const frameSlider = document.getElementById('frameSlider');
frameSlider.addEventListener('input', () => {

/* ============================================================
   검수용 레코드 — 객관 태그(자동 인식) × 주관 태그(사용자 이유) × 위치 × 시점.
   서버 연동 전까지 localStorage에 쌓고 JSON으로 내보내 검수한다.
   ============================================================ */
const REC_KEY = 'lc_records';
function getRecords() {
  try { return JSON.parse(localStorage.getItem(REC_KEY)) || []; } catch (e) { return []; }
}

/* ---- 산출물 파일 보관 (IndexedDB — localStorage 용량 한계 회피) ---- */
function idbOpen() {
  return new Promise((ok, no) => {
    const r = indexedDB.open('lc-media', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('outputs');
    r.onsuccess = () => ok(r.result);
    r.onerror = () => no(r.error);
  });
}
async function idbPut(key, blob) {
  const db = await idbOpen();
  return new Promise((ok, no) => {
    const tx = db.transaction('outputs', 'readwrite');
    tx.objectStore('outputs').put(blob, key);
    tx.oncomplete = ok;
    tx.onerror = () => no(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((ok) => {
    const rq = db.transaction('outputs').objectStore('outputs').get(key);
    rq.onsuccess = () => ok(rq.result || null);
    rq.onerror = () => ok(null);
  });
}
async function idbDelRecord(savedAt) {
  const db = await idbOpen();
  const tx = db.transaction('outputs', 'readwrite');
  ['out1', 'out2', 'out3', 'out4'].forEach(k => tx.objectStore('outputs').delete(savedAt + ':' + k));
}
// 다운로드 시점의 산출물을 현재 레코드에 연결해 보관
function saveOutputBlob(kind, blob) {
  if (!state._recordSavedAt || !blob) return;
  idbPut(state._recordSavedAt + ':' + kind, blob).catch(() => {});
  uploadOutputToStorage(state._recordSavedAt, kind, blob); // 기기 간 동기화 (버킷 있으면)
}
// 산출물 blob을 Supabase Storage('outputs' 버킷)에 사용자별 경로로 업로드.
// 버킷이 없거나 권한 문제면 조용히 로컬 전용으로 동작한다.
async function uploadOutputToStorage(savedAt, kind, blob) {
  if (!sb) return;
  try {
    const { data } = await sb.auth.getUser();
    const uid = data && data.user && data.user.id;
    if (!uid) return;
    await sb.storage.from('outputs').upload(`${uid}/${savedAt}-${kind}`, blob,
      { upsert: true, contentType: blob.type || 'application/octet-stream' });
  } catch (e) { /* 버킷 미설정 등 — 로컬 전용 */ }
}
// 산출물 로드: 로컬(IndexedDB) 우선, 없으면 Storage에서 내려받아 로컬에 캐시
async function fetchOutputBlob(savedAt, kind) {
  const local = await idbGet(savedAt + ':' + kind).catch(() => null);
  if (local) return local;
  if (!sb) return null;
  try {
    const { data: u } = await sb.auth.getUser();
    const uid = u && u.user && u.user.id;
    if (!uid) return null;
    const { data, error } = await sb.storage.from('outputs').download(`${uid}/${savedAt}-${kind}`);
    if (error || !data) return null;
    idbPut(savedAt + ':' + kind, data).catch(() => {});
    return data;
  } catch (e) { return null; }
}
function buildRecFields() {
  return {
    address: state.address, lat: state.lat, lon: state.lon,
    countryCode: state.countryCode,
    mediaType: state.mediaType,
    mediaDate: state.mediaDate ? state.mediaDate.toISOString() : null,
    mediaDateSource: state.mediaDateSource || null,
    mediaGps: state.mediaGps || null,
    gpsDistM: state.gpsDistM,
    userReasons: state.userReasons || [],          // 산출물에 실제 쓰인 버전 (하위 호환)
    momentScale: (typeof state.momentScale === 'number') ? state.momentScale : null, // -10~+10
    momentThought: state.momentThought || '',      // 순간에 대한 생각 (데이터 전용)
    momentWord: state.momentWord || '',            // 이미지에 새겨진 한 단어 (원문)
    momentWordEn: state._finalEn || '',            // 영문 변환본 (있다면)
    segments: state.segmentsFinal || [],           // 이미지에 표기된 버전
    segmentsRaw: state.segmentsRaw || [],          // 입력 원문
    segmentsEn: (state._segsEn || []).filter(Boolean), // 영문 변환본 (있다면)
    autoTags: state.objects,            // 아직 분석 중이면 null → 아래에서 갱신
    autoTagScores: state.objectScores || null, // COCO 신뢰도 (claude면 null)
    autoTagSource: state.autoTagSource || null, // 'claude' | 'coco' | 'failed'
    aiSuggestions: state._aiSuggestions || null, // Claude 장면 해석 제안 (사용된 경우)
    suggestSource: state._suggestSource || null,
    amenities: state.amenities,
    userContact: state.userText || '',
    contact: state.contact || null,     // {name, instagram, email, website} 또는 {anonymous:true}
    massThumb: state._massThumb || null, // 매핑된 매스 축소 PNG (보드/지도 노드용)
  };
}
async function resyncRecord(rec) {
  // 갱신된 레코드 서버 재전송: 이전 행 삭제 후 재삽입
  if (!sb) return;
  try {
    if (rec.serverId) { await sb.from('records').delete().eq('id', rec.serverId); rec.serverId = null; }
    const ok = await syncRecordToServer(rec);
    if (ok) {
      const l = getRecords();
      const r2 = l.find(x => x.savedAt === rec.savedAt);
      if (r2) { r2.synced = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    }
  } catch (e) {}
}
function saveRecord() {
  // 같은 세션에서 재다운로드하면(값을 고친 뒤 포함) 기존 레코드를 최신 값으로 갱신
  if (state._recordSaved && state._recordSavedAt) {
    const list = getRecords();
    const r = list.find(x => x.savedAt === state._recordSavedAt);
    if (r) {
      Object.assign(r, buildRecFields(), { savedAt: r.savedAt, serverId: r.serverId });
      r.synced = false;
      localStorage.setItem(REC_KEY, JSON.stringify(list));
      if (state._autoOut4) idbPut(r.savedAt + ':out4', state._autoOut4).catch(() => {});
      resyncRecord(r);
      renderSavedList();
    }
    return;
  }
  state._recordSaved = true;
  state._recordSavedAt = Date.now(); // 산출물(IndexedDB) 연결 키
  const rec = { savedAt: state._recordSavedAt, ...buildRecFields() };
  const list = getRecords();
  list.push(rec);
  localStorage.setItem(REC_KEY, JSON.stringify(list));
  if (state._autoOut4) idbPut(rec.savedAt + ':out4', state._autoOut4).catch(() => {});
  // 서버 동기화 (Supabase 설정 시) — 실패하면 synced=false로 남아 다음 로드 때 재전송
  syncRecordToServer(rec).then(ok => {
    if (!ok) return;
    const l = getRecords();
    const r2 = l.find(x => x.savedAt === rec.savedAt);
    if (r2) { r2.synced = true; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
  });
  // 자유 입력 세그먼트를 집계용 카테고리로 백그라운드 분류 (Claude 키 있을 때만, 실패 무시)
  const segs = rec.segments || [];
  const key = localStorage.getItem('lc_api_key');
  if (segs.length && key) {
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true', 'content-type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001', max_tokens: 100,
        messages: [{ role: 'user', content:
          `Classify each item into one of: light,sound,music,people,nature,smell,air,movement,architecture,color,other. Items: ${JSON.stringify(segs)}. Output only a JSON array of category strings, same order.` }],
      }),
    }).then(r => r.json()).then(j => {
      const text = (j.content || []).map(b => b.text || '').join('');
      const m = text.match(/\[[\s\S]*\]/);
      const cats = JSON.parse(m ? m[0] : text);
      if (Array.isArray(cats)) {
        const l = getRecords();
        const r2 = l.find(x => x.savedAt === rec.savedAt);
        if (r2) { r2.segmentsAuto = cats.slice(0, segs.length); localStorage.setItem(REC_KEY, JSON.stringify(l)); }
      }
    }).catch(() => {});
  }
  // 자동 인식이 늦게 끝나면 해당 레코드에 소급 기록
  if (!state.objects && detectPromise) {
    detectPromise.then(() => {
      const l = getRecords();
      const r = l.find(x => x.savedAt === rec.savedAt);
      if (r) { r.autoTags = state.objects; localStorage.setItem(REC_KEY, JSON.stringify(l)); }
    });
  }
  renderSavedList(); // 내보내기 버튼 표시 갱신
}
// ---- 날씨: 촬영 GPS+날짜로 그날의 날씨 이모지 (open-meteo, 무료·키 없음, 1회 조회 후 레코드에 저장) ----
const WEATHER_EMOJI = code => {
  if (code === 0) return '☀️';
  if (code <= 2) return '🌤️';
  if (code === 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌧️';
  if (code <= 86) return '🌨️';
  return '⛈️';
};
async function fetchWeatherFor(rec) {
  if (rec.weatherCode !== undefined && rec.weatherCode !== null) return rec.weatherCode;
  const g = rec.mediaGps || (isFinite(rec.lat) && isFinite(rec.lon) ? { lat: rec.lat, lon: rec.lon } : null);
  if (!g || !rec.mediaDate) return null;
  try {
    const d = new Date(rec.mediaDate).toISOString().slice(0, 10);
    const r = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${g.lat}&longitude=${g.lon}&start_date=${d}&end_date=${d}&daily=weather_code&timezone=auto`);
    const j = await r.json();
    const code = j.daily && j.daily.weather_code && j.daily.weather_code[0];
    if (code === undefined || code === null) return null;
    // 레코드에 저장해 재조회 방지
    const list = getRecords();
    const target = list.find(x => x.savedAt === rec.savedAt);
    if (target) { target.weatherCode = code; localStorage.setItem(REC_KEY, JSON.stringify(list)); }
    rec.weatherCode = code;
    return code;
  } catch (e) { return null; }
}

/* ============================================================
   맵 — 저장된 레코드의 매스(산출물 4, 투명 PNG)를 지도 위에 마커로 배치.
   위치는 미디어 GPS 우선, 없으면 입력 주소 좌표. 클릭 시 기록 상세로.

let lcMap = null, lcMapLayer = null, lcMapSelKey = null;

// 기록을 "매스(건물)" 단위로 그룹화 — 주소+좌표 반올림을 키로
function massKeyOf(rec) {
  const la = isFinite(rec.lat) ? rec.lat.toFixed(4) : '?';
  const lo = isFinite(rec.lon) ? rec.lon.toFixed(4) : '?';
  return `${(rec.address || '').split(',')[0].trim()}|${la},${lo}`;
}
function groupByMass() {

  for (const rec of boardRecords()) { // 공유 뷰어에서는 공유된 기록 기준
    const k = massKeyOf(rec);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(rec);

  return groups;
}

function updateGauge(recs) {
  const scales = recs.map(r => r.momentScale).filter(v => typeof v === 'number');
  const avg = scales.length ? scales.reduce((a, b) => a + b, 0) / scales.length : 0;
  const dot = document.getElementById('gaugeDot');
  // +10=상단(6%), 0=중앙(50%), -10=하단(94%)
  dot.style.top = (50 - (avg / 10) * 44) + '%';
  dot.textContent = (avg > 0 ? '+' : '') + (Math.round(avg * 10) / 10);
}

function renderFloatWords(recs) {
  const layer = document.getElementById('wordFloat');
  layer.innerHTML = '';
  const words = recs.map(r => r.momentWord).filter(Boolean).slice(0, 24);
  words.forEach((w, i) => {
    const el = document.createElement('span');
    el.className = 'float-word';
    el.textContent = w;
    el.style.left = (8 + (i * 37) % 70) + '%';
    el.style.top = (10 + (i * 23) % 72) + '%';
    el.style.animationDelay = (-(i * 1.7) % 14) + 's';
    el.style.fontSize = (13 + (i % 4) * 3) + 'px';
    layer.appendChild(el);
  });
}

/* ============================================================
   노드 보드 — 참조 이미지 스타일: 흰 캔버스에 미디어 카드 산포 +
   관계선(같은 매스 / 공유 단어·물체 / 비슷한 스케일) + 라벨
   ============================================================ */
let boardMode = 'board'; // 'board' | 'map'

function boardRelations(recs) {
  // 노드당 최대 3연결로 과밀 방지
  const edges = [];
  const degree = new Map();
  const deg = r => degree.get(r.savedAt) || 0;
  for (let i = 0; i < recs.length; i++) {
    for (let j = i + 1; j < recs.length; j++) {
      const a = recs[i], b = recs[j];
      if (deg(a) >= 3 || deg(b) >= 3) continue;
      let label = null;
      const sharedSeg = (a.segments || []).find(x => (b.segments || []).includes(x));
      const hasScales = typeof a.momentScale === 'number' && typeof b.momentScale === 'number';
      const gap = hasScales ? Math.abs(a.momentScale - b.momentScale) : null;
      // 관계 라벨: 스케일 갭을 우선 표기 (사용자 확정 — "같은 매스" 문구 대체)
      if (massKeyOf(a) === massKeyOf(b)) label = gap !== null ? 'gap ' + gap : t('edgeSameMass');
      else if (a.momentWord && a.momentWord === b.momentWord) label = rec => a.momentWordEn || a.momentWord;
      else if (sharedSeg) label = sharedSeg;
      else if (gap !== null && gap <= 2) label = 'gap ' + gap;
      if (typeof label === 'function') label = label();
      if (!label) continue;
      edges.push({ a: a.savedAt, b: b.savedAt, label });
      degree.set(a.savedAt, deg(a) + 1);
      degree.set(b.savedAt, deg(b) + 1);
    }
  }
  return edges;
}

// 보드 = 지도와 완전히 같은 인터랙션(팬·줌·핀치), 타일만 숨긴 흰 지도.
// 지도 = 같은 화면에 타일을 켠 것. 노드·연결선은 두 모드 공통.
function setMapMode(mode) {

  document.getElementById('viewMapBtn').style.opacity = mode === 'map' ? '1' : '0.5';
  renderMapMarkers();
}

document.getElementById('viewMapBtn').addEventListener('click', () => setMapMode('map'));

let lcTileLayer = null;
let lcFitted = false; // 모드 전환마다 뷰를 리셋하지 않도록 1회만 fit
let lcEverFitted = false; // 첫 진입 이후에는 부드러운 flyTo 사용
const escHtml = str => String(str).replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
async function renderMapMarkers() {
  if (!window.L) return;
  if (!lcMap) {
    lcMap = L.map('mapView', { zoomControl: true });
    lcMap.zoomControl.setPosition('bottomright'); // 좌상단 카테고리 칩과 겹치지 않게
    lcTileLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    });
    lcMapLayer = L.layerGroup().addTo(lcMap);
  }
  // 보드 = 타일 없는 흰 지도 / 지도 = 타일 표시 (인터랙션은 동일)
  if (boardMode === 'map') {

  } else if (lcMap.hasLayer(lcTileLayer)) {
    lcMap.removeLayer(lcTileLayer);
  }
  lcMapLayer.clearLayers();
  const all = boardRecords();
  const recs = lcMapSelKey ? all.filter(r => massKeyOf(r) === lcMapSelKey) : all;
  updateGauge(recs);
  if (boardMode === 'map') renderFloatWords(recs);
  else document.getElementById('wordFloat').innerHTML = '';
  const pts = [];
  const posOf = new Map(); // savedAt → LatLng (연결선용)
  const used = [];
  for (const rec of recs) {
    // 위치 = 미디어 GPS 우선, 없으면 매스 주소 좌표
    const g = rec.mediaGps || (isFinite(rec.lat) && isFinite(rec.lon) ? { lat: rec.lat, lon: rec.lon } : null);
    if (!g) continue;
    // 같은 좌표에 여러 기록이 겹치면 살짝 벌린다
    let la = g.lat, lo = g.lon, k = 0;
    while (used.some(u => Math.abs(u[0] - la) < 1e-5 && Math.abs(u[1] - lo) < 1e-5) && k < 10) {
      k++;
      la = g.lat + 0.00012 * k * Math.cos(k * 2.1);
      lo = g.lon + 0.00012 * k * Math.sin(k * 2.1);
    }
    used.push([la, lo]);
    pts.push([la, lo]);
    posOf.set(rec.savedAt, [la, lo]);
    const labelText = rec.momentWordEn || rec.momentWord
      || (rec.mediaDate ? fmtDate(new Date(rec.mediaDate)).split(' ')[0] : '');
    let iconUrl = rec.massThumb || null;
    if (!iconUrl) {
      const b4 = await fetchOutputBlob(rec.savedAt, 'out4');
      if (b4) iconUrl = URL.createObjectURL(b4);
    }
    // 매스 실루엣 노드 (프레임 없음) — 이미지가 없는 옛 기록은 단어 텍스트만
    const html = iconUrl
      ? `<div class="bm-label">${escHtml(labelText)}</div><img src="${iconUrl}" style="width:110px; display:block">`
      : `<div class="bm-label" style="font-size:14px">${escHtml(labelText)}</div>`;
    const marker = L.marker([la, lo], {
      icon: L.divIcon({ html, className: 'lc-node', iconSize: [110, iconUrl ? 120 : 20], iconAnchor: [55, iconUrl ? 60 : 10] }),
    });
    const when = rec.mediaDate ? fmtDate(new Date(rec.mediaDate)) : '';
    marker.bindTooltip(`${when}${rec.momentWord ? ' · ' + rec.momentWord : ''}`);
    marker.on('click', () => openRecordDetail(rec));
    marker.addTo(lcMapLayer);
  }
  // 연결선 + 관계 라벨 (보드의 콘텐츠 그대로 — 두 모드 공통)
  for (const e of boardRelations(recs)) {
    const pa = posOf.get(e.a), pb = posOf.get(e.b);
    if (!pa || !pb) continue;
    L.polyline([pa, pb], { color: '#c9c9cd', weight: 1, interactive: false }).addTo(lcMapLayer);
    L.marker([(pa[0] + pb[0]) / 2, (pa[1] + pb[1]) / 2], {
      icon: L.divIcon({ html: `<span class="lc-edge-label">${escHtml(e.label)}</span>`,
        className: 'lc-node', iconSize: [120, 14], iconAnchor: [60, 7] }),
      interactive: false,
    }).addTo(lcMapLayer);
  }
  const noGps = recs.length - pts.length;
  document.getElementById('mapStatus').textContent = noGps > 0 ? t('mapNoGps', noGps) : '';
  if (!lcFitted) {
    if (pts.length) {
      if (lcEverFitted) {
        // 카테고리 전환 — 뚝 끊기는 점프 대신 부드러운 비행 줌 (사용자 확정)
        lcMap.flyToBounds(pts, { padding: [80, 80], maxZoom: 17, duration: 0.9 });
      } else {
        lcMap.fitBounds(pts, { padding: [80, 80], maxZoom: 17 }); // 첫 진입은 즉시
      }
      lcEverFitted = true;
    } else {
      lcMap.setView([37.5665, 126.978], 11);
    }
    lcFitted = pts.length > 0;
  }
  setTimeout(() => lcMap.invalidateSize(), 60);
}

// 기록 상세: 저장해둔 산출물(IndexedDB)을 미리보기 + 다시 다운로드
// 정보 표 생성 (리스트·상세 공용) — [키, 값] 배열
function buildInfoRows(rec, full) {
  const rows = [];
  const add = (k, v) => { if (v !== null && v !== undefined && v !== '') rows.push([k, v]); };
  if (typeof rec.momentScale === 'number') add('Scale', (rec.momentScale > 0 ? '+' : '') + rec.momentScale);
  add('Captured', rec.mediaDate ? fmtDate(new Date(rec.mediaDate)) : '');
  add('Mass address', rec.address);
  if (typeof rec.gpsDistM === 'number' && rec.gpsDistM !== null) {
    add('Distance', rec.gpsDistM >= 1000 ? (rec.gpsDistM / 1000).toFixed(1) + 'km' : rec.gpsDistM + 'm');
  }
  if (rec.mediaGps) add('Location', rec.w3w ? '///' + rec.w3w : rec.mediaGps.lat.toFixed(4) + ', ' + rec.mediaGps.lon.toFixed(4));
  if (full) {
    add(lang === 'ko' ? '인상적인 물체' : 'Striking things', (rec.segmentsRaw || rec.segments || []).join(', '));
    if (rec.contact && !rec.contact.anonymous) {
      const c = rec.contact;
      add('Contact', [c.name, c.instagram, c.email, c.website].filter(Boolean).join(' · '));
    } else if (rec.contact && rec.contact.anonymous) add('Signed', 'anonymous');
    add(lang === 'ko' ? '자동 인식(검수용)' : 'Auto tags', (rec.autoTags || []).join(', '));
  }
  radiusLinesFor(rec.amenities, rec.countryCode).forEach(line => {
    const [k, ...rest] = line.split(' — ');
    add(k, rest.join(' — '));
  });
  return rows;
}
function renderInfoTable(rows) {
  const table = document.createElement('div');
  rows.forEach(([k, v]) => {
    const line = document.createElement('div');
    line.className = 'info-line';
    const kk = document.createElement('span');
    kk.className = 'info-k';
    kk.textContent = k;
    const vv = document.createElement('span');
    vv.className = 'info-v';
    vv.textContent = v;
    line.append(kk, vv);
    table.appendChild(line);
  });
  return table;
}

    const side = document.createElement('div');

    when.textContent = rec.mediaDate ? fmtDate(new Date(rec.mediaDate)) : '';

    weather.className = 'rec-weather';
    side.append(when, weather);

    { k: 'out2', name: t('outName2'), file: 'liquidcities-still.jpg' },
    { k: 'out3', name: t('outName3'), file: 'liquidcities-reels-thumb.jpg' },
    { k: 'out4', name: t('outName4'), file: 'liquidcities-square.png' },
  ];
  let found = 0;
  for (const { k, name, file } of kinds) {
    const blob = await fetchOutputBlob(rec.savedAt, k);
    if (!blob) continue;
    found++;
    const h = document.createElement('h2');
    h.style.cssText = 'font-size:14px; margin:22px 0 0';
    h.textContent = name;
    box.appendChild(h);
    const url = URL.createObjectURL(blob);
    if (blob.type.startsWith('video/')) {
      const v = document.createElement('video');
      v.src = url; v.controls = true; v.playsInline = true;
      box.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = url;
      box.appendChild(img);
    }
    const row = document.createElement('div');
    row.className = 'row';
    const btn = document.createElement('button');
    btn.textContent = t('btnDownload');
    btn.addEventListener('click', () => downloadBlob(blob, file));
    row.appendChild(btn);
    box.appendChild(row);
  }
  if (!found) {
    const pNo = document.createElement('p');
    pNo.className = 'hint';
    pNo.textContent = t('noOutputs');
    box.appendChild(pNo);
  }
}

/* ============================================================
   산출물 1 다운로드
   - 영상: WebCodecs로 "오프라인 프레임 정확 렌더" (기본) — 실시간 녹화가
     아니므로 기기 성능과 무관하게 정확히 30fps·무손실 타이밍의 MP4가 나온다.
     원본이 10초보다 짧으면 프레임 단위로 반복(늘리지 않음), 정확히 10초에 컷.
     소리는 원본 오디오를 디코드해 같은 방식으로 반복·10초 컷 후 AAC 인코딩.
   - WebCodecs 미지원 브라우저: 기존 MediaRecorder 실시간 녹화 폴백.
   ============================================================ */
// AAC-LC AudioSpecificConfig(2바이트) — esds가 비면 QuickTime이 못 읽는다
function aacASC(rate, ch2) {
  const freqs = [96000, 88200, 64000, 48000, 44100, 32000, 24000, 22050, 16000, 12000, 11025, 8000, 7350];
  const fi = Math.max(0, freqs.indexOf(rate));
  return new Uint8Array([(2 << 3) | (fi >> 1), ((fi & 1) << 7) | (ch2 << 3)]);
}
// 조립된 오디오 버퍼를 Safari 네이티브 MediaRecorder로 AAC(m4a) 녹음
// — AudioEncoder가 없는 실기 Safari용. ac는 클릭 제스처 안에서 만든 컨텍스트.
async function recordBufferAAC(ac, rendered) {
  let mime = null;
  for (const m of ['audio/mp4;codecs=mp4a.40.2', 'audio/mp4']) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
  }
  if (!mime) throw new Error('no AAC recorder');
  const dest = ac.createMediaStreamDestination();
  const src = ac.createBufferSource();
  src.buffer = rendered;
  src.connect(dest);
  const rec = new MediaRecorder(dest.stream, { mimeType: mime, audioBitsPerSecond: 128000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
  const done = new Promise(r => { rec.onstop = r; });
  rec.start(500);
  src.start();
  await new Promise(r => { src.onended = r; });
  await new Promise(r => setTimeout(r, 250)); // 인코더 꼬리 여유
  rec.stop();
  await done;
  return await new Blob(chunks, { type: 'audio/mp4' }).arrayBuffer();
}
// 비디오 엘리먼트 재생을 경유해 [clipStart, +5초] 구간을 AAC로 녹음 —
// decodeAudioData가 컨테이너를 못 읽는 경우(아이폰 .mov 등)의 대체 경로.
// 재생 가능한 파일이면 코덱과 무관하게 소리를 얻는다.
async function recordElementAAC(ac, srcUrl, clipStart, durSec) {
  let mime = null;
  for (const m of ['audio/mp4;codecs=mp4a.40.2', 'audio/mp4']) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
  }
  if (!mime) throw new Error('no AAC recorder');
  const v2 = document.createElement('video');
  v2.src = srcUrl;
  v2.playsInline = true;
  v2.style.cssText = 'position:fixed; width:2px; height:2px; opacity:0.01; pointer-events:none';
  document.body.appendChild(v2); // Safari는 DOM 밖 비디오의 오디오 그래프를 멈출 수 있음
  try {
    await waitVideoReady(v2);
    const cs = Math.min(clipStart || 0, Math.max(0, v2.duration - 0.1));
    const clipLen = Math.min(v2.duration - cs, durSec);
    const src = ac.createMediaElementSource(v2); // 그래프로만 흐름 (스피커 출력 없음)
    const dest = ac.createMediaStreamDestination();
    src.connect(dest);
    const rec = new MediaRecorder(dest.stream, { mimeType: mime, audioBitsPerSecond: 128000 });
    const chunks = [];
    rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
    const done = new Promise(r => { rec.onstop = r; });
    v2.currentTime = cs;
    await new Promise(r => { v2.onseeked = r; });
    // 짧은 영상은 구간을 반복해 durSec를 채운다 (본편 렌더와 같은 규칙)
    v2.addEventListener('timeupdate', () => {
      if (v2.currentTime >= cs + clipLen - 0.05) v2.currentTime = cs;
    });
    rec.start(500);
    await v2.play();
    await new Promise(r => setTimeout(r, durSec * 1000 + 250));
    v2.pause();
    rec.stop();
    await done;
    return await new Blob(chunks, { type: 'audio/mp4' }).arrayBuffer();
  } finally { v2.remove(); }
}
// MediaRecorder가 만든 m4a에서 AAC 샘플을 추출 (mp4box.js)
async function demuxAAC(ab) {
  const mod = await import('https://cdn.jsdelivr.net/npm/mp4box@0.5.3/+esm');
  const MP4Box = mod.default || mod;
  return new Promise((resolve, reject) => {
    const file = MP4Box.createFile();
    const samples = [];
    let tr = null;
    file.onError = e => reject(new Error('mp4box: ' + e));
    file.onReady = info => {
      tr = info.audioTracks && info.audioTracks[0];
      if (!tr) return reject(new Error('no audio track in recording'));
      file.setExtractionOptions(tr.id, null, { nbSamples: 1000000 });
      file.start();
    };
    file.onSamples = (id, user, smp) => { samples.push(...smp); };
    ab.fileStart = 0;
    file.appendBuffer(ab);
    file.flush();
    setTimeout(() => {
      if (!tr || !samples.length) return reject(new Error('demux produced no samples'));
      if (tr.codec && !/^mp4a/.test(tr.codec)) return reject(new Error('audio codec not AAC: ' + tr.codec));
      resolve({ samples,
        sampleRate: tr.audio ? tr.audio.sample_rate : 44100,
        channels: tr.audio ? tr.audio.channel_count : 2,
        timescale: tr.timescale });
    }, 80);
  });
}
// 원본 파일의 AAC 오디오를 그대로 추출해 [clipStart, +5초] 구간을 잘라낸다.
// 디코드·재생·재인코딩이 전혀 없어 브라우저 자동재생/볼륨 정책과 무관 —
// 실기 Safari에서 재생-녹음 방식의 소리가 뭉개지던 문제의 근본 해결.
async function extractSourceAAC(url, clipStart, durSec) {
  const ab = await (await fetch(url)).arrayBuffer();
  const d = await demuxAAC(ab);
  const ts = d.samples[0].timescale || d.timescale;
  const last = d.samples[d.samples.length - 1];
  const srcDur = (last.cts + last.duration) / ts;
  const cs = Math.min(clipStart || 0, Math.max(0, srcDur - 0.1));
  const L = Math.max(0.2, Math.min(srcDur - cs, durSec));
  const seg = d.samples.filter(smp => smp.cts / ts >= cs - 1e-6 && smp.cts / ts < cs + L - 1e-6);
  if (!seg.length) throw new Error('no audio samples in clip range');
  const out = [];
  for (let t0 = 0; t0 < durSec - 1e-6; t0 += L) { // 짧은 영상은 구간 반복
    for (const smp of seg) {
      const t = t0 + (smp.cts / ts - cs);
      if (t >= durSec) break;
      out.push({ data: smp.data, is_sync: smp.is_sync, timescale: ts,
                 cts: Math.round(t * ts), duration: smp.duration });
    }
  }
  return { samples: out, sampleRate: d.sampleRate, channels: d.channels };
}
async function exportVideoOffline(status) {
  // Safari: AudioContext는 어떤 await보다 먼저(클릭 제스처 안) 만들어야 산다
  const gestureAC = new (window.AudioContext || window.webkitAudioContext)();
  gestureAC.resume().catch(() => {});
  const { Muxer, ArrayBufferTarget } = await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5.1.5/+esm');
  const FPS = 30, TOTAL = TARGET_DURATION * FPS;
  const W = CANVAS_W, H = CANVAS_H;

  // ---- 오디오 경로 결정 ----
  // ⓪ 원본 AAC 무손실 복사 (아이폰 mov 포함 대부분 — 가장 견고·최고 품질)
  // ① AudioEncoder 재인코딩 (Chrome 등, 원본이 AAC가 아닐 때)
  // ② 재생-녹음 폴백 (그 외)
  let audioCfg = null, audioMode = null, audioBuf = null, sourceAAC = null;
  try {
    sourceAAC = await extractSourceAAC(video.src, state.clipStart || 0, TARGET_DURATION);
    audioMode = 'copy';
  } catch (e) { console.warn('source AAC copy unavailable:', e.message); }
  if (!audioMode) {
    try {
      const ab = await (await fetch(video.src)).arrayBuffer();
      audioBuf = await gestureAC.decodeAudioData(ab);
    } catch (e) { audioBuf = null; }
    if (audioBuf && 'AudioEncoder' in window) {
      const aac = { codec: 'mp4a.40.2', sampleRate: audioBuf.sampleRate, numberOfChannels: audioBuf.numberOfChannels, bitrate: 128000 };
      if ((await AudioEncoder.isConfigSupported(aac)).supported) { audioCfg = aac; audioMode = 'webcodecs'; }
    }
    if (audioBuf && !audioMode) audioMode = 'mediarec';
    if (!audioBuf && !audioMode) audioMode = 'element';
  }

  // ---- 조립: 구간 [clipStart, +5s]를 반복·컷한 단일 버퍼 (두 오디오 경로 공용) ----
  let renderedAudio = null;
  if (audioBuf) {
    const oc = new OfflineAudioContext(audioBuf.numberOfChannels,
      Math.ceil(TARGET_DURATION * audioBuf.sampleRate), audioBuf.sampleRate);
    const acs = Math.min(state.clipStart || 0, Math.max(0, audioBuf.duration - 0.1));
    const aLen = Math.min(audioBuf.duration - acs, TARGET_DURATION);
    for (let t0 = 0; t0 < TARGET_DURATION; t0 += aLen) {
      const src = oc.createBufferSource();
      src.buffer = audioBuf; src.connect(oc.destination);
      src.start(t0, acs, Math.min(aLen, TARGET_DURATION - t0));
    }
    renderedAudio = await oc.startRendering();
  }

  // ---- mediarec 모드: muxer 생성 전에 녹음·추출까지 끝내 sampleRate 확정 ----
  let mrAAC = null;
  if (audioMode === 'copy') {
    mrAAC = sourceAAC;
    audioMode = 'mediarec'; // 이후 주입 로직 공용
  } else if (audioMode === 'mediarec') {
    status.textContent = t('dlAudioPrep');
    mrAAC = await demuxAAC(await recordBufferAAC(gestureAC, renderedAudio));
  } else if (audioMode === 'element') {
    status.textContent = t('dlAudioPrep');
    try {
      mrAAC = await demuxAAC(await recordElementAAC(gestureAC, video.src, state.clipStart || 0, TARGET_DURATION));
      audioMode = 'mediarec'; // 이후 주입 로직은 동일
    } catch (e) {
      console.warn('element audio capture failed:', e.message);
      audioMode = null; // 진짜 무음 영상일 수 있음 — 비디오만 저장
    }
  }
  const audioMuxCodec = audioMode ? 'aac' : null;
  const muxSampleRate = audioMode === 'mediarec' ? mrAAC.sampleRate : (audioCfg ? audioCfg.sampleRate : 44100);
  const muxChannels = audioMode === 'mediarec' ? mrAAC.channels : (audioCfg ? audioCfg.numberOfChannels : 2);

  // ---- 비디오 인코더: H.264 우선(호환성), 안 되면 VP9-in-MP4 ----
  let vCodecCfg = null, videoMuxCodec = null;
  for (const [codec, mux] of [['avc1.640028', 'avc'], ['avc1.4d0028', 'avc'], ['avc1.42e028', 'avc'], ['vp09.00.40.08', 'vp9']]) {
    const cfg = { codec, width: W, height: H, bitrate: 10_000_000, framerate: FPS };
    if ((await VideoEncoder.isConfigSupported(cfg)).supported) { vCodecCfg = cfg; videoMuxCodec = mux; break; }
  }
  if (!vCodecCfg) throw new Error(t('errNoRecorder'));

  const muxer = new Muxer({
    target: new ArrayBufferTarget(),
    video: { codec: videoMuxCodec, width: W, height: H },
    ...(audioMuxCodec ? { audio: { codec: audioMuxCodec, sampleRate: muxSampleRate, numberOfChannels: muxChannels } } : {}),
    fastStart: 'in-memory',
  });

  let encError = null;
  const venc = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: e => { encError = e; },
  });
  venc.configure(vCodecCfg);

  // ---- 프레임 렌더: 출력 프레임 i의 소스 시각 = (i/30) mod 원본길이 → 반복 후 10초 컷 ----
  const v = await ensureSeekVideo();
  const srcDur = v.duration;
  const cs = Math.min(state.clipStart || 0, Math.max(0, srcDur - 0.1));
  const clipLen = Math.min(srcDur - cs, TARGET_DURATION); // 짧으면 반복, 길면 10초 컷
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  for (let i = 0; i < TOTAL; i++) {
    if (encError) throw encError;
    const srcT = cs + ((i / FPS) % clipLen);
    await seekTo(v, Math.min(srcT, srcDur - 0.001));
    drawComposite(octx, v, '#fff', state.edgeLayer);
    if (state._out1TextLayer) octx.drawImage(state._out1TextLayer, 0, 0);
    const frame = new VideoFrame(off, { timestamp: Math.round(i * 1e6 / FPS), duration: Math.round(1e6 / FPS) });
    venc.encode(frame, { keyFrame: i % 60 === 0 });
    frame.close();
    if (venc.encodeQueueSize > 4) await new Promise(r => setTimeout(r, 5));
    if (i % 15 === 0) status.textContent = t('dlRendering', Math.round(i / TOTAL * 100));
  }
  await venc.flush();

  // ---- 오디오 트랙 주입 ----
  if (audioMode === 'webcodecs') {
    // 조립 버퍼를 AudioEncoder(AAC)로 통째 인코딩
    const rendered = renderedAudio;
    const ch = rendered.numberOfChannels, frames = rendered.length;
    const data = new Float32Array(frames * ch);
    for (let c = 0; c < ch; c++) data.set(rendered.getChannelData(c), c * frames);
    const aenc = new AudioEncoder({
      output: (chunk, meta) => {
        // WebKit AudioEncoder는 decoderConfig.description을 주지 않아
        // esds가 비어 QuickTime이 못 읽는다 → ASC를 직접 채움
        if (!meta || !meta.decoderConfig || !meta.decoderConfig.description) {
          meta = { decoderConfig: {
            codec: audioCfg.codec, sampleRate: audioCfg.sampleRate,
            numberOfChannels: audioCfg.numberOfChannels,
            description: aacASC(audioCfg.sampleRate, audioCfg.numberOfChannels),
          } };
        }
        muxer.addAudioChunk(chunk, meta);
      },
      error: e => { encError = e; },
    });
    aenc.configure(audioCfg);
    const ad = new AudioData({ format: 'f32-planar', sampleRate: rendered.sampleRate,
      numberOfFrames: frames, numberOfChannels: ch, timestamp: 0, data });
    aenc.encode(ad);
    ad.close();
    await aenc.flush();
    if (encError) throw encError;
  } else if (audioMode === 'mediarec') {
    // 네이티브 녹음에서 추출한 AAC 샘플을 그대로 주입 (재인코딩 없음)
    // 녹음 시작 지연으로 첫 샘플 cts가 0이 아닐 수 있어 0 기준으로 정규화
    let first = true;
    const cts0 = mrAAC.samples.length ? mrAAC.samples[0].cts : 0;
    for (const smp of mrAAC.samples) {
      const tsUs = Math.round((smp.cts - cts0) * 1e6 / smp.timescale);
      if (tsUs > TARGET_DURATION * 1e6) break; // 5초에서 컷
      muxer.addAudioChunkRaw(
        new Uint8Array(smp.data),
        smp.is_sync ? 'key' : 'delta',
        tsUs,
        Math.round(smp.duration * 1e6 / smp.timescale),
        first ? { decoderConfig: {
          codec: 'mp4a.40.2', sampleRate: mrAAC.sampleRate,
          numberOfChannels: mrAAC.channels,
          description: aacASC(mrAAC.sampleRate, mrAAC.channels),
        } } : undefined);
      first = false;
    }
  }
  try { gestureAC.close(); } catch (e) {}

  muxer.finalize();
  const outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
  downloadBlob(outBlob, 'liquidcities-reels.mp4');
  saveOutputBlob('out1', outBlob);
  status.textContent = t('dlDone');
}

// WebCodecs 미지원 브라우저용 실시간 녹화 폴백 (기존 검증된 경로)
async function recordRealtime(status) {
  status.textContent = t('dlRecording', TARGET_DURATION);
  // (1) 오디오 컨텍스트는 어떤 await보다 먼저(=클릭 제스처 안에서) 생성·활성화 —
  //     Safari는 await 뒤의 resume()을 제스처로 인정하지 않아 무음이 됐다
  const recAudioCtxEarly = new (window.AudioContext || window.webkitAudioContext)();
  recAudioCtxEarly.onstatechange = () => {
    if (recAudioCtxEarly.state === 'suspended') recAudioCtxEarly.resume().catch(() => {});
  };
  recAudioCtxEarly.resume().catch(() => {});
  // (2) 수동 프레임 공급은 실제 지원 여부로 판정 — Safari는 requestFrame이 없어
  //     captureStream(0)을 쓰면 프레임이 기록되지 않는다(끊김·색 깨짐의 원인)
  // Safari/WebKit은 requestFrame API가 존재해도 실제로는 프레임을 밀어넣지
  // 못한다(10초에 3프레임 실측) — 벤더 판별로 자동 샘플링(30fps) 강제
  const IS_WEBKIT = /apple/i.test(navigator.vendor || '');
  const useManualFrames = !IS_WEBKIT
    && 'requestVideoFrameCallback' in HTMLVideoElement.prototype
    && typeof CanvasCaptureMediaStreamTrack !== 'undefined'
    && 'requestFrame' in CanvasCaptureMediaStreamTrack.prototype;
  const stream = out1Canvas.captureStream(useManualFrames ? 0 : 30);
  if (useManualFrames) state._recTrack = stream.getVideoTracks()[0];
  // 오디오: 재생을 실시간으로 캡처하는 방식은 반복 경계·Safari 절전 등으로
  // 계속 끊겼다. 대신 **원본 오디오를 디코드해 [구간시작, +10초]를 샘플
  // 단위로 반복·컷해 미리 조립한 버퍼**를 녹음기에 공급한다 — 재생 과정이
  // 없으므로 끊길 지점이 원천적으로 없다.
  const cs0 = state.clipStart || 0;
  let recAudioNode = null, recAudioCtx = null;
  try {
    if (!state._mix10 || state._mix10.src !== video.src || state._mix10.cs !== cs0) {
      const ab = await (await fetch(video.src)).arrayBuffer();
      const dctx = new (window.AudioContext || window.webkitAudioContext)();
      const full = await dctx.decodeAudioData(ab);
      dctx.close().catch(() => {});
      const clipLen = Math.max(0.1, Math.min(full.duration - cs0, TARGET_DURATION));
      const oc = new OfflineAudioContext(full.numberOfChannels,
        Math.ceil(TARGET_DURATION * full.sampleRate), full.sampleRate);
      for (let t0 = 0; t0 < TARGET_DURATION; t0 += clipLen) {
        const bs = oc.createBufferSource();
        bs.buffer = full;
        bs.connect(oc.destination);
        bs.start(t0, cs0, Math.min(clipLen, TARGET_DURATION - t0));
      }
      state._mix10 = { buf: await oc.startRendering(), src: video.src, cs: cs0 };
    }
    recAudioCtx = recAudioCtxEarly; // 클릭 제스처 안에서 이미 생성·활성화됨
    const dest = recAudioCtx.createMediaStreamDestination();
    recAudioNode = recAudioCtx.createBufferSource();
    recAudioNode.buffer = state._mix10.buf;
    recAudioNode.connect(dest);
    dest.stream.getAudioTracks().forEach(tr => stream.addTrack(tr));
  } catch (e) {
    // 원본에 오디오가 없거나 디코드 실패 → 무음으로 진행
    recAudioNode = null;
  }
  const candidates = [
    'video/mp4;codecs=avc1,mp4a', 'video/mp4',
    'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm',
  ];
  const mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t));
  if (!mimeType) throw new Error(t('errNoRecorder'));
  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

  // Safari: muted 상태의 비디오는 오디오 그래프에도 무음이 갈 수 있으므로
  // 녹화 전에 완전히 해제 (사용자 제스처 컨텍스트 안이라 허용됨)
  video.removeAttribute('muted');
  video.muted = false;
  video.defaultMuted = false;
  video.volume = 1;
  soundBtn.textContent = t('soundOff');
  soundBtn6.textContent = t('soundOff');
  video.currentTime = state.clipStart || 0; // 선택 구간부터 10초 (timeupdate 가드가 구간 반복 처리)
  await video.play().catch(() => {});

  const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 10_000_000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  const done = new Promise((ok, no) => {
    rec.onstop = ok;
    rec.onerror = e => no(e.error || new Error('recorder error'));
  });
  rec.start(1000);  // 타임슬라이스 필수 (검증된 함정)
  if (recAudioNode) recAudioNode.start(); // 조립된 10초 오디오를 녹화와 동시에 시작
  // 녹화 중에는 전용 루프로 프레임 공급을 보장 (rvfc가 백그라운드 스로틀돼도 안전)
  let recDrawing = true;
  let lastDraw = 0;
  (function recLoop(ts) {
    if (!recDrawing) return;
    if (ts - lastDraw >= 33) {
      lastDraw = ts;
      if (state._drawOut1) state._drawOut1();
    }
    requestAnimationFrame(recLoop);
  })(0);
  await new Promise(r => setTimeout(r, TARGET_DURATION * 1000)); // 정확히 10초에 컷
  recDrawing = false;
  if (rec.state !== 'inactive') rec.stop();
  await done;
  state._recTrack = null;
  if (recAudioCtx) recAudioCtx.close().catch(() => {}); // 녹화용 오디오 정리

  if (!chunks.length) throw new Error(t('errEmptyRec'));
  const outBlob = new Blob(chunks, { type: mimeType });
  downloadBlob(outBlob, `liquidcities-reels.${ext}`);
  saveOutputBlob('out1', outBlob);
  status.textContent = ext === 'webm' ? t('dlDoneWebm') : t('dlDoneRT');
}

// 릴스: 사진→JPG / 영상→5초 MP4 (오프라인 렌더 기본, 실시간 녹화 폴백)
dl1Btn.addEventListener('click', async () => {
  const status = document.getElementById('dl1Status');
  saveRecord();
  if (state.mediaType === 'image') {
    out1Canvas.toBlob(b => { downloadBlob(b, 'liquidcities-reels.jpg'); saveOutputBlob('out1', b); }, 'image/jpeg', 0.95);
    return;
  }
  dl1Btn.disabled = true;
  try {
    // 오프라인 렌더 우선(모든 브라우저) — WebKit도 H.264+AAC WebCodecs를
    // 지원함을 실측 확인(2026-07-10). 실시간 녹화는 Safari에서 2~3fps로
    // 끊기고 색범위도 좁게 인코딩되므로 최후 폴백으로만 사용.
    if ('VideoEncoder' in window) {
      try {
        await exportVideoOffline(status);
      } catch (e) {
        console.warn('offline export failed, falling back to realtime:', e.message);
        await recordRealtime(status);
      }
    } else {
      await recordRealtime(status);
    }
  } catch (e) {
    status.textContent = t('dlFail', e.message);
  } finally {
    state._recTrack = null;
    dl1Btn.disabled = false;
  }
});

// 초기 언어 적용 + 저장 목록 렌더 (모든 선언이 끝난 시점)
applyLang();
{
  const shared = new URLSearchParams(location.search).get('board');
  if (shared) initBoardViewer(shared).then(ok => { if (!ok) initSupabase(); });
  else initSupabase(); // Supabase 설정이 있으면 세션 복원/로그인 게이트
}

// 테스트/디버깅 훅
window.__lc = { state, goto, proceedWithLocation, enterResults, startMassViewer, drawOut4, saveRecord, idbGet };
</script>

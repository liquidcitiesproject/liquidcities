// 감정 좌표 사분면 뷰 렌더 — 좌표(emoX,emoY)를 가진 기록을 평면 위에 노드로 배치.
function renderQuad(recs) {
  const box = document.getElementById('quadNodes');
  const empty = document.getElementById('quadEmpty');
  if (!box) return;
  box.innerHTML = '';
  const withCoord = recs.filter(hasCoord);
  if (empty) empty.style.display = withCoord.length ? 'none' : 'flex';
  const placed = []; // 겹침 살짝 분산용 [x%,y%]
  for (const rec of withCoord) {
    let xp = (rec.emoX + 1) / 2 * 100;
    let yp = (1 - rec.emoY) / 2 * 100;
    // 같은 자리 겹치면 나선으로 조금 벌림
    let k = 0;
    while (placed.some(p => Math.abs(p[0] - xp) < 4 && Math.abs(p[1] - yp) < 4) && k < 12) {
      k++; xp += 3 * Math.cos(k * 2.4); yp += 3 * Math.sin(k * 2.4);
    }
    xp = Math.max(5, Math.min(95, xp)); yp = Math.max(6, Math.min(92, yp));
    placed.push([xp, yp]);
    const node = document.createElement('div');
    node.className = 'quad-node';
    node.style.left = xp + '%'; node.style.top = yp + '%';
    const img = document.createElement('img');
    if (rec.massThumb) {
      img.src = rec.massThumb;
      fetchOutputBlob(rec.savedAt, 'out4').then(b => { if (b) img.src = URL.createObjectURL(b); }).catch(() => {});
    } else {
      fetchOutputBlob(rec.savedAt, 'out4').then(b => { if (b) img.src = URL.createObjectURL(b); }).catch(() => {});
    }
    node.appendChild(img);
    const word = rec.momentWordEn || rec.momentWord;
    if (word) { const cap = document.createElement('div'); cap.className = 'quad-cap'; cap.textContent = word; node.appendChild(cap); }
    node.title = (rec.emoTags || []).map(id => t('emo_' + id)).join(' · ');
    node.addEventListener('click', () => openRecordDetail(rec));
    box.appendChild(node);
  }
}

let lcTileLayer = null;
let lcFitted = false; // 모드 전환마다 뷰를 리셋하지 않도록 1회만 fit
let lcEverFitted = false; // 첫 진입 이후에는 부드러운 flyTo 사용
const escHtml = str => String(str).replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

/* ============================================================
   3D 지구본 뷰 (Three.js) — 무채색 위경선 그리드 구 위에
   노드(매스 실루엣 스프라이트)를 GPS 좌표대로 배치. 드래그로 회전.
   노드/엣지 데이터는 renderMapMarkers()가 만든 것을 그대로 공유.
   ============================================================ */
let globeReady = false;
const GLOBE_R = 1;            // 구 반지름
let gScene, gCamera, gRenderer, gControls, gRaf = null;
let gNodeGroup, gEdgeGroup;  // 매 렌더마다 교체
let gNodePickables = [];     // Raycaster 대상 [{ obj, rec }]
const gRaycaster = new THREE.Raycaster();
const gPointer = new THREE.Vector2();
const gTexLoader = new THREE.TextureLoader();

// 위도·경도(도) → 구 표면 3D 좌표. lat: -90..90, lon: -180..180
function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;   // 극각
  const theta = (lon + 180) * Math.PI / 180; // 방위각
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta),
  );
}

function globeEl() { return document.getElementById('globeView'); }

function ensureGlobe() {
  if (globeReady) return;
  const host = globeEl();
  if (!host || !THREE) return;
  const w = host.clientWidth || 640, h = host.clientHeight || 560;

  gScene = new THREE.Scene();
  gScene.background = new THREE.Color(0xffffff);

  gCamera = new THREE.PerspectiveCamera(45, w / h, 0.01, 100);
  gCamera.position.set(0, 0.6, 3.2);

  gRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  gRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  gRenderer.setSize(w, h);
  host.appendChild(gRenderer.domElement);

  gControls = new OrbitControls(gCamera, gRenderer.domElement);
  gControls.enablePan = false;         // 회전·줌만
  gControls.enableDamping = true;
  gControls.dampingFactor = 0.08;
  gControls.rotateSpeed = 0.6;
  gControls.minDistance = 1.35;
  gControls.maxDistance = 6;

  // 구: 아주 옅은 면 + 위경선 그리드(무채색)
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(GLOBE_R, 48, 48),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
  );
  gScene.add(sphere);
  const grid = new THREE.LineSegments(
    new THREE.WireframeGeometry(new THREE.SphereGeometry(GLOBE_R * 1.001, 24, 18)),
    new THREE.LineBasicMaterial({ color: 0xdadadd }),
  );
  gScene.add(grid);

  gNodeGroup = new THREE.Group();
  gEdgeGroup = new THREE.Group();
  gScene.add(gEdgeGroup);
  gScene.add(gNodeGroup);

  // 노드 클릭 → 기록 상세 (드래그 회전과 구분: 이동량이 작을 때만 클릭 처리)
  let downX = 0, downY = 0, downT = 0;
  gRenderer.domElement.addEventListener('pointerdown', ev => {
    downX = ev.clientX; downY = ev.clientY; downT = ev.timeStamp;
  });
  gRenderer.domElement.addEventListener('pointerup', ev => {
    const moved = Math.hypot(ev.clientX - downX, ev.clientY - downY);
    if (moved < 6 && ev.timeStamp - downT < 500) onGlobePick(ev);
  });
  window.addEventListener('resize', resizeGlobe);

  globeReady = true;
}

function resizeGlobe() {
  if (!globeReady) return;
  const host = globeEl();
  if (!host || host.style.display === 'none') return;
  const w = host.clientWidth || 640, h = host.clientHeight || 560;
  gCamera.aspect = w / h;
  gCamera.updateProjectionMatrix();
  gRenderer.setSize(w, h);
}

function startGlobeLoop() {
  if (!globeReady || gRaf) return;
  resizeGlobe();
  const tick = () => {
    gRaf = requestAnimationFrame(tick);
    gControls.update();
    gRenderer.render(gScene, gCamera);
  };
  tick();
}
function stopGlobeLoop() {
  if (gRaf) { cancelAnimationFrame(gRaf); gRaf = null; }
}

// 노드 3D 위치를 화면 픽셀 좌표로 투영
function globeToScreen(v, rect) {
  const p = v.clone().project(gCamera);
  return { x: (p.x * 0.5 + 0.5) * rect.width, y: (-p.y * 0.5 + 0.5) * rect.height };
}
function onGlobePick(ev) {
  if (!globeReady || !gNodePickables.length) return;
  const rect = gRenderer.domElement.getBoundingClientRect();
  gPointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  gPointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  gRaycaster.setFromCamera(gPointer, gCamera);
  const hits = gRaycaster.intersectObjects(gNodePickables.map(p => p.obj), false);
  if (!hits.length) return;
  const found = gNodePickables.find(p => p.obj === hits[0].object);
  if (!found) return;
  // 겹쳐 뭉친 노드면 그 방향으로 카메라 확대, 충분히 벌어졌으면 상세 열기
  const sc = globeToScreen(found.obj.position, rect);
  const crowded = gNodePickables.some(p => p !== found &&
    Math.hypot(globeToScreen(p.obj.position, rect).x - sc.x,
               globeToScreen(p.obj.position, rect).y - sc.y) < 60);
  if (crowded && gControls.getDistance() > gControls.minDistance + 0.02) {
    zoomGlobeToNode(found.obj.position);
  } else {
    openRecordDetail(found.rec); // 클릭 → 기록 상세
  }
}
// 카메라를 노드 방향으로 회전하며 한 단계 확대 (평면 flyTo(+3)에 대응)
function zoomGlobeToNode(nodePos) {
  const dir = nodePos.clone().normalize();
  const targetDist = Math.max(gControls.minDistance, gControls.getDistance() * 0.55);
  const to = dir.multiplyScalar(targetDist);
  const from = gCamera.position.clone();
  if (gFitRaf) cancelAnimationFrame(gFitRaf);
  let t = 0;
  (function step() {
    t = Math.min(1, t + 0.06);
    const e = 1 - Math.pow(1 - t, 3);
    gCamera.position.lerpVectors(from, to, e);
    gCamera.lookAt(0, 0, 0); gControls.update();
    if (t < 1) gFitRaf = requestAnimationFrame(step);
  })();
}

// nodes/edges(평면과 공통)를 지구본에 반영. 매번 그룹 비우고 다시 배치.
const GLOBE_NODE_H = 0.07;    // 노드 화면상 높이 (sizeAttenuation=false → 줌 무관 고정)
const GLOBE_LIFT = 1.04;      // 구 표면에서 띄우는 반지름 배율 (파묻힘 방지)
// 노드 무리의 평균 방향으로 카메라를 부드럽게 회전·확대 (보드의 flyToBounds에 대응)
let gFitRaf = null;
let gNodePositions = []; // renderGlobeNodes가 채우는 노드 3D 위치 (fit용)
function fitGlobeToPositions(positions, animate) {
  if (!globeReady || !positions.length) return;
  const center = new THREE.Vector3();
  positions.forEach(p => center.add(p));
  center.normalize(); // 노드 무리의 평균 방향
  // 퍼진 정도(최대 각도)에 따라 거리 결정 — 넓게 퍼지면 멀리, 모여 있으면 가까이
  let maxAng = 0;
  positions.forEach(p => { maxAng = Math.max(maxAng, center.angleTo(p.clone().normalize())); });
  const dist = Math.min(gControls.maxDistance,
    Math.max(gControls.minDistance, 1.5 + maxAng * 1.6));
  const to = center.multiplyScalar(dist);
  const from = gCamera.position.clone();
  if (gFitRaf) cancelAnimationFrame(gFitRaf);
  if (!animate) { gCamera.position.copy(to); gCamera.lookAt(0, 0, 0); gControls.update(); return; }
  const s = { v: 0 };
  const step = () => {
    s.v = Math.min(1, s.v + 0.04);
    const e = 1 - Math.pow(1 - s.v, 3);
    gCamera.position.lerpVectors(from, to, e);
    gCamera.lookAt(0, 0, 0); gControls.update();
    if (s.v < 1) gFitRaf = requestAnimationFrame(step); else gFitRaf = null;
  };
  step();
}
function renderGlobeNodes(nodes, edges) {
  if (!globeReady) return;
  while (gNodeGroup.children.length) gNodeGroup.remove(gNodeGroup.children[0]);
  while (gEdgeGroup.children.length) gEdgeGroup.remove(gEdgeGroup.children[0]);
  gNodePickables = [];
  const posOf = new Map(); // savedAt → Vec3 (엣지용)

  // 밀집 분산 — 근접 좌표를 격자로 묶어 그룹 내 인덱스를 센다(지구본 스케일에 맞는 각도로 벌림)
  const cellOf = r => Math.round(r.pos[0] * 40) + ':' + Math.round(r.pos[1] * 40); // ≈2.5km 격자
  const groupCount = new Map();
  nodes.forEach(n => { const c = cellOf(n); groupCount.set(c, (groupCount.get(c) || 0) + 1); });
  const seen = new Map();

  for (const n of nodes) {
    // 같은 격자에 여러 개면 황금각 나선으로 위경도를 살짝 벌린다 (지구본에서 보이게 ~1.5도)
    const c = cellOf(n);
    const idx = seen.get(c) || 0; seen.set(c, idx + 1);
    let lat = n.pos[0], lon = n.pos[1];
    if (groupCount.get(c) > 1 && idx > 0) {
      const ga = idx * 2.399963; // 황금각(rad)
      const rad = 0.9 * Math.sqrt(idx);  // 도 단위 반경
      lat += rad * Math.cos(ga);
      lon += rad * Math.sin(ga) / Math.max(0.2, Math.cos(lat * Math.PI / 180));
    }
    const v = latLonToVec3(lat, lon, GLOBE_R * GLOBE_LIFT);
    posOf.set(n.rec.savedAt, v);
    let obj;
    if (n.iconUrl) {
      const tex = gTexLoader.load(n.iconUrl, () => {
        // 실제 이미지 비율로 스케일 재설정 → 찌그러짐 방지
        const img = tex.image;
        if (img && img.width && obj) {
          const ar = img.width / img.height;
          obj.scale.set(GLOBE_NODE_H * ar, GLOBE_NODE_H, 1);
        }
      });
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, sizeAttenuation: false });
      obj = new THREE.Sprite(mat);
      obj.scale.set(GLOBE_NODE_H * 0.6, GLOBE_NODE_H, 1); // 로드 전 임시(대략 세로 비율)
    } else {
      const mat = new THREE.SpriteMaterial({ color: 0x111111, sizeAttenuation: false });
      obj = new THREE.Sprite(mat);
      obj.scale.set(0.02, 0.02, 1);
    }
    obj.position.copy(v);
    gNodeGroup.add(obj);
    gNodePickables.push({ obj, rec: n.rec });
  }

  // 엣지: 두 노드를 잇는 곡선 — 구 표면을 따라 바깥으로 살짝 띄운 호로 그려
  // 직선이 흰 구를 관통해 가려지는 문제를 피하고, 색을 진하게 해 잘 보이게.
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x9aa0a6, transparent: true, opacity: 0.9 });
  for (const e of edges) {
    const pa = posOf.get(e.a), pb = posOf.get(e.b);
    if (!pa || !pb) continue;
    // 두 점 사이를 구면을 따라 보간(slerp 유사) + 중간을 바깥으로 부풀린 호
    const pts = [];
    const SEG = 24;
    const lift = GLOBE_R * GLOBE_LIFT;
    for (let i = 0; i <= SEG; i++) {
      const t = i / SEG;
      const p = pa.clone().lerp(pb, t).normalize();          // 구 표면 방향
      const bulge = 1 + 0.12 * Math.sin(Math.PI * t);         // 중간을 살짝 바깥으로
      pts.push(p.multiplyScalar(lift * bulge));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    gEdgeGroup.add(new THREE.Line(geo, edgeMat));
  }
  gNodePositions = [...posOf.values()]; // fit(카메라 맞춤)용 노드 위치 목록
}

// 한 지도(layerGroup)에 노드·연결선을 그린다. 왼쪽 보드·오른쪽 지도가 공유.
// nodes: [{ pos:[la,lo], rec, iconUrl, labelText }], edges: boardRelations() 결과
function paintGraph(layer, nodes, edges) {
  layer.clearLayers();
  const posOf = new Map();
  for (const n of nodes) {
    posOf.set(n.rec.savedAt, n.pos);
    const html = n.iconUrl
      ? `<div class="bm-label">${escHtml(n.labelText)}</div><img src="${n.iconUrl}" style="width:110px; display:block">`
      : `<div class="bm-label" style="font-size:14px">${escHtml(n.labelText)}</div>`;
    const marker = L.marker(n.pos, {
      icon: L.divIcon({ html, className: 'lc-node', iconSize: [110, n.iconUrl ? 120 : 20], iconAnchor: [55, n.iconUrl ? 60 : 10] }),
    });
    const when = n.rec.mediaDate ? fmtDate(new Date(n.rec.mediaDate)) : '';
    marker.bindTooltip(`${when}${n.rec.momentWord ? ' · ' + n.rec.momentWord : ''}`);
    // 겹쳐 뭉친 노드를 누르면 그 지점으로 줌인해 펼친다. 충분히 벌어졌으면 상세 열기.
    marker.on('click', () => {
      if (!lcMap) { openRecordDetail(n.rec); return; }
      const maxZ = lcMap.getMaxZoom ? lcMap.getMaxZoom() : 19;
      const p0 = lcMap.latLngToContainerPoint(n.pos);
      // 화면상 이 노드와 60px 이내에 다른 노드가 겹쳐 있나?
      const crowded = nodes.some(o => o !== n &&
        lcMap.latLngToContainerPoint(o.pos).distanceTo(p0) < 60);
      if (crowded && lcMap.getZoom() < maxZ) {
        lcFitted = true; // 자동 재fit이 이 줌을 덮어쓰지 않게
        lcMap.flyTo(n.pos, Math.min(lcMap.getZoom() + 3, maxZ), { duration: 0.6 });
      } else {
        openRecordDetail(n.rec);
      }
    });
    marker.addTo(layer);
  }
  for (const e of edges) {
    const pa = posOf.get(e.a), pb = posOf.get(e.b);
    if (!pa || !pb) continue;
    L.polyline([pa, pb], { color: '#c9c9cd', weight: 1, interactive: false }).addTo(layer);
    L.marker([(pa[0] + pb[0]) / 2, (pa[1] + pb[1]) / 2], {
      icon: L.divIcon({ html: `<span class="lc-edge-label">${escHtml(e.label)}</span>`,
        className: 'lc-node', iconSize: [120, 14], iconAnchor: [60, 7] }),
      interactive: false,
    }).addTo(layer);
  }
}

async function renderMapMarkers() {
  if (!window.L) return;
  queueAddressEnglishization(); // 한글 주소 기록을 백그라운드로 영어화 (초당 1건)
  queueBackfillOutputs();       // 서버에 없는 out4 이미지를 조용히 소급 업로드
  // 왼쪽 보드 (타일 없음)
  if (!lcMap) {
    lcMap = L.map('mapView', { zoomControl: true });
    lcMap.zoomControl.setPosition('bottomright'); // 좌상단 카테고리 칩과 겹치지 않게
    lcTileLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors',
    });
    lcMapLayer = L.layerGroup().addTo(lcMap);
  }
  // Map 모드 = 타일 표시 / Board·Globe = 타일 없음 (지구본은 Leaflet을 아예 숨김)
  if (boardMode === 'map') {
    if (!lcMap.hasLayer(lcTileLayer)) lcMap.addLayer(lcTileLayer);
  } else if (lcMap.hasLayer(lcTileLayer)) {
    lcMap.removeLayer(lcTileLayer);
  }

  const all = boardRecords();
  let recs = lcMapSelKey ? all.filter(r => massKeyOf(r) === lcMapSelKey) : all;
  // 감정 필터 (선택 시 OR — 선택한 태그 중 하나라도 가진 기록만)
  if (emotionSel.size) recs = recs.filter(r => (r.emoTags || []).some(id => emotionSel.has(id)));
  renderEmotionFilter();
  updateGauge(recs);
  if (boardMode === 'map') renderFloatWords(recs);
  else document.getElementById('wordFloat').innerHTML = '';
  // 사분면(감정 좌표) 뷰 — 노드를 x,y 평면에 배치. 별도 렌더 후 종료.
  if (boardMode === 'quad') { renderQuad(recs); return; }

  // 노드 좌표·아이콘을 한 번만 계산해 세 뷰에서 공유
  const nodes = [];
  const pts = [];
  const used = [];
  for (const rec of recs) {
    // 위치 = 미디어 GPS 우선, 없으면 매스 주소 좌표
    const g = rec.mediaGps || (isFinite(rec.lat) && isFinite(rec.lon) ? { lat: rec.lat, lon: rec.lon } : null);
    if (!g) continue;
    // 같은 좌표에 여러 기록이 겹치면 살짝 벌린다
    let la = g.lat, lo = g.lon, k = 0;
    while (used.some(u => Math.abs(u[0] - la) < 1e-5 && Math.abs(u[1] - lo) < 1e-5) && k < 10) {
      k++;
      la = g.lat + 0.00012 * k * Math.cos(k * 2.1);
      lo = g.lon + 0.00012 * k * Math.sin(k * 2.1);
    }
    used.push([la, lo]);
    pts.push([la, lo]);
    const labelText = rec.momentWordEn || rec.momentWord
      || (rec.mediaDate ? fmtDate(new Date(rec.mediaDate)).split(' ')[0] : '');
    let iconUrl = rec.massThumb || null;
    if (!iconUrl) {
      const b4 = await fetchOutputBlob(rec.savedAt, 'out4');
      if (b4) iconUrl = URL.createObjectURL(b4);
    }
    nodes.push({ pos: [la, lo], rec, iconUrl, labelText });
  }
  // 관계선은 감정 필터가 활성일 때만 — 같은 감정끼리 연결 (degree≤3 과밀 방지)
  const edges = emotionSel.size ? emotionEdges(recs) : [];

  paintGraph(lcMapLayer, nodes, edges);
  // 지구본 뷰가 준비돼 있으면 같은 노드/엣지로 갱신 (표시 여부와 무관하게 최신 유지)
  if (typeof renderGlobeNodes === 'function' && globeReady) renderGlobeNodes(nodes, edges);

  const noGps = recs.length - pts.length;
  document.getElementById('mapStatus').textContent = noGps > 0 ? t('mapNoGps', noGps) : '';

  // 보드 뷰 맞춤 (첫 진입/카테고리 전환)
  if (!lcFitted) {
    if (pts.length) {
      if (lcEverFitted) {
        lcMap.flyToBounds(pts, { padding: [80, 80], maxZoom: 17, duration: 0.9 });
      } else {
        lcMap.fitBounds(pts, { padding: [80, 80], maxZoom: 17 });
      }
      // 지구본도 같은 노드 무리로 카메라 맞춤 (보드 flyToBounds에 대응)
      if (boardMode === 'globe' && globeReady) fitGlobeToPositions(gNodePositions, lcEverFitted);
      lcEverFitted = true;
    } else {
      lcMap.setView([37.5665, 126.978], 11);
    }
    lcFitted = pts.length > 0;
  }
  setTimeout(() => { if (lcMap) lcMap.invalidateSize(); }, 60);
}

// ---- 보드 공유 ----
// 내 보드 스냅샷을 공개 열람 테이블(shared_boards)에 저장하고 고정 링크 발급.
// 개인 정보(생각·연락처·자동 태그)는 스냅샷에 넣지 않는다.
let viewerRecords = null; // ?board= 뷰어 모드일 때 이 목록을 데이터 소스로 사용
let viewerMassNames = {};  // 공유자가 지정한 매스 이름
function boardRecords() { return viewerRecords || getRecords(); }

// 현재 로컬 기록으로 공유 스냅샷(payload)을 만든다 — 공유/자동갱신 공통.
function buildBoardSnapshot() {
  const snapshot = getRecords().map(r => ({
    savedAt: r.savedAt, momentWord: r.momentWord, momentWordEn: r.momentWordEn,
    momentScale: r.momentScale, momentEmotion: r.momentEmotion,
    emoTags: r.emoTags || [], emoX: r.emoX, emoY: r.emoY,   // 감정 좌표(뷰어 gap/정렬용)
    mediaDate: r.mediaDate,
    address: r.address, lat: r.lat, lon: r.lon, mediaGps: r.mediaGps,
    segments: r.segments, massThumb: r.massThumb, gpsDistM: r.gpsDistM,
    massOsmId: r.massOsmId || null, // 같은 건물 그룹핑용
  }));
  // 사용자가 지정한 매스 이름도 함께 담는다 (뷰어에서 동일하게 표시)
  const massNames = {};
  try { Object.assign(massNames, JSON.parse(localStorage.getItem('lc_mass_names')) || {}); } catch (e) {}
  const savedB = getSavedBuildings();
  for (const r of getRecords()) {
    const k = massKeyOf(r);
    if (!massNames[k]) {
      const m = savedB.find(b => isFinite(b.lat) && isFinite(r.lat)
        && Math.abs(b.lat - r.lat) < 0.001 && Math.abs(b.lon - r.lon) < 0.001);
      if (m && m.customName) massNames[k] = m.customName;
    }
  }
  return { records: snapshot, massNames };
}

// 공유 스냅샷을 서버에 upsert. 성공하면 uid 반환.
async function pushBoardSnapshot() {
  if (!sb) return null;
  const { data: u } = await sb.auth.getUser();
  const uid = u && u.user && u.user.id;
  if (!uid) return null;
  const { error } = await sb.from('shared_boards')
    .upsert({ user_id: uid, payload: buildBoardSnapshot(), updated_at: new Date().toISOString() });
  if (error) throw error;
  return uid;
}

// 자동 공유: 이미 한 번이라도 공유한 사용자(shared_boards에 행이 있음)면
// 기록 저장/수정/삭제 시 조용히 최신 스냅샷으로 갱신 → 홈페이지 맵에 즉시 반영.
// 아직 공유 안 한 사용자는 건드리지 않음(자동으로 공개되지 않게). 연타 방지 디바운스.
let _autoShareTimer = null;
function autoShareBoard() {
  if (!sb || viewerRecords) return; // 뷰어 모드에선 안 함
  clearTimeout(_autoShareTimer);
  _autoShareTimer = setTimeout(async () => {
    try {
      const { data: u } = await sb.auth.getUser();
      const uid = u && u.user && u.user.id;
      if (!uid) return;
      // 이미 공유 중일 때만 자동 갱신 (최초 공유는 사용자가 '보드 공유' 버튼으로)
      const { data: existing } = await sb.from('shared_boards').select('user_id').eq('user_id', uid).maybeSingle();
      if (!existing) return;
      await pushBoardSnapshot();
    } catch (e) { /* 자동 갱신 실패는 조용히 무시 — 다음 저장 때 재시도 */ }
  }, 1200);
}

// 공유 토글 — 하나의 버튼으로 공유/공유취소. 상태에 따라 라벨·동작 전환.
let _shareState = null; // null=미확인, true=공유중, false=미공유
function paintShareToggle() {
  const btn = document.getElementById('shareToggleBtn');
  if (!btn) return;
  if (_shareState === true) { btn.textContent = t('shareOn'); btn.classList.add('sel'); }
  else { btn.textContent = t('btnShareBoard'); btn.classList.remove('sel'); }
}
async function refreshShareState() {
  if (!sb || viewerRecords) return; // 뷰어 모드 제외
  try {
    const { data: u } = await sb.auth.getUser();
    const uid = u && u.user && u.user.id;
    if (!uid) { _shareState = false; paintShareToggle(); return; }
    const { data } = await sb.from('shared_boards').select('user_id').eq('user_id', uid).maybeSingle();
    _shareState = !!data;
    paintShareToggle();
  } catch (e) { /* 무시 */ }
}
document.getElementById('shareToggleBtn').addEventListener('click', async () => {
  const st = document.getElementById('shareStatus');
  if (!sb) { st.textContent = t('shareNeedServer'); return; }
  try {
    if (_shareState === true) {
      // 공유 취소
      const { data: u } = await sb.auth.getUser();
      const uid = u && u.user && u.user.id;
      if (!uid) { st.textContent = t('shareNeedServer'); return; }
      const { error } = await sb.from('shared_boards').delete().eq('user_id', uid);
      if (error) throw error;
      _shareState = false; paintShareToggle();
      st.textContent = t('unshareDone');
    } else {
      // 공유
      const uid = await pushBoardSnapshot();
      if (!uid) { st.textContent = t('shareNeedServer'); return; }
      _shareState = true; paintShareToggle();
      const link = location.origin + location.pathname + '?board=' + uid;
      st.textContent = t('shareReady') + ' ' + link;
      try { await navigator.clipboard.writeText(link); st.textContent = t('shareCopied') + ' ' + link; } catch (e) {}
    }
  } catch (e) {
    st.textContent = t('shareFail') + ' — ' + e.message;
  }
});
// 뷰어 모드: ?board=<uid> 로 열리면 로그인 없이 그 사용자의 보드만 표시
async function initBoardViewer(uid) {
  const url = localStorage.getItem('lc_sb_url') || DEFAULT_SB_URL;
  const key = localStorage.getItem('lc_sb_key') || DEFAULT_SB_KEY;
  if (!url || !key || !window.supabase) return false;
  try {
    const client = window.supabase.createClient(url, key);
    const { data, error } = await client.from('shared_boards').select('payload').eq('user_id', uid).single();
    if (error || !data) throw error || new Error('not found');
    viewerRecords = (data.payload && data.payload.records) || [];
    viewerMassNames = (data.payload && data.payload.massNames) || {};
    // 풀스크린 보드 뷰어 — 지도 토글·공유·계정 등 앱 UI 없이 보드만
    document.body.classList.remove('lc-locked'); // 공유 뷰어는 로그인 게이트 예외
    document.body.classList.add('board-viewer');
    document.getElementById('accountBar') && (document.getElementById('accountBar').style.display = 'none');
    // 방문자 뷰어는 보드·감정 좌표 뷰만 — 지도/지구본 옵션 제거
    const vsel = document.getElementById('viewSelect');
    if (vsel) vsel.querySelectorAll('option[value="map"], option[value="globe"]').forEach(o => o.remove());
    goto(97);
    renderMassCats();
    setMapMode('board'); // 방문자용 뷰어 기본 = 보드
    // iframe 임베드 시 컨테이너 크기가 늦게 잡혀 지도가 빈 화면으로 뜨는 문제 방지:
    // invalidateSize를 여러 시점(즉시·짧게·load 후)에 부르고, 크기가 잡히면 노드에 맞춰 다시 fit.
    const refitViewer = () => {
      if (!lcMap) return;
      lcMap.invalidateSize();
      lcMap.zoomControl.setPosition('bottomright'); // 좌상단 카테고리와 겹치지 않게
      lcFitted = false; // 새 크기 기준으로 노드 무리에 다시 맞춤
      renderMapMarkers();
    };
    [60, 250, 600, 1200].forEach(ms => setTimeout(refitViewer, ms));
    window.addEventListener('load', refitViewer);
    window.addEventListener('resize', () => { if (lcMap) lcMap.invalidateSize(); });

    // 공유 보드가 갱신되면 뷰어를 자동으로 최신화 (새로고침 없이 즉시 반영).
    // 공유자가 앱에서 기록을 올리면 → shared_boards 갱신 → 여기서 감지 → 노드 갱신.
    let lastStamp = (data.payload && JSON.stringify(data.payload).length) || 0;
    const applyPayload = (payload) => {
      if (!payload) return;
      viewerRecords = payload.records || [];
      viewerMassNames = payload.massNames || {};
      lcFitted = false;             // 새 노드 무리에 맞춰 다시 확대
      renderMassCats();
      renderMapMarkers();
    };
    // (a) Supabase Realtime 구독 — publication에 shared_boards가 있으면 즉시 반영
    try {
      client.channel('board-' + uid)
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'shared_boards', filter: 'user_id=eq.' + uid },
          (msg) => { const p = msg.new && msg.new.payload; if (p) applyPayload(p); })
        .subscribe();
    } catch (e) { /* Realtime 미설정이어도 아래 폴링이 커버 */ }
    // (b) 폴링 폴백 — Realtime 설정과 무관하게 20초마다 변경 확인(가볍게 payload만)
    setInterval(async () => {
      try {
        const { data: d2 } = await client.from('shared_boards').select('payload').eq('user_id', uid).single();
        if (!d2 || !d2.payload) return;
        const stamp = JSON.stringify(d2.payload).length;
        if (stamp !== lastStamp) { lastStamp = stamp; applyPayload(d2.payload); }
      } catch (e) { /* 일시 오류 무시 */ }
    }, 20000);

    return true;
  } catch (e) {
    console.warn('board viewer failed:', e.message);
    return false;
  }
}

/* ============================================================
   산출물 1 다운로드
   - 영상: WebCodecs로 "오프라인 프레임 정확 렌더" (기본) — 실시간 녹화가
     아니므로 기기 성능과 무관하게 정확히 30fps·무손실 타이밍의 MP4가 나온다.
     원본이 10초보다 짧으면 프레임 단위로 반복(늘리지 않음), 정확히 10초에 컷.
     소리는 원본 오디오를 디코드해 같은 방식으로 반복·10초 컷 후 AAC 인코딩.
   - WebCodecs 미지원 브라우저: 기존 MediaRecorder 실시간 녹화 폴백.
   ============================================================ */
// AAC-LC AudioSpecificConfig(2바이트) — esds가 비면 QuickTime이 못 읽는다
function aacASC(rate, ch2) {
  const freqs = [96000, 88200, 64000, 48000, 44100, 32000, 24000, 22050, 16000, 12000, 11025, 8000, 7350];
  const fi = Math.max(0, freqs.indexOf(rate));
  return new Uint8Array([(2 << 3) | (fi >> 1), ((fi & 1) << 7) | (ch2 << 3)]);
}
// 조립된 오디오 버퍼를 Safari 네이티브 MediaRecorder로 AAC(m4a) 녹음
// — AudioEncoder가 없는 실기 Safari용. ac는 클릭 제스처 안에서 만든 컨텍스트.
async function recordBufferAAC(ac, rendered) {
  let mime = null;
  for (const m of ['audio/mp4;codecs=mp4a.40.2', 'audio/mp4']) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
  }
  if (!mime) throw new Error('no AAC recorder');
  const dest = ac.createMediaStreamDestination();
  const src = ac.createBufferSource();
  src.buffer = rendered;
  src.connect(dest);
  const rec = new MediaRecorder(dest.stream, { mimeType: mime, audioBitsPerSecond: 128000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
  const done = new Promise(r => { rec.onstop = r; });
  rec.start(500);
  src.start();
  await new Promise(r => { src.onended = r; });
  await new Promise(r => setTimeout(r, 250)); // 인코더 꼬리 여유
  rec.stop();
  await done;
  return await new Blob(chunks, { type: 'audio/mp4' }).arrayBuffer();
}
// 비디오 엘리먼트 재생을 경유해 [clipStart, +5초] 구간을 AAC로 녹음 —
// decodeAudioData가 컨테이너를 못 읽는 경우(아이폰 .mov 등)의 대체 경로.
// 재생 가능한 파일이면 코덱과 무관하게 소리를 얻는다.
async function recordElementAAC(ac, srcUrl, clipStart, durSec) {
  let mime = null;
  for (const m of ['audio/mp4;codecs=mp4a.40.2', 'audio/mp4']) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) { mime = m; break; }
  }
  if (!mime) throw new Error('no AAC recorder');
  const v2 = document.createElement('video');
  v2.src = srcUrl;
  v2.playsInline = true;
  v2.style.cssText = 'position:fixed; width:2px; height:2px; opacity:0.01; pointer-events:none';
  document.body.appendChild(v2); // Safari는 DOM 밖 비디오의 오디오 그래프를 멈출 수 있음
  try {
    await waitVideoReady(v2);
    const cs = Math.min(clipStart || 0, Math.max(0, v2.duration - 0.1));
    const clipLen = Math.min(v2.duration - cs, durSec);
    const src = ac.createMediaElementSource(v2); // 그래프로만 흐름 (스피커 출력 없음)
    const dest = ac.createMediaStreamDestination();
    src.connect(dest);
    const rec = new MediaRecorder(dest.stream, { mimeType: mime, audioBitsPerSecond: 128000 });
    const chunks = [];
    rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
    const done = new Promise(r => { rec.onstop = r; });
    v2.currentTime = cs;
    await new Promise(r => { v2.onseeked = r; });
    // 짧은 영상은 구간을 반복해 durSec를 채운다 (본편 렌더와 같은 규칙)
    v2.addEventListener('timeupdate', () => {
      if (v2.currentTime >= cs + clipLen - 0.05) v2.currentTime = cs;
    });
    rec.start(500);
    await v2.play();
    await new Promise(r => setTimeout(r, durSec * 1000 + 250));
    v2.pause();
    rec.stop();
    await done;
    return await new Blob(chunks, { type: 'audio/mp4' }).arrayBuffer();
  } finally { v2.remove(); }
}
// MediaRecorder가 만든 m4a에서 AAC 샘플을 추출 (mp4box.js)
async function demuxAAC(ab) {
  const mod = await import('https://cdn.jsdelivr.net/npm/mp4box@0.5.3/+esm');
  const MP4Box = mod.default || mod;
  return new Promise((resolve, reject) => {
    const file = MP4Box.createFile();
    const samples = [];
    let tr = null;
    file.onError = e => reject(new Error('mp4box: ' + e));
    file.onReady = info => {
      tr = info.audioTracks && info.audioTracks[0];
      if (!tr) return reject(new Error('no audio track in recording'));
      file.setExtractionOptions(tr.id, null, { nbSamples: 1000000 });
      file.start();
    };
    file.onSamples = (id, user, smp) => { samples.push(...smp); };
    ab.fileStart = 0;
    file.appendBuffer(ab);
    file.flush();
    setTimeout(() => {
      if (!tr || !samples.length) return reject(new Error('demux produced no samples'));
      if (tr.codec && !/^mp4a/.test(tr.codec)) return reject(new Error('audio codec not AAC: ' + tr.codec));
      resolve({ samples,
        sampleRate: tr.audio ? tr.audio.sample_rate : 44100,
        channels: tr.audio ? tr.audio.channel_count : 2,
        timescale: tr.timescale });
    }, 80);
  });
}
// 원본 파일의 AAC 오디오를 그대로 추출해 [clipStart, +5초] 구간을 잘라낸다.
// 디코드·재생·재인코딩이 전혀 없어 브라우저 자동재생/볼륨 정책과 무관 —
// 실기 Safari에서 재생-녹음 방식의 소리가 뭉개지던 문제의 근본 해결.
async function extractSourceAAC(url, clipStart, durSec) {
  const ab = await (await fetch(url)).arrayBuffer();
  const d = await demuxAAC(ab);
  const ts = d.samples[0].timescale || d.timescale;
  const last = d.samples[d.samples.length - 1];
  const srcDur = (last.cts + last.duration) / ts;
  const cs = Math.min(clipStart || 0, Math.max(0, srcDur - 0.1));
  const L = Math.max(0.2, Math.min(srcDur - cs, durSec));
  const seg = d.samples.filter(smp => smp.cts / ts >= cs - 1e-6 && smp.cts / ts < cs + L - 1e-6);
  if (!seg.length) throw new Error('no audio samples in clip range');
  const out = [];
  for (let t0 = 0; t0 < durSec - 1e-6; t0 += L) { // 짧은 영상은 구간 반복
    for (const smp of seg) {
      const t = t0 + (smp.cts / ts - cs);
      if (t >= durSec) break;
      out.push({ data: smp.data, is_sync: smp.is_sync, timescale: ts,
                 cts: Math.round(t * ts), duration: smp.duration });
    }
  }
  return { samples: out, sampleRate: d.sampleRate, channels: d.channels };
}
async function exportVideoOffline(status) {

  // ① AudioEncoder 재인코딩 (Chrome 등, 원본이 AAC가 아닐 때)

    for (let t0 = 0; t0 < TARGET_DURATION; t0 += aLen) {
      const src = oc.createBufferSource();
      src.buffer = audioBuf; src.connect(oc.destination);
      src.start(t0, acs, Math.min(aLen, TARGET_DURATION - t0));
    }
    renderedAudio = await oc.startRendering();
  }

  // ---- mediarec 모드: muxer 생성 전에 녹음·추출까지 끝내 sampleRate 확정 ----
  let mrAAC = null;
  if (audioMode === 'copy') {
    mrAAC = sourceAAC;
    audioMode = 'mediarec'; // 이후 주입 로직 공용
  } else if (audioMode === 'mediarec') {
    status.textContent = t('dlAudioPrep');
    mrAAC = await demuxAAC(await recordBufferAAC(gestureAC, renderedAudio));
  } else if (audioMode === 'element') {
    status.textContent = t('dlAudioPrep');
    try {
      mrAAC = await demuxAAC(await recordElementAAC(gestureAC, video.src, state.clipStart || 0, TARGET_DURATION));
      audioMode = 'mediarec'; // 이후 주입 로직은 동일
    } catch (e) {
      console.warn('element audio capture failed:', e.message);
      audioMode = null; // 진짜 무음 영상일 수 있음 — 비디오만 저장
    }
  }
  const audioMuxCodec = audioMode ? 'aac' : null;
  const muxSampleRate = audioMode === 'mediarec' ? mrAAC.sampleRate : (audioCfg ? audioCfg.sampleRate : 44100);
  const muxChannels = audioMode === 'mediarec' ? mrAAC.channels : (audioCfg ? audioCfg.numberOfChannels : 2);

  // ---- 비디오 인코더: H.264 우선(호환성), 안 되면 VP9-in-MP4 ----
  let vCodecCfg = null, videoMuxCodec = null;
  for (const [codec, mux] of [['avc1.640028', 'avc'], ['avc1.4d0028', 'avc'], ['avc1.42e028', 'avc'], ['vp09.00.40.08', 'vp9']]) {
    const cfg = { codec, width: W, height: H, bitrate: 10_000_000, framerate: FPS };
    if ((await VideoEncoder.isConfigSupported(cfg)).supported) { vCodecCfg = cfg; videoMuxCodec = mux; break; }
  }
  if (!vCodecCfg) throw new Error(t('errNoRecorder'));

  const muxer = new Muxer({
    target: new ArrayBufferTarget(),
    video: { codec: videoMuxCodec, width: W, height: H },
    ...(audioMuxCodec ? { audio: { codec: audioMuxCodec, sampleRate: muxSampleRate, numberOfChannels: muxChannels } } : {}),
    fastStart: 'in-memory',
  });

  let encError = null;
  const venc = new VideoEncoder({
    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
    error: e => { encError = e; },
  });
  venc.configure(vCodecCfg);

  // ---- 프레임 렌더: 출력 프레임 i의 소스 시각 = (i/30) mod 원본길이 → 반복 후 10초 컷 ----
  const v = await ensureSeekVideo();
  const srcDur = v.duration;
  const cs = Math.min(state.clipStart || 0, Math.max(0, srcDur - 0.1));
  const clipLen = Math.min(srcDur - cs, TARGET_DURATION); // 짧으면 반복, 길면 10초 컷
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  for (let i = 0; i < TOTAL; i++) {
    if (encError) throw encError;
    const srcT = cs + ((i / FPS) % clipLen);
    await seekTo(v, Math.min(srcT, srcDur - 0.001));
    drawComposite(octx, v, '#fff', state.edgeLayer);
    if (state._out1TextLayer) octx.drawImage(state._out1TextLayer, 0, 0);
    const frame = new VideoFrame(off, { timestamp: Math.round(i * 1e6 / FPS), duration: Math.round(1e6 / FPS) });
    venc.encode(frame, { keyFrame: i % 60 === 0 });
    frame.close();
    if (venc.encodeQueueSize > 4) await new Promise(r => setTimeout(r, 5));
    if (i % 15 === 0) status.textContent = t('dlRendering', Math.round(i / TOTAL * 100));
  }
  await venc.flush();

  // ---- 오디오 트랙 주입 ----
  if (audioMode === 'webcodecs') {
    // 조립 버퍼를 AudioEncoder(AAC)로 통째 인코딩
    const rendered = renderedAudio;
    const ch = rendered.numberOfChannels, frames = rendered.length;
    const data = new Float32Array(frames * ch);
    for (let c = 0; c < ch; c++) data.set(rendered.getChannelData(c), c * frames);
    const aenc = new AudioEncoder({
      output: (chunk, meta) => {
        // WebKit AudioEncoder는 decoderConfig.description을 주지 않아
        // esds가 비어 QuickTime이 못 읽는다 → ASC를 직접 채움
        if (!meta || !meta.decoderConfig || !meta.decoderConfig.description) {
          meta = { decoderConfig: {
            codec: audioCfg.codec, sampleRate: audioCfg.sampleRate,
            numberOfChannels: audioCfg.numberOfChannels,
            description: aacASC(audioCfg.sampleRate, audioCfg.numberOfChannels),
          } };
        }
        muxer.addAudioChunk(chunk, meta);
      },
      error: e => { encError = e; },
    });
    aenc.configure(audioCfg);
    const ad = new AudioData({ format: 'f32-planar', sampleRate: rendered.sampleRate,
      numberOfFrames: frames, numberOfChannels: ch, timestamp: 0, data });
    aenc.encode(ad);
    ad.close();
    await aenc.flush();
    if (encError) throw encError;
  } else if (audioMode === 'mediarec') {
    // 네이티브 녹음에서 추출한 AAC 샘플을 그대로 주입 (재인코딩 없음)
    // 녹음 시작 지연으로 첫 샘플 cts가 0이 아닐 수 있어 0 기준으로 정규화
    let first = true;
    const cts0 = mrAAC.samples.length ? mrAAC.samples[0].cts : 0;
    for (const smp of mrAAC.samples) {
      const tsUs = Math.round((smp.cts - cts0) * 1e6 / smp.timescale);
      if (tsUs > TARGET_DURATION * 1e6) break; // 5초에서 컷
      muxer.addAudioChunkRaw(
        new Uint8Array(smp.data),
        smp.is_sync ? 'key' : 'delta',
        tsUs,
        Math.round(smp.duration * 1e6 / smp.timescale),
        first ? { decoderConfig: {
          codec: 'mp4a.40.2', sampleRate: mrAAC.sampleRate,
          numberOfChannels: mrAAC.channels,
          description: aacASC(mrAAC.sampleRate, mrAAC.channels),
        } } : undefined);
      first = false;
    }
  }
  try { gestureAC.close(); } catch (e) {}

  muxer.finalize();
  const outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
  downloadBlob(outBlob, 'liquidcities-reels.mp4');
  saveOutputBlob('out1', outBlob);
  status.textContent = t('dlDone');
}

// WebCodecs 미지원 브라우저용 실시간 녹화 폴백 (기존 검증된 경로)
async function recordRealtime(status) {
  status.textContent = t('dlRecording', TARGET_DURATION);
  // (1) 오디오 컨텍스트는 어떤 await보다 먼저(=클릭 제스처 안에서) 생성·활성화 —
  //     Safari는 await 뒤의 resume()을 제스처로 인정하지 않아 무음이 됐다
  const recAudioCtxEarly = new (window.AudioContext || window.webkitAudioContext)();
  recAudioCtxEarly.onstatechange = () => {
    if (recAudioCtxEarly.state === 'suspended') recAudioCtxEarly.resume().catch(() => {});
  };
  recAudioCtxEarly.resume().catch(() => {});
  // (2) 수동 프레임 공급은 실제 지원 여부로 판정 — Safari는 requestFrame이 없어
  //     captureStream(0)을 쓰면 프레임이 기록되지 않는다(끊김·색 깨짐의 원인)
  // Safari/WebKit은 requestFrame API가 존재해도 실제로는 프레임을 밀어넣지
  // 못한다(10초에 3프레임 실측) — 벤더 판별로 자동 샘플링(30fps) 강제
  const IS_WEBKIT = /apple/i.test(navigator.vendor || '');
  const useManualFrames = !IS_WEBKIT
    && 'requestVideoFrameCallback' in HTMLVideoElement.prototype
    && typeof CanvasCaptureMediaStreamTrack !== 'undefined'
    && 'requestFrame' in CanvasCaptureMediaStreamTrack.prototype;
  const stream = out1Canvas.captureStream(useManualFrames ? 0 : 30);
  if (useManualFrames) state._recTrack = stream.getVideoTracks()[0];
  // 오디오: 재생을 실시간으로 캡처하는 방식은 반복 경계·Safari 절전 등으로
  // 계속 끊겼다. 대신 **원본 오디오를 디코드해 [구간시작, +10초]를 샘플
  // 단위로 반복·컷해 미리 조립한 버퍼**를 녹음기에 공급한다 — 재생 과정이
  // 없으므로 끊길 지점이 원천적으로 없다.
  const cs0 = state.clipStart || 0;
  let recAudioNode = null, recAudioCtx = null;
  try {
    if (!state._mix10 || state._mix10.src !== video.src || state._mix10.cs !== cs0) {
      const ab = await (await fetch(video.src)).arrayBuffer();
      const dctx = new (window.AudioContext || window.webkitAudioContext)();
      const full = await dctx.decodeAudioData(ab);
      dctx.close().catch(() => {});
      const clipLen = Math.max(0.1, Math.min(full.duration - cs0, TARGET_DURATION));
      const oc = new OfflineAudioContext(full.numberOfChannels,
        Math.ceil(TARGET_DURATION * full.sampleRate), full.sampleRate);
      for (let t0 = 0; t0 < TARGET_DURATION; t0 += clipLen) {
        const bs = oc.createBufferSource();
        bs.buffer = full;
        bs.connect(oc.destination);
        bs.start(t0, cs0, Math.min(clipLen, TARGET_DURATION - t0));
      }
      state._mix10 = { buf: await oc.startRendering(), src: video.src, cs: cs0 };
    }
    recAudioCtx = recAudioCtxEarly; // 클릭 제스처 안에서 이미 생성·활성화됨
    const dest = recAudioCtx.createMediaStreamDestination();
    recAudioNode = recAudioCtx.createBufferSource();
    recAudioNode.buffer = state._mix10.buf;
    recAudioNode.connect(dest);
    dest.stream.getAudioTracks().forEach(tr => stream.addTrack(tr));
  } catch (e) {
    // 원본에 오디오가 없거나 디코드 실패 → 무음으로 진행
    recAudioNode = null;
  }
  const candidates = [
    'video/mp4;codecs=avc1,mp4a', 'video/mp4',
    'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm',
  ];
  const mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t));
  if (!mimeType) throw new Error(t('errNoRecorder'));
  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

  // Safari: muted 상태의 비디오는 오디오 그래프에도 무음이 갈 수 있으므로
  // 녹화 전에 완전히 해제 (사용자 제스처 컨텍스트 안이라 허용됨)
  video.removeAttribute('muted');
  video.muted = false;
  video.defaultMuted = false;
  video.volume = 1;
  soundBtn.textContent = t('soundOff');
  soundBtn6.textContent = t('soundOff');
  video.currentTime = state.clipStart || 0; // 선택 구간부터 10초 (timeupdate 가드가 구간 반복 처리)
  await video.play().catch(() => {});

  const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 10_000_000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  const done = new Promise((ok, no) => {
    rec.onstop = ok;
    rec.onerror = e => no(e.error || new Error('recorder error'));
  });
  rec.start(1000);  // 타임슬라이스 필수 (검증된 함정)
  if (recAudioNode) recAudioNode.start(); // 조립된 10초 오디오를 녹화와 동시에 시작
  // 녹화 중에는 전용 루프로 프레임 공급을 보장 (rvfc가 백그라운드 스로틀돼도 안전)
  let recDrawing = true;
  let lastDraw = 0;
  (function recLoop(ts) {
    if (!recDrawing) return;
    if (ts - lastDraw >= 33) {
      lastDraw = ts;
      if (state._drawOut1) state._drawOut1();
    }
    requestAnimationFrame(recLoop);
  })(0);
  await new Promise(r => setTimeout(r, TARGET_DURATION * 1000)); // 정확히 10초에 컷
  recDrawing = false;
  if (rec.state !== 'inactive') rec.stop();
  await done;
  state._recTrack = null;
  if (recAudioCtx) recAudioCtx.close().catch(() => {}); // 녹화용 오디오 정리

  if (!chunks.length) throw new Error(t('errEmptyRec'));
  const outBlob = new Blob(chunks, { type: mimeType });
  downloadBlob(outBlob, `liquidcities-reels.${ext}`);
  saveOutputBlob('out1', outBlob);
  status.textContent = ext === 'webm' ? t('dlDoneWebm') : t('dlDoneRT');
}

// 릴스: 사진→JPG / 영상→5초 MP4 (오프라인 렌더 기본, 실시간 녹화 폴백)
dl1Btn.addEventListener('click', async () => {
  const status = document.getElementById('dl1Status');
  saveRecord();
  if (state.mediaType === 'image') {
    out1Canvas.toBlob(b => { downloadBlob(b, 'liquidcities-reels.jpg'); saveOutputBlob('out1', b); }, 'image/jpeg', 0.95);
    return;
  }
  dl1Btn.disabled = true;
  try {
    // 오프라인 렌더 우선(모든 브라우저) — WebKit도 H.264+AAC WebCodecs를
    // 지원함을 실측 확인(2026-07-10). 실시간 녹화는 Safari에서 2~3fps로
    // 끊기고 색범위도 좁게 인코딩되므로 최후 폴백으로만 사용.
    if ('VideoEncoder' in window) {
      try {
        await exportVideoOffline(status);
      } catch (e) {
        console.warn('offline export failed, falling back to realtime:', e.message);
        await recordRealtime(status);
      }
    } else {
      await recordRealtime(status);
    }
  } catch (e) {
    status.textContent = t('dlFail', e.message);
  } finally {
    state._recTrack = null;
    dl1Btn.disabled = false;
  }
});

// 초기 언어 적용 + 저장 목록 렌더 (모든 선언이 끝난 시점)
applyLang();
{
  const shared = new URLSearchParams(location.search).get('board');
  if (shared) initBoardViewer(shared).then(ok => { if (!ok) initSupabase(); });
  else initSupabase(); // Supabase 설정이 있으면 세션 복원/로그인 게이트
}

// 테스트/디버깅 훅
window.__lc = { state, goto, proceedWithLocation, enterResults, startMassViewer, drawOut4, saveRecord, idbGet };
</script>
